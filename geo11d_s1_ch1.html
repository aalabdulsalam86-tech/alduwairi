<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#34d399;--c2:#059669;--bg:#00080a;--brd:rgba(52,211,153,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>

<script>
const QS=[
  // الباب الأول: مبادئ علم الجغرافيا
  {q:"ما تعريف علم الجغرافيا وما أصل الكلمة؟",opts:["علم يدرس التاريخ البشري فقط","علم يصف الأرض وظواهرها الطبيعية والبشرية — مشتقة من اليونانية: Geo (أرض) + Graphia (وصف/كتابة)","علم الكواكب والمجموعة الشمسية","علم يدرس الخرائط فقط"],ans:1,exp:"الجغرافيا كلمة يونانية الأصل مركّبة من Geo (أرض) وGraphia (وصف/كتابة). يُعرَّف علم الجغرافيا بأنه العلم الذي يصف ويفسّر التوزيع المكاني للظواهر الطبيعية والبشرية على سطح الأرض، ويدرس العلاقة بين الإنسان وبيئته."},
  {q:"ما الفروع الرئيسية لعلم الجغرافيا؟",opts:["فرع واحد فقط: جغرافيا الطقس","الجغرافيا الطبيعية (المناخ، التضاريس، المياه) — الجغرافيا البشرية (السكان، الاقتصاد، العمران) — الجغرافيا الإقليمية","الجغرافيا التاريخية فقط","جغرافيا الفضاء فقط"],ans:1,exp:"تنقسم الجغرافيا إلى فروع رئيسية: (1) الجغرافيا الطبيعية: تشمل المناخ والمياه والتربة والتضاريس. (2) الجغرافيا البشرية: تشمل جغرافيا السكان والاقتصاد والعمران والسياسة. (3) الجغرافيا الإقليمية: تدرس مناطق جغرافية محددة بشمولية. وتتشابك مع علوم كالجيولوجيا والأرصاد والاقتصاد."},
  {q:"ما مصادر المعلومات الجغرافية الرئيسية؟",opts:["الإنترنت فقط","الخرائط (بأنواعها) — الدراسة الميدانية — الإحصاءات الرسمية — الاستشعار عن بُعد (الأقمار الصناعية)","الكتب القديمة فقط","المراسيم الحكومية فقط"],ans:1,exp:"تتعدد مصادر المعلومات الجغرافية: (1) الخرائط: أهم وسيلة جغرافية (طبوغرافية، موضوعاتية، هوائية). (2) الدراسة الميدانية: الزيارة المباشرة للمنطقة. (3) الإحصاءات الرسمية: التعداد السكاني والإحصاء الاقتصادي. (4) الاستشعار عن بُعد: صور الأقمار الصناعية. (5) المؤلفات العلمية والدراسات السابقة."},
  {q:"ما عناصر الخريطة الجغرافية الأساسية؟",opts:["الألوان فقط","العنوان — مقياس الرسم — الاتجاهات (الشمال) — المفتاح (الأسطورة) — الشبكة الجغرافية (خطوط الطول والعرض)","التاريخ والرسام فقط","حجم الخريطة فقط"],ans:1,exp:"تتضمن الخريطة الجيدة عناصر أساسية: (1) العنوان: يحدد موضوع الخريطة. (2) مقياس الرسم: النسبة بين المسافة على الخريطة والمسافة الحقيقية. (3) الاتجاهات: وجود بوصلة أو سهم الشمال. (4) المفتاح/الأسطورة: شرح الرموز والألوان. (5) الشبكة الجغرافية: خطوط الطول والعرض."},
  // الباب الثاني: كوكب الأرض
  {q:"ما نظرية الانفجار الكبير (Big Bang) في نشأة الكون؟",opts:["الكون كان موجوداً دائماً بلا بداية","قبل 13.8 مليار سنة كان الكون نقطة فائقة الكثافة ثم انفجر وتمدد مكوّناً المجرات والنجوم والكواكب","الكون خُلق قبل 6000 سنة فقط","الكون يتقلص باستمرار"],ans:1,exp:"وفق نظرية الانفجار الكبير (Big Bang): قبل نحو 13.8 مليار سنة كان الكون مضغوطاً في نقطة بالغة الصغر والكثافة والحرارة. ثم حدث انفجار عظيم وبدأ الكون يتمدد ويبرد، ومن المادة المتكوّنة نشأت المجرات ثم النجوم ثم الكواكب. لا يزال الكون يتمدد حتى اليوم."},
  {q:"ما مكوّنات المجموعة الشمسية؟",opts:["الشمس والأرض فقط","الشمس (نجم) + 8 كواكب + أقمار + كويكبات + مذنبات + غبار كوني — الأرض ثالث الكواكب","10 كواكب وشمسان","مجرد مجموعة من النجوم"],ans:1,exp:"المجموعة الشمسية تتكوّن من: الشمس (نجم يشكّل 99.8% من كتلة المجموعة) + 8 كواكب بالترتيب: عطارد، الزهرة، الأرض، المريخ، المشتري، زحل، أورانوس، نبتون. وتشمل أيضاً: أقمار الكواكب، حزام الكويكبات، المذنبات، والغبار الكوني."},
  {q:"ما خصائص الأرض التي جعلتها صالحة للحياة؟",opts:["حجمها الكبير جداً","المسافة المناسبة من الشمس — وجود الماء السائل — الغلاف الجوي الغني بالأكسجين — درجات الحرارة المعتدلة — المجال المغناطيسي","صغر حجمها","سرعة دورانها السريعة جداً"],ans:1,exp:"تتمتع الأرض بشروط فريدة للحياة: (1) مسافة مثالية من الشمس (149.6 مليون كم) تجعل درجة الحرارة معتدلة. (2) وجود الماء السائل بوفرة. (3) غلاف جوي يحتوي على O₂ وN₂ ويحمي من الإشعاع. (4) مجال مغناطيسي يحمي من الرياح الشمسية. (5) القمر الذي يستقر ميل محور الأرض."},
  {q:"ما الشبكة الجغرافية وكيف تُحدَّد مواقع نقاط على الأرض؟",opts:["خطوط وهمية لا فائدة منها","خطوط الطول (180 شرقاً وغرباً من غرينتش) وخطوط العرض (90° شمالاً وجنوباً من خط الاستواء) — الموقع يُحدَّد بإحداثيين: العرض والطول","الخرائط الورقية فقط","نظام GPS فقط"],ans:1,exp:"الشبكة الجغرافية: (1) خطوط الطول (Meridians): تمتد من القطب الشمالي للجنوبي، عددها 360، تُقاس من خط غرينتش (0°) شرقاً وغرباً حتى 180°. (2) خطوط العرض (Parallels): تمتد أفقياً، تُقاس من خط الاستواء (0°) شمالاً وجنوباً حتى 90°. أي نقطة على الأرض تُحدَّد بدرجة عرضها وطولها."},
  // الباب الثالث: الغلاف الصخري
  {q:"ما أنواع الصخور الثلاثة الرئيسية في القشرة الأرضية؟",opts:["الصخور الرملية والطينية فقط","الصخور النارية (البركانية) — الصخور الرسوبية (الطبقية) — الصخور المتحولة","الصخور الصلبة والهشة فقط","الصخور الداخلية والخارجية فقط"],ans:1,exp:"تُصنَّف صخور القشرة الأرضية إلى ثلاثة أنواع: (1) النارية (Igneous): نتجت من تبرّد الصهارة البركانية (الجرانيت والبازلت). (2) الرسوبية (Sedimentary): تكوّنت من ترسّب المواد وتماسكها (الحجر الرملي والحجر الجيري). (3) المتحولة (Metamorphic): نتجت من تحوّل الصخور الأولى بالحرارة والضغط (الرخام والشيست)."},
  {q:"ما الزلازل وما مقياس قياس شدتها؟",opts:["انفجارات بركانية فوق سطح الأرض","اهتزازات في القشرة الأرضية ناتجة عن حركة الصفائح التكتونية أو الطاقة المتراكمة — تُقاس بمقياس ريختر أو مقياس العزم","أمطار غزيرة في باطن الأرض","تغيّر درجة حرارة الأرض"],ans:1,exp:"الزلازل اهتزازات مفاجئة في القشرة الأرضية ناتجة عن إفراز الطاقة المتراكمة بسبب حركة الصفائح التكتونية. تُقاس شدّتها بمقياس ريختر (1-10) أو مقياس العزم الزلزالي الأحدث. البؤرة (Hypocenter) هي نقطة التحرك تحت الأرض، والمركز السطحي (Epicenter) هو النقطة المقابلة على السطح."},
  {q:"ما البراكين وما أنواعها من حيث النشاط؟",opts:["مجرد تلال مرتفعة","فوهات في القشرة الأرضية يخرج منها الصهارة والغازات — نارية (نشطة) — خامدة (هدأت مؤقتاً) — ميتة (توقفت كلياً)","ظاهرة في الغلاف الجوي فقط","تراكمات رملية في الصحراء"],ans:1,exp:"البراكين: فوهات في القشرة الأرضية تخرج منها الصهارة والغازات والرماد. تُصنَّف حسب نشاطها إلى: (1) نشطة: تثور بانتظام كإتنا وكيلاويا. (2) خامدة: توقفت مؤقتاً مثل فيزوف. (3) ميتة: لم تثر منذ آلاف السنين. وحسب شكلها: مخروطية، درعية، وهضبية. مناطق تمركزها: حزام النار حول المحيط الهادئ."},
  {q:"ما عوامل التعرية الخارجية وأثرها في تشكيل سطح الأرض؟",opts:["الزلازل والبراكين فقط","الرياح (تُكوّن الكثبان وتحفر) — المياه الجارية (تحفر الأودية والأخاديد) — الجليد (يُكوّن الفيوردات والوديان الجليدية) — الأمواج (تُشكّل الشواطئ)","الجاذبية الأرضية فقط","حركة القمر فقط"],ans:1,exp:"تعمل عوامل التعرية الخارجية على تشكيل سطح الأرض: (1) الرياح: تنقل الرمال وتبني الكثبان وتحفر الصخور. (2) المياه الجارية: أقوى عوامل التعرية، تحفر الأودية وتنقل الترسبات. (3) الجليد: يُكوّن الوديان الجليدية ويحفر الفيوردات في المناطق القطبية. (4) الأمواج البحرية: تُشكّل الشواطئ والتكوينات الصخرية الساحلية."}
];
const L=["أ","ب","ج","د"],FN=[["🌟 ممتاز! درجة كاملة!","أجبت على جميع الأسئلة صحيحة!","⭐⭐⭐⭐⭐"],["🔥 أداء رائع!","تقريباً مثالي — راجع نقطةً أو اثنتين","⭐⭐⭐⭐"],["👍 أحسنت!","نتيجة جيدة — المراجعة ستُحسّن أداءك","⭐⭐⭐"],["💡 حاول مجدداً!","راجع ملاحظاتك وحاول مرة أخرى","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#34d399','#fff','#6ee7b7','#059669'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(52,211,153,${(1-d/130)*.07})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(52,211,153,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});

function pick(idx,btn){if(ans)return;ans=true;const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);const fb=document.getElementById('fb');fb.classList.remove('sc','wr');if(idx===q.ans){btn.classList.add('correct');sc+=10;const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);fb.textContent=['✅','🎯','⭐','🔥'][Math.floor(Math.random()*4)];fb.classList.add('sc');for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);setTimeout(()=>document.getElementById('nb').classList.add('show'),500)}else{btn.classList.add('wrong');bs[q.ans].classList.add('correct');fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);setTimeout(()=>document.getElementById('nb').classList.add('show'),350)}bsb()}
