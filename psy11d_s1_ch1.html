<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>علم النفس — الفصل الأول | تعريف علم النفس والدوافع والانفعالات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#22d3ee;--c2:#0e7490;--bg:#00080a;--brd:rgba(34,211,238,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr"><div class="logo">🧠 علم النفس — الحادي عشر أدبي</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
  <div class="plbl" id="pl"></div><div class="sbar" id="sbar"></div>

    <div class="qn" id="qn"></div><div class="qt" id="qt"></div>
    <div class="opts" id="og"></div><div class="exp" id="ex"></div>
    <button class="nbtn" id="nb" onclick="nxt()">التالي ←</button>
  </div>
</div>
<div class="final" id="fs">
  <div class="fstars" id="fst"></div><div class="ftitle" id="ftl"></div>
  <div class="fmsg" id="fmg"></div>
  <div class="fsbox"><div class="fslbl">مجموع النقاط</div><div class="fsnum" id="fsn">0</div></div>
  <button class="rbtn" onclick="rst()">🔄 إعادة المحاولة</button>
  <span class="bhome" onclick="window.history.back()">← العودة للموقع</span>
</div>
<script>
const QS=[
  // الفصل الأول: تعريف علم النفس
  {q:"ما التعريف الشامل لعلم النفس؟",opts:["العلم الذي يدرس الأمراض العقلية فقط","العلم الذي يدرس السلوك والعمليات العقلية للكائنات الحية دراسةً علمية منظمة","علم يدرس الأحلام والنوم فقط","علم يدرس تشريح الدماغ فقط"],ans:1,exp:"علم النفس: العلم الذي يدرس السلوك والعمليات العقلية (كالإدراك والتفكير والذاكرة) دراسةً علمية منظمة تعتمد على الملاحظة والتجربة. يشمل السلوك الظاهر (الكلام والحركة) والعمليات الداخلية (المشاعر والأفكار). هدفه: وصف السلوك وتفسيره والتنبؤ به والتحكم فيه."},
  {q:"ما أبرز فروع علم النفس؟",opts:["فرع واحد فقط: علم النفس العام","علم النفس العام — علم نفس الوظائف الفسيولوجي — علم النفس الاجتماعي — علم نفس الطفل (النمو) — علم النفس التربوي — علم النفس الإكلينيكي","فرعان: النظري والتطبيقي فقط","علم النفس التربوي فقط"],ans:1,exp:"تتعدد فروع علم النفس: (1) العام: يدرس المبادئ الأساسية للسلوك. (2) الفسيولوجي: يدرس الأسس العصبية للسلوك. (3) الاجتماعي: علاقة الفرد بالجماعة. (4) النمو/الطفل: دراسة النمو من الطفولة للشيخوخة. (5) التربوي: تطبيق علم النفس في التعليم. (6) الإكلينيكي: تشخيص وعلاج الاضطرابات النفسية."},
  {q:"ما مناهج البحث في علم النفس؟",opts:["الحدس والتخمين فقط","الملاحظة — التجربة — دراسة الحالة — المسح بالاستبيان — الطريقة الإحصائية","القراءة في الكتب فقط","المقابلة الشخصية فقط"],ans:1,exp:"يستخدم علم النفس مناهج علمية متعددة: (1) الملاحظة: مراقبة السلوك في بيئته الطبيعية. (2) التجربة: إخضاع المتغيرات للتحكم في مختبر. (3) دراسة الحالة: دراسة فرد بعمق. (4) المسح/الاستبيان: جمع بيانات من عينة كبيرة. (5) الطريقة الإحصائية: تحليل النتائج رياضياً."},
  // الفصل الثاني: وظائف أعضاء الجسم
  {q:"ما وظيفة الجهاز العصبي المركزي في ضبط السلوك؟",opts:["ضخ الدم فقط","يتحكم في جميع وظائف الجسم والعمليات العقلية — يتكون من المخ والنخاع الشوكي","تنقية الدم فقط","هضم الطعام فقط"],ans:1,exp:"الجهاز العصبي المركزي يتكون من: (1) المخ: مركز الوعي والتفكير والذاكرة والانفعالات وتفسير الحواس. (2) النخاع الشوكي: ينقل الرسائل بين المخ وباقي الجسم ويتحكم في بعض الأفعال الانعكاسية. يعمل الجهاز العصبي مع الغدد الصماء لتنظيم السلوك."},
  {q:"ما الغدد الصماء وما أهميتها في السلوك؟",opts:["غدد تفرز عصارة هضمية فقط","غدد تفرز هرموناتها مباشرةً في الدم دون قنوات — تؤثر في النمو والمزاج والسلوك — أهمها: النخامية والدرقية والكظرية","غدد اللعاب فقط","غدد تُنتج الخلايا الدموية"],ans:1,exp:"الغدد الصماء (Endocrine Glands) تُفرز هرموناتها مباشرةً في الدم. أهمها: (1) النخامية (القائدة): تتحكم في الغدد الأخرى وتُفرز هرمون النمو. (2) الدرقية: تنظم معدل الأيض والطاقة. (3) الكظرية (فوق الكلية): تُفرز الأدرينالين في حالات الطوارئ. (4) البنكرياس: ينظم سكر الدم. تؤثر اضطراباتها في السلوك والمزاج والنمو."},
  {q:"ما تأثير الغدة الكظرية (الأدرينالين) على السلوك في حالات الطوارئ؟",opts:["يُبطئ كل وظائف الجسم","يُحضِّر الجسم للمواجهة أو الهروب (Fight or Flight): يرفع ضربات القلب وضغط الدم وسكر الدم ويوسع الحدقة","لا تأثير له على السلوك","يُسبّب النوم العميق"],ans:1,exp:"في حالات الخطر والتوتر تُفرز الغدة الكظرية الأدرينالين (Adrenaline) الذي يُحضّر الجسم لـ Fight or Flight: يرفع ضربات القلب والتنفس، يرفع سكر الدم للطاقة، يوسّع الحدقة للرؤية الأوضح، ويُحوّل الدم للعضلات الكبيرة. هذه الاستجابة فطرية وتلقائية يتحكم فيها الجهاز العصبي اللاإرادي."},
  // الفصل الثالث: دوافع السلوك
  {q:"ما تعريف الدافع وما الفرق بين الدوافع الأولية والثانوية؟",opts:["الدافع: القوة التي توقف السلوك","الدافع: قوة داخلية تحرك السلوك وتوجهه نحو هدف — الأولية: فطرية بيولوجية (جوع وعطش ونوم) — الثانوية: مكتسبة اجتماعية (انتماء وإنجاز وسيطرة)","الدوافع كلها مكتسبة","الدوافع الأولية هي الاجتماعية"],ans:1,exp:"الدافع: حالة داخلية تُحرّك السلوك وتوجهه نحو هدف معين. الدوافع الأولية (الفسيولوجية): فطرية موجودة عند كل الكائنات كالجوع والعطش والنوم والجنس وتجنّب الألم. الدوافع الثانوية (الاجتماعية/النفسية): مكتسبة تنشأ بالتعلم والخبرة الاجتماعية كالانتماء والإنجاز والسيطرة والتملّك."},
  {q:"ما هرم ماسلو للحاجات وما ترتيبه؟",opts:["الحاجات العليا قبل الأساسية","الحاجات الفسيولوجية (الأساس) ← الأمان ← الانتماء ← التقدير ← تحقيق الذات (القمة)","التقدير أولاً ثم الانتماء","الحاجات كلها متساوية"],ans:1,exp:"Abraham Maslow رتّب الحاجات الإنسانية هرمياً من الأساس للقمة: (1) الفسيولوجية: الطعام والماء والنوم. (2) الأمان: الحماية والاستقرار. (3) الانتماء والحب: العلاقات الاجتماعية. (4) التقدير والاحترام: النجاح والاعتراف. (5) تحقيق الذات: إطلاق الطاقات والإبداع. الحاجات الأدنى يجب إشباعها قبل الأعلى."},
  // الفصل الرابع: الانفعالات
  {q:"ما تعريف الانفعال وما مكوناته الثلاثة؟",opts:["الانفعال حالة ثابتة لا تتغير","الانفعال استجابة وجدانية مؤقتة لمثير — مكوناته: الجانب الذاتي (الشعور) + الجانب الفسيولوجي (تغيرات جسمية) + الجانب السلوكي (تعبير خارجي)","الانفعال مرض نفسي","الانفعال تفكير عقلاني فقط"],ans:1,exp:"الانفعال: استجابة وجدانية مؤقتة تنشأ عن مثير معين (حدث/موقف). مكوناته الثلاثة: (1) الذاتي: الشعور الداخلي بالخوف أو الفرح. (2) الفسيولوجي: تغيرات جسمية كتسارع القلب وتعرق الكفين وتوتر العضلات. (3) السلوكي: التعبير الخارجي كتعابير الوجه والحركات. الانفعالات الأساسية عالمية: خوف، غضب، فرح، حزن، اشمئزاز، مفاجأة."},
  {q:"ما العلاقة بين درجة الاستثارة الانفعالية والأداء (قانون يركس-دودسون)؟",opts:["كلما زاد الانفعال زاد الأداء دائماً","علاقة منحنى مقلوب (جرس): الاستثارة المعتدلة تُعطي أفضل أداء، أما الاستثارة المنخفضة جداً أو المرتفعة جداً فتُقلّل الأداء","الانفعال لا علاقة له بالأداء","كلما قلّ الانفعال زاد الأداء دائماً"],ans:1,exp:"قانون Yerkes-Dodson: العلاقة بين الاستثارة الانفعالية والأداء منحنى على شكل جرس مقلوب (U مقلوب). مستوى انفعال منخفض جداً: أداء ضعيف (خمول). مستوى معتدل: أفضل أداء. مستوى عالٍ جداً: أداء يتراجع (قلق وتشتت). لذا يُفضَّل للمهام الصعبة مستوى انفعال معتدل أو منخفض نسبياً."},
  {q:"ما الفرق الجوهري بين الدوافع والانفعالات؟",opts:["لا فرق بينهما","الدوافع تُحرّك السلوك نحو هدف وتنتهي بتحقيقه — الانفعالات استجابة وجدانية مؤقتة لمثير خارجي أو داخلي وقد تُعطي الدوافعَ قوتها","الانفعالات دائمة والدوافع مؤقتة","الدوافع خارجية والانفعالات داخلية"],ans:1,exp:"الدوافع: حالة داخلية مستمرة نسبياً تُحرّك الكائن نحو هدف وتنتهي بإشباعه (الجوع دافع يُعطى حتى الأكل). الانفعالات: استجابات وجدانية مؤقتة ومفاجئة لمثير معين (الخوف من الكلب). العلاقة: الانفعالات قد تُقوّي الدوافع أو تُعيقها؛ فالخوف من الفشل (انفعال) قد يُعزّز دافع الإنجاز أو يُعيقه."},
  {q:"ما أبرز الانفعالات الأساسية وكيف تتطور لدى الطفل؟",opts:["الانفعالات تظهر كلها دفعة واحدة عند الولادة","الطفل يُولد بانفعالات بسيطة (بكاء ورضا) ثم تتمايز تدريجياً: الابتسامة الاجتماعية (شهرين) — الخوف من الغرباء (8 أشهر) — الغيرة (سنة) — الحب والإحراج والذنب لاحقاً","انفعالات الطفل لا تختلف عن البالغ من البداية","الطفل لا يُعبّر عن انفعالات قبل سنة"],ans:1,exp:"تطور الانفعالات عند الطفل يسير تدريجياً: مرحلة المهد: بكاء (ألم وجوع) ورضا (إشباع). شهران: الابتسامة الاجتماعية. 4-6 أشهر: غضب وحزن واضح. 8-9 أشهر: خوف من الغرباء وقلق الانفصال. 12-18 شهراً: غيرة وتعاطف بسيط. 2-3 سنوات: انفعالات معقدة كالإحراج والذنب والفخر. التنشئة الاجتماعية تُشكّل التعبير الانفعالي."}
];
const L=["أ","ب","ج","د"],FN=[["🌟 ممتاز!","جميع الإجابات صحيحة!","⭐⭐⭐⭐⭐"],["🔥 رائع!","تقريباً مثالي!","⭐⭐⭐⭐"],["👍 أحسنت!","نتيجة جيدة!","⭐⭐⭐"],["💡 حاول مجدداً!","راجع الملاحظات!","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#22d3ee','#fff','#67e8f9','#0e7490'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(34,211,238,${(1-d/130)*.07})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(34,211,238,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
function lq(){ans=false;document.getElementById('nb').classList.remove('show');const ex=document.getElementById('ex');ex.classList.remove('show');ex.style.display='none';const q=QS[cq];document.getElementById('pf').style.width=((cq/QS.length)*100)+'%';document.getElementById('pl').textContent='السؤال '+(cq+1)+' من '+QS.length;document.getElementById('qn').textContent='QUESTION '+String(cq+1).padStart(2,'0');const qc=document.getElementById('qc');qc.classList.remove('si');void qc.offsetWidth;qc.classList.add('si');document.getElementById('qt').textContent=q.q;const og=document.getElementById('og');og.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="ltr">${L[i]}</span><span>${o}</span>`;b.addEventListener('click',()=>pick(i,b));og.appendChild(b)});bsb()}
function pick(idx,btn){if(ans)return;ans=true;const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);const fb=document.getElementById('fb');fb.classList.remove('sc','wr');if(idx===q.ans){btn.classList.add('correct');sc+=10;const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);fb.textContent=['✅','🎯','⭐','🔥'][Math.floor(Math.random()*4)];fb.classList.add('sc');for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);setTimeout(()=>document.getElementById('nb').classList.add('show'),500)}else{btn.classList.add('wrong');bs[q.ans].classList.add('correct');fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);setTimeout(()=>document.getElementById('nb').classList.add('show'),350)}bsb()}
function nxt(){cq++;if(cq<QS.length)lq();else sf()}
function sf(){document.getElementById('qs').style.display='none';document.getElementById('fs').classList.add('vis');document.getElementById('fsn').textContent=sc;const p=sc/(QS.length*10),f=p===1?FN[0]:p>=.75?FN[1]:p>=.5?FN[2]:FN[3];document.getElementById('ftl').textContent=f[0];document.getElementById('fmg').textContent=f[1];document.getElementById('fst').textContent=f[2];setTimeout(()=>{for(let i=0;i<8;i++)setTimeout(()=>lc(innerWidth*Math.random(),-20),i*100)},250)}
function rst(){cq=0;sc=0;ans=false;cf=[];document.getElementById('sv').textContent='0';document.getElementById('fs').classList.remove('vis');document.getElementById('qs').style.display='flex';lq()}
lq();
</script></body></html>
