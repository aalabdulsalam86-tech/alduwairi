<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>إسلامية — الفصل الثاني | حقوق المخلوقين والسيرة النبوية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#a3e635;--c2:#4d7c0f;--bg:#030800;--brd:rgba(163,230,53,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr"><div class="logo">☪️ إسلامية — الفصل الثاني</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>

</div>

  <div class="fstars" id="fst"></div><div class="ftitle" id="ftl"></div>

  <span class="bhome" onclick="window.history.back()">← العودة للموقع</span>
</div>
<script>
const QS=[
  // حقوق المخلوقين
  {q:"ما حقوق الوالدين في الإسلام وما منزلتها؟",opts:["لا حقوق خاصة للوالدين","بر الوالدين قرين التوحيد في القرآن — طاعتهما في غير معصية — الإنفاق عليهما عند الحاجة — الدعاء لهما حياً وميتاً — تكريمهما وعدم التأفف — خفض جناح الذل رحمةً لهما","حقوقهما محدودة بالطاعة فقط","حقوقهما تنتهي بالبلوغ"],ans:1,exp:"حقوق الوالدين من أعظم الحقوق: قرن الله طاعتهما بعبادته: (وَقَضَىٰ رَبُّكَ أَلَّا تَعْبُدُوا إِلَّا إِيَّاهُ وَبِالْوَالِدَيْنِ إِحْسَانًا). حقوقهما: الطاعة في غير المعصية، الإنفاق، الدعاء (رَّبِّ ارْحَمْهُمَا كَمَا رَبَّيَانِي صَغِيرًا)، عدم التأفف (لا تقل لهما أف)، زيارتهما، احترام أصدقائهما. ويستمر البر بهما بعد وفاتهما بالصدقة والدعاء وصلة الرحم التي كانا يصلانها."},
  {q:"ما حقوق الزوجين على بعضهما في الإسلام؟",opts:["الحقوق للزوج فقط","حقوق مشتركة: حسن العشرة والمعاملة — للزوجة: المهر والنفقة والسكن وحسن المعاملة — للزوج: الطاعة في المعروف وحفظ بيته وأولاده والتفرغ لشؤون الأسرة","حقوق الزوجة أكثر دائماً","لا حقوق محددة بين الزوجين"],ans:1,exp:"حقوق الزوجين: للزوجة على زوجها: المهر كاملاً، النفقة (مسكن وطعام وكسوة)، حسن المعاملة والعشرة، الإنصاف والعدل عند التعدد، عدم الإضرار. للزوج على زوجته: الطاعة في المعروف، حفظ بيته وأولاده، عدم إدخال من يكره بيته، الحفاظ على ماله. المشترك: المعاشرة بالمعروف، التعاون على شؤون الحياة، التكامل والاحترام المتبادل."},
  {q:"ما حقوق الجيران في الإسلام وحدود الجيرة؟",opts:["لا حقوق محددة للجيران","حقوق الجيران: كف الأذى — المساعدة عند الحاجة — عدم الغيبة والنميمة — السلام عليه — مشاركته أفراحه وأتراحه — حد الجيرة: أربعون داراً من كل جهة","الجيران ليس لهم حقوق شرعية","حقوق الجيران مؤقتة"],ans:1,exp:"حقوق الجيران من أهم الحقوق الاجتماعية في الإسلام. قال ﷺ: «ما زال جبريل يوصيني بالجار حتى ظننت أنه سيورّثه». حقوقه: كف الأذى عنه قولاً وفعلاً، مساعدته عند الحاجة، إطعامه إن احتاج، السلام عليه، مشاركته الأفراح والأحزان، عدم التجسس عليه، ستر عيوبه. حد الجيرة: أربعون داراً من كل جهة وفق بعض العلماء. قال ﷺ: «ليس المؤمن الذي يشبع وجاره جائع إلى جنبه»."},
  {q:"ما حقوق ذوي الاحتياجات الخاصة والضعفاء في الإسلام؟",opts:["لا حقوق لهم في الشريعة","الرعاية والعناية — عدم الاستهزاء والسخرية — الإدماج في المجتمع — الكفالة المادية للعاجز — ضمان حقوقهم القانونية — الدولة والمجتمع مسؤولان عن رعايتهم","هم أنفسهم مسؤولون عن أنفسهم","حقوقهم مقيّدة بالقدرة"],ans:1,exp:"الإسلام أعلى من شأن الضعفاء ورعايتهم: قال ﷺ: «هل تُنصرون وتُرزقون إلا بضعفائكم؟». حقوقهم: (1) عدم السخرية والاستهزاء. (2) الرعاية والكفالة المادية من الدولة والأسرة والمجتمع. (3) إتاحة فرص العمل والتعليم المناسب. (4) حفظ كرامتهم الإنسانية. (5) إدماجهم في الحياة الاجتماعية. وقد كرّم الإسلام كثيراً من الصحابة ذوي الإعاقات وجعلهم قادة ومعلمين."},
  // السيرة النبوية: الحسن والحسين
  {q:"ما مكانة الحسن والحسين رضي الله عنهما عند النبي ﷺ وما الأحاديث الدالة على ذلك؟",opts:["لم يُذكرا في السنة بشكل خاص","هما سيدا شباب أهل الجنة — كان ﷺ يحبهما حباً شديداً — قال ﷺ: (الحسن والحسين سيدا شباب أهل الجنة) — كان يحملهما على كتفيه ويلاعبهما ويُقبّلهما أمام الصحابة","مكانتهما عادية كبقية الصحابة","لا أحاديث خاصة بهما"],ans:1,exp:"مكانة الحسن والحسين رضي الله عنهما: هما ابنا علي بن أبي طالب وفاطمة الزهراء بنت النبي ﷺ. قال ﷺ: «الحسن والحسين سيدا شباب أهل الجنة». كان ﷺ يحبهما كثيراً؛ يحملهما على كتفيه ويلاعبهما، وكان يقطع خطبته أحياناً لحمل الحسين عند نزوله من المنبر. قال ﷺ: «من أحب الحسن والحسين فقد أحبني، ومن أبغضهما فقد أبغضني»."},
  {q:"ما أبرز صفات الحسن بن علي رضي الله عنه وما موقفه التاريخي الكبير؟",opts:["لم تكن له صفات بارزة","كان يشبه النبي ﷺ في خَلقه وخُلقه — عُرف بالحلم والكرم والتقوى — تنازل عن الخلافة لمعاوية بن أبي سفيان عام 41هـ (عام الجماعة) حقناً لدماء المسلمين — تحقق فيه قول النبي: (إن ابني هذا سيد وسيصلح الله به بين فئتين عظيمتين)","كان يشبه عمر بن الخطاب","تولى الخلافة طويلاً"],ans:1,exp:"الحسن بن علي رضي الله عنه: وُلد عام 3هـ. كان يشبه النبي ﷺ في صورته وهديه. عُرف بالحلم الشديد: قيل كان من أحلم الناس وأكثرهم عفواً. كان كريماً جواداً. تنازل عن الخلافة لمعاوية رضي الله عنه عام 41هـ تحقيقاً للوحدة وحقناً للدماء فسُمّي هذا العام عام الجماعة. قال عنه النبي ﷺ: «إن ابني هذا سيد ولعل الله يُصلح به بين فئتين عظيمتين من المسلمين». استُشهد عام 50هـ."},
  {q:"ما أبرز صفات الحسين بن علي رضي الله عنه وما الظروف التي أحاطت بمقتله؟",opts:["استشهد في معركة بدر","كان يشبه النبي ﷺ من السرة إلى القدم — عُرف بالشجاعة والكرم — خرج إلى الكوفة بعد مبايعة أهلها له — استشهد في كربلاء يوم عاشوراء 10 محرم 61هـ على يد جيش عبيد الله بن زياد","استشهد في معركة أحد","خرج لمحاربة الروم"],ans:1,exp:"الحسين بن علي رضي الله عنه: وُلد عام 4هـ. كان يشبه النبي ﷺ من السرة إلى القدم. عُرف بالشجاعة والتقوى والكرم. بعد وفاة معاوية وتولي يزيد: كاتبه أهل الكوفة وبايعوه فخرج إليهم مع أهل بيته وصحبه. لكن أهل الكوفة تخلّوا عنه. وقف الحسين وقلّة من أصحابه في كربلاء بالعراق أمام جيش ابن زياد. استُشهد يوم عاشوراء 10 محرم 61هـ ودُفن في كربلاء. استشهاده مأساة عظيمة في تاريخ الإسلام."},
  {q:"ما العبر والدروس المستفادة من سيرة الحسن والحسين رضي الله عنهما؟",opts:["لا دروس تُستفاد","الحسن: الحلم والتنازل عن حق مشروع لحقن الدماء — الحسين: الشجاعة والتمسك بالمبدأ — كلاهما: حب آل بيت النبي ﷺ واجب — الوحدة الإسلامية أغلى من المناصب — الابتعاد عن الفتن","الدروس سياسية فقط","درس واحد: الطاعة للحاكم"],ans:1,exp:"الدروس والعبر من سيرتيهما: (1) الحلم وإيثار الوحدة: تنازل الحسن عن الخلافة حقناً للدماء مثال خالد على تقديم مصلحة الأمة. (2) الشجاعة والثبات على المبدأ: وقوف الحسين رغم قلة ناصريه. (3) محبة آل البيت: واجبة بنص القرآن (قل لا أسألكم أجراً إلا المودة في القربى). (4) الابتعاد عن الفتن: خطرها على الأمة. (5) تعليمنا أن المسلم يتمسك بمبادئه ويرفض الظلم. (6) حقن الدماء مقدّم على أي مطمع دنيوي."},
  {q:"ما موقف الخليفتين أبي بكر وعمر رضي الله عنهما من الحسن والحسين؟",opts:["لم يكن لهما موقف منهما","كانا يُجلاّنهما ويُحبانهما لحب النبي ﷺ — أبو بكر: كان يُكرمهما ويقول (هما من شجرة النبي) — عمر: كان يفسح لهما في المجلس ويقدّمهما — كلاهما حرص على رعاية آل البيت وإكرامهم","كانا يتجنبانهما","كانا على خلاف معهما"],ans:1,exp:"موقف الخليفتين أبي بكر وعمر رضي الله عنهما: كانا يُكرمان الحسن والحسين ويُحبانهما لحب النبي ﷺ. أبو بكر الصديق رضي الله عنه: كان يُكرمهما ويُعبّر عن محبته لآل بيت النبي ﷺ ويقول: «وَالَّذِي نَفْسِي بِيَدِهِ لَقَرَابَةُ رَسُولِ اللهِ أَحَبُّ إِلَيَّ أَنْ أَصِلَ مِنْ قَرَابَتِي». عمر بن الخطاب رضي الله عنه: كان يُفسح لهما في المجلس ويُقدّمهما. موقفهما يؤكد أن محبة آل البيت من الصحابة وأجمع المسلمين."},
  {q:"ما الحكمة من اهتمام الإسلام بدراسة سير الصالحين كالحسن والحسين؟",opts:["اهتمام ثقافي تاريخي فقط","الاقتداء بأخلاقهم وصفاتهم — استلهام الهداية والتوجيه — تعزيز الهوية الإسلامية — تحصين الشباب من الانحراف — الفخر بالتراث الإسلامي — تعليم كيفية مواجهة التحديات بصبر وإيمان","دراسة تاريخية لا علاقة لها بالحاضر","لا حكمة محددة"],ans:1,exp:"الحكمة من دراسة سير الصالحين: (1) الاقتداء: قال تعالى: (لَقَدْ كَانَ فِي قَصَصِهِمْ عِبْرَةٌ لِّأُولِي الْأَلْبَابِ). (2) استلهام الحكمة والهداية من تجاربهم. (3) تعزيز الانتماء للهوية الإسلامية وتجذيره. (4) تحصين الشباب: معرفة السيرة والتاريخ تحمي من الأفكار المنحرفة. (5) الفخر الحقيقي: الفخر بأسلاف صالحين لا بأمجاد وهمية. (6) التعلم العملي: كيف يواجه المؤمن المحن والفتن بإيمان وصبر وحكمة."}
];
const L=["أ","ب","ج","د"],FN=[["🌟 ممتاز!","جميع الإجابات صحيحة!","⭐⭐⭐⭐⭐"],["🔥 رائع!","تقريباً مثالي!","⭐⭐⭐⭐"],["👍 أحسنت!","نتيجة جيدة!","⭐⭐⭐"],["💡 حاول مجدداً!","راجع الملاحظات!","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#a3e635','#fff','#d9f99d','#4d7c0f'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(163,230,53,${(1-d/130)*.07})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(163,230,53,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
function lq(){ans=false;document.getElementById('nb').classList.remove('show');const ex=document.getElementById('ex');ex.classList.remove('show');ex.style.display='none';const q=QS[cq];document.getElementById('pf').style.width=((cq/QS.length)*100)+'%';document.getElementById('pl').textContent='السؤال '+(cq+1)+' من '+QS.length;document.getElementById('qn').textContent='QUESTION '+String(cq+1).padStart(2,'0');const qc=document.getElementById('qc');qc.classList.remove('si');void qc.offsetWidth;qc.classList.add('si');document.getElementById('qt').textContent=q.q;const og=document.getElementById('og');og.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="ltr">${L[i]}</span><span>${o}</span>`;b.addEventListener('click',()=>pick(i,b));og.appendChild(b)});bsb()}
function pick(idx,btn){if(ans)return;ans=true;const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);const fb=document.getElementById('fb');fb.classList.remove('sc','wr');if(idx===q.ans){btn.classList.add('correct');sc+=10;const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);fb.textContent=['✅','🎯','⭐','🔥'][Math.floor(Math.random()*4)];fb.classList.add('sc');for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);setTimeout(()=>document.getElementById('nb').classList.add('show'),500)}else{btn.classList.add('wrong');bs[q.ans].classList.add('correct');fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);setTimeout(()=>document.getElementById('nb').classList.add('show'),350)}bsb()}
function nxt(){cq++;if(cq<QS.length)lq();else sf()}
function sf(){document.getElementById('qs').style.display='none';document.getElementById('fs').classList.add('vis');document.getElementById('fsn').textContent=sc;const p=sc/(QS.length*10),f=p===1?FN[0]:p>=.75?FN[1]:p>=.5?FN[2]:FN[3];document.getElementById('ftl').textContent=f[0];document.getElementById('fmg').textContent=f[1];document.getElementById('fst').textContent=f[2];setTimeout(()=>{for(let i=0;i<8;i++)setTimeout(()=>lc(innerWidth*Math.random(),-20),i*100)},250)}
function rst(){cq=0;sc=0;ans=false;cf=[];document.getElementById('sv').textContent='0';document.getElementById('fs').classList.remove('vis');document.getElementById('qs').style.display='flex';lq()}
lq();
</script></body></html>
