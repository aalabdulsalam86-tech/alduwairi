<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>أحياء — الفصل الثاني | الوراثة والخلية والعمليات الخلوية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#34d399;--c2:#047857;--bg:#00090a;--brd:rgba(52,211,153,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr"><div class="logo">🧬 أحياء — الفصل الثاني</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
  <div class="plbl" id="pl"></div><div class="sbar" id="sbar"></div>
  <div class="qcard" id="qc">
    <div class="qn" id="qn"></div><div class="qt" id="qt"></div>
    <div class="opts" id="og"></div><div class="exp" id="ex"></div>
    <button class="nbtn" id="nb" onclick="nxt()">التالي ←</button>
  </div>
</div>
<div class="final" id="fs">
  <div class="fstars" id="fst"></div><div class="ftitle" id="ftl"></div>
  <div class="fmsg" id="fmg"></div>
  <div class="fsbox"><div class="fslbl">مجموع النقاط</div><div class="fsnum" id="fsn">0</div></div>
  <button class="rbtn" onclick="rst()">🔄 إعادة المحاولة</button>
  <span class="bhome" onclick="window.history.back()">← العودة للموقع</span>
</div>
<script>
const QS=[
  // DNA والوراثة الجزيئية
  {q:"ما تركيب جزيء DNA ومن اكتشف بنيته الحلزونية؟",opts:["بروتين أحادي السلسلة","حلزون مزدوج Double Helix من خيطين متوازيين من النيوكليوتيدات — اكتشفه Watson وCrick عام 1953 بمساعدة صور أشعة X لـ Rosalind Franklin","بروتين مزدوج","سلسلة أحادية من الأحماض الأمينية"],ans:1,exp:"DNA (Deoxyribonucleic Acid): جزيء Double Helix مؤلف من خيطين متوازيين من Nucleotides. كل Nucleotide = سكر ديوكسيريبوز + فوسفات + قاعدة نيتروجينية. القواعد الأربعة: A (أدينين) يرتبط بـ T (ثايمين)، G (جوانين) يرتبط بـ C (سيتوزين) — Complementary Base Pairing. Watson وCrick 1953. الدليل جاء من صور Rosalind Franklin بالأشعة X."},
  {q:"ما تجربة هيرشي وتشيس (Hershey-Chase 1952) وماذا أثبتت؟",opts:["أثبتت أن البروتين هو المادة الوراثية","أثبتت أن DNA هو المادة الوراثية: استخدما العاثيات (Bacteriophages) وعلّموا البروتين بـ S35 والـ DNA بـ P32 — وجدوا P32 داخل البكتيريا فقط → الـ DNA هو الذي يدخل البكتيريا ويحمل المعلومات الوراثية","لم تُثبت شيئاً","أثبتت أن RNA هو المادة الوراثية"],ans:1,exp:"تجربة Hershey-Chase 1952: استخدما العاثية T2 Bacteriophage. علّموا البروتين بـ S-35 والـ DNA بـ P-32. عند إصابة البكتيريا ثم فصلها بالطرد المركزي: وجدوا P-32 (DNA) داخل البكتيريا وS-35 (بروتين) خارجها. الاستنتاج: DNA هو المادة الوراثية التي تدخل البكتيريا وتُوجّه تكوين عاثيات جديدة، لا البروتين."},
  {q:"ما مراحل التعبير الجيني (Gene Expression): النسخ والترجمة؟",opts:["DNA → Protein مباشرة","الإطار المركزي: DNA → (Transcription) → mRNA → (Translation) → Protein. النسخ: في النواة بواسطة RNA Polymerase. الترجمة: على الريبوسوم — tRNA يحمل الأحماض الأمينية حسب كودونات mRNA","RNA → DNA → Protein","DNA → Protein → RNA"],ans:1,exp:"Central Dogma of Molecular Biology: DNA → RNA → Protein. Transcription (النسخ): في النواة، RNA Polymerase تنسخ DNA → mRNA. Processing: إزالة Introns والاحتفاظ بـ Exons (Splicing). Translation (الترجمة): في الريبوسوم، mRNA يُقرأ بوحدات Codons (3 قواعد)، كل Codon يحدد حمضاً أمينياً، tRNA يحمل AA المناسب → تتشكّل سلسلة Polypeptide = بروتين."},
  {q:"ما الطفرات الجينية (Mutations) وما أنواعها الرئيسية؟",opts:["الطفرات مفيدة دائماً","تغيّرات في تسلسل DNA — الأنواع: Substitution (إحلال قاعدة) — Insertion (إدراج قاعدة) — Deletion (حذف قاعدة) — Substitution قد لا تُغيّر البروتين (صامتة) أو تُغيّره (خاطئة) أو تُوقف Nonsense","الطفرات لا تؤثر في البروتينات","نوع واحد فقط: Deletion"],ans:1,exp:"الطفرات Point Mutations: Substitution: تبديل قاعدة بأخرى → Silent (لا تغيير في AA) أو Missense (تغيير AA) أو Nonsense (توقف مبكر). Insertion / Deletion: إضافة أو حذف قاعدة → Frameshift Mutation يُغيّر كل الإطار القرائي مما يُسبّب بروتيناً مختلفاً كلياً. الطفرات أسبابها: الإشعاع، المواد الكيميائية المسرطنة، التلقائية. بعضها يُسبّب السرطان أو الأمراض الوراثية."},
  {q:"ما الهندسة الوراثية (Genetic Engineering) وما تطبيقاتها؟",opts:["علم دراسة الوراثة فقط","تقنية تعديل DNA الكائنات الحية باستخدام إنزيمات القطع Restriction Enzymes والـ DNA Recombinant — تطبيقاتها: إنتاج الأنسولين، اللقاحات، المضادات الحيوية، النباتات المقاومة للآفات، العلاج الجيني","تقنية تشغيل الجينات فقط","تقنية لا تطبيقات لها"],ans:1,exp:"Genetic Engineering: تعديل DNA الكائنات باستخدام: Restriction Enzymes: تقطع DNA في مواضع محددة. DNA Ligase: تلصق أجزاء DNA. Vectors (البلازميدات Plasmids): تحمل الجين للخلية المستهدفة. تطبيقات: (1) إنتاج الأنسولين البشري في البكتيريا. (2) هرمون النمو الإنساني. (3) اللقاحات (Hepatitis B). (4) المحاصيل المعدّلة وراثياً GMO (مقاومة الحشرات والجفاف). (5) العلاج الجيني Gene Therapy."},
  // الخلية والعمليات الخلوية
  {q:"ما مراحل الانقسام الميوزي (Meiosis) وما نتيجته؟",opts:["ينتج خليتين متطابقتين","ينقسم في مرحلتين: Meiosis I (يفصل الكروموسومات المتماثلة) + Meiosis II (يفصل الكروماتيدات الشقيقة) — الناتج: 4 خلايا أحادية الصيغة (n) غير متطابقة جينياً — يحدث في الغدد التناسلية لإنتاج الأمشاج","ينقسم مرة واحدة فقط","ينتج خليتين ثنائيتي الصيغة"],ans:1,exp:"Meiosis ينتج الأمشاج Gametes في الغدد التناسلية: Meiosis I: يفصل الكروموسومات المتماثلة Homologous Chromosomes → خليتان (n). خلاله تحدث Crossing Over (تبادل أجزاء بين الكروموسومات المتماثلة → تنوع وراثي). Meiosis II: يشبه الميتوزيس، يفصل الكروماتيدات الشقيقة → 4 خلايا (n). التنوع الجيني: من Crossing Over + الفصل العشوائي للكروموسومات Independent Assortment."},
  {q:"ما الفرق بين Mitosis وMeiosis من حيث النتيجة والمكان والغرض؟",opts:["كلاهما متطابقان","Mitosis: ينتج خليتين (2n) متطابقتين — يحدث في خلايا الجسم — للنمو والإصلاح. Meiosis: ينتج 4 خلايا (n) متنوعة جينياً — يحدث في الغدد التناسلية — لإنتاج الأمشاج","Meiosis ينتج خليتين أيضاً","Mitosis ينتج 4 خلايا"],ans:1,exp:"المقارنة: Mitosis: خليتان (2n) متطابقتان للأم، في خلايا الجسم الجسدية، للنمو وتجديد الأنسجة وإصلاح الجروح. Meiosis: 4 خلايا (n) متنوعة جينياً، في الغدد التناسلية فقط، لإنتاج الأمشاج (حيوانات منوية وبويضات). الميتوزيس مرحلة واحدة، الميوزيس مرحلتان."},
  {q:"ما التنفس الخلوي (Cellular Respiration) ومراحله الرئيسية؟",opts:["تنفس الهواء فقط","تحويل الجلوكوز إلى طاقة ATP — المراحل: Glycolysis (في السيتوبلازم) → Krebs Cycle (في مصفوفة الميتوكوندريا) → سلسلة نقل الإلكترون (على الغشاء الداخلي للميتوكوندريا) — الناتج الكلي: ~36-38 ATP","يحدث في النواة فقط","مرحلة واحدة فقط"],ans:1,exp:"Cellular Respiration: C6H12O6 + 6O2 → 6CO2 + 6H2O + ATP. المراحل: (1) Glycolysis: في السيتوبلازم، تحليل الجلوكوز → 2 بيروفات + 2 ATP + 2 NADH. (2) Pyruvate Oxidation: تحويل البيروفات → Acetyl-CoA. (3) Krebs Cycle (Citric Acid Cycle): في المصفوفة، ينتج NADH وFADH2. (4) Electron Transport Chain: على الغشاء الداخلي، ينتج معظم ATP (~32-34). المجموع: ~36-38 ATP."},
  {q:"ما التركيب الضوئي (Photosynthesis) ومعادلته وأين يحدث؟",opts:["يحدث في الميتوكوندريا","يحدث في البلاستيدات الخضراء (Chloroplasts) — التفاعل الضوئي Light Reactions (في الغرانا): ماء + ضوء → ATP + NADPH + O2 — دورة كالفن Dark Reactions (في السدى): CO2 + ATP + NADPH → جلوكوز","يحدث في النواة","الناتج ثاني أكسيد الكربون فقط"],ans:1,exp:"Photosynthesis: 6CO2 + 6H2O + Light → C6H12O6 + 6O2. يحدث في Chloroplasts في الخلايا النباتية. مرحلتان: Light Reactions (في Thylakoid Membrane/Grana): الضوء يُفكّك الماء Photolysis → ينتج O2 وATP وNADPH. Calvin Cycle / Dark Reactions (في Stroma): يستخدم CO2 + ATP + NADPH → G3P → جلوكوز. الكلوروفيل يمتص ضوء أحمر وأزرق بشكل أساسي."},
  {q:"ما التقنية المتسلسلة للبلمرة (PCR) واستخداماتها؟",opts:["تقنية لعزل البروتينات","تقنية تضخيم DNA بشكل كبير في المختبر — خطواتها: Denaturation (فصل الخيطين بالحرارة 94°C) → Annealing (ارتباط Primers عند 55°C) → Extension (بناء خيط جديد بـ DNA Polymerase عند 72°C) — تُستخدم في الطب الشرعي والتشخيص والتحقيق الجنائي","تقنية تعديل البروتينات","تقنية لفصل الكروموسومات"],ans:1,exp:"PCR (Polymerase Chain Reaction): اكتشفها Dr. Kary Mullis 1983. تُضاعف DNA ملايين المرات في ساعات. الدورة الحرارية: Denaturation 94°C: فصل الخيطين. Annealing 55°C: ارتباط Primers (قصيرة مكملة). Extension 72°C: Taq DNA Polymerase تبني الخيط الجديد. كل دورة تُضاعف الـ DNA مرتين → 30 دورة = 2^30 نسخة. تطبيقات: الطب الشرعي (تحديد الهوية)، تشخيص الأمراض (COVID-19)، أبحاث الجينوم، تحديد الأبوة."}
];
const L=["أ","ب","ج","د"],FN=[["🌟 ممتاز!","جميع الإجابات صحيحة!","⭐⭐⭐⭐⭐"],["🔥 رائع!","تقريباً مثالي!","⭐⭐⭐⭐"],["👍 أحسنت!","نتيجة جيدة!","⭐⭐⭐"],["💡 حاول مجدداً!","راجع الملاحظات!","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#34d399','#fff','#6ee7b7','#047857'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(52,211,153,${(1-d/130)*.07})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(52,211,153,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
function lq(){ans=false;document.getElementById('nb').classList.remove('show');const ex=document.getElementById('ex');ex.classList.remove('show');ex.style.display='none';const q=QS[cq];document.getElementById('pf').style.width=((cq/QS.length)*100)+'%';document.getElementById('pl').textContent='السؤال '+(cq+1)+' من '+QS.length;document.getElementById('qn').textContent='QUESTION '+String(cq+1).padStart(2,'0');const qc=document.getElementById('qc');qc.classList.remove('si');void qc.offsetWidth;qc.classList.add('si');document.getElementById('qt').textContent=q.q;const og=document.getElementById('og');og.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="ltr">${L[i]}</span><span>${o}</span>`;b.addEventListener('click',()=>pick(i,b));og.appendChild(b)});bsb()}
function pick(idx,btn){if(ans)return;ans=true;const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);const fb=document.getElementById('fb');fb.classList.remove('sc','wr');if(idx===q.ans){btn.classList.add('correct');sc+=10;const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);fb.textContent=['✅','🎯','⭐','🔥'][Math.floor(Math.random()*4)];fb.classList.add('sc');for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);setTimeout(()=>document.getElementById('nb').classList.add('show'),500)}else{btn.classList.add('wrong');bs[q.ans].classList.add('correct');fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);setTimeout(()=>document.getElementById('nb').classList.add('show'),350)}bsb()}
function nxt(){cq++;if(cq<QS.length)lq();else sf()}
function sf(){document.getElementById('qs').style.display='none';document.getElementById('fs').classList.add('vis');document.getElementById('fsn').textContent=sc;const p=sc/(QS.length*10),f=p===1?FN[0]:p>=.75?FN[1]:p>=.5?FN[2]:FN[3];document.getElementById('ftl').textContent=f[0];document.getElementById('fmg').textContent=f[1];document.getElementById('fst').textContent=f[2];setTimeout(()=>{for(let i=0;i<8;i++)setTimeout(()=>lc(innerWidth*Math.random(),-20),i*100)},250)}
function rst(){cq=0;sc=0;ans=false;cf=[];document.getElementById('sv').textContent='0';document.getElementById('fs').classList.remove('vis');document.getElementById('qs').style.display='flex';lq()}
lq();
</script></body></html>
