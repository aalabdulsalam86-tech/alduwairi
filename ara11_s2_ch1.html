rder-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}} .exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:n <script>
const QS=[{"q": "ما صفات أولي الألباب في سورة آل عمران وما الذي يجمع بينها؟", "opts": ["كثرة العبادة الظاهرة المرئية فقط", "الجمع بين العقل والقلب: الذكر الدائم (قياماً وقعوداً وعلى جنوب) والتفكر في الخلق — ثم الدعاء: ﴿رَبَّنَا مَا خَلَقْتَ هَذَا بَاطِلًا﴾. هذا نموذج يجمع العقل الناقد مع القلب المؤمن: التأمل يُفضي للإيمان والإيمان يُغذّي التأمل", "التعلم والدراسة الأكاديمية فقط", "الانعزال والعبادة دون مشاركة في الحياة"], "ans": 1, "exp": "أولو الألباب (آل عمران:191): ﴿الَّذِينَ يَذْكُرُونَ اللَّهَ قِيَامًا وَقُعُودًا وَعَلَىٰ جُنُوبِهِمْ وَيَتَفَكَّرُونَ فِي خَلْقِ السَّمَاوَاتِ وَالْأَرْضِ﴾. الجمع بين العقل والقلب هو أعلى مراتب الإنسانية في القرآن. التفكر: وظيفة عقلية. الذكر: وظيفة قلبية. الدعاء: ثمرة الجمع بينهما."}, {"q": "ما مفهوم «منبع السحر في القرآن الكريم» وما مصادر الجمال البياني القرآني؟", "opts": ["يُقصد بالسحر: الأوهام والغموض في القرآن", "«السحر» هنا بمعنى الجمال الأسري المُعجز الذي يأسر العقول. مصادر الجمال القرآني: (1) الإيقاع الموسيقي والجرس الصوتي. (2) الصور البيانية المؤثرة. (3) الإيجاز البليغ — معانٍ شاملة في ألفاظ قليلة. (4) التنوع الأسلوبي. (5) دقة الاختيار اللغوي — كل كلمة في مكانها لا غيرها", "السحر القرآني هو الأحكام والتشريعات", "لا جمال بيانياً في القرآن — فقط أحكام"], "ans": 1, "exp": "منبع السحر: مفهوم نقدي يُعبّر عن الإعجاز البياني للقرآن. من أسباب الجمال: (1) التوازن: ﴿إن مع العسر يسراً﴾. (2) الإيقاع: انسجام الأصوات. (3) الصورة الحية: الغيبة كأكل لحم الميت. (4) الإجمال ثم التفصيل. (5) الانتقال المدروس بين الأساليب. القرآن «أسمى بيان عربي»."}, {"q": "ما الأسلوب الإنشائي وما أنواعه الطلبية؟", "opts": ["الإنشاء يشمل جمل الخبر أيضاً", "الإنشاء الطلبي يطلب أمراً لم يتحقق: (1) الأمر (افعل): «اقرأ وارقَ». (2) النهي (لا تفعل): «لا تُسرف». (3) الاستفهام (هل؟ من؟ كيف؟): «أيُحِبُّ أحدُكم؟». (4) التمني (ليت): «ليتَ الشبابَ يعود». (5) النداء (يا): «يا أيها الناس». كلها تُعبّر عن طلب أو رغبة", "الإنشاء نوع واحد فقط: الأمر", "الاستفهام ليس من الإنشاء"], "ans": 1, "exp": "الإنشاء الطلبي يطلب تحقيق شيء. أنواعه الخمسة: (1) الأمر: صياغته — فعل أمر / لام جراً وتعريفاً). اللفظي: «قلتُ قلتُ»، «والله والله». المعنوي: نفسُه (يُضاف لضمير: نفسَه، نفسِه حسب الإعراب). كلُّ: تتبع لها الضمير العائد: «الطلابُ كلُّهم». «كافةً» و«جميعُهم» = توكيد بالإجماع."}, {"q": "ما قواعد كتابة الهمزة المتوسطة ومتى تُكتب على النبرة؟", "opts": ["تُكتب على النبرة فقط عند ابتداء الكلمة", "تُكتب على النبرة (ئـ) إذا كانت الهمزة مكسورة أو ما قبلها مكسور — لأن الكسرة أقوى الحركات وتغلب على ما سواها. أمثلة: سُئِل (الهمزة مكسورة)، فِئة (ما قبل الهمزة مكسور). القاعدة العامة: ابحث عن أقوى حركة (كسرة > ضمة > فتحة > سكون)", "تُكتب على النبرة دائماً", "تُكتب على النبرة إذا كانت مضمومة"], "ans": 1, "exp": "الهمزة المتوسطة: تُكتب على الحرف المناسب لأقوى الحركات (الهمزة أو ما قبلها): كسرة → نبرة (ئـ): سُئِل، فِئة. ضمة → واو (ؤ): يُؤمن، رُؤوس. فتحة → ألف (أ): سَأَل، يَأْكُل. سكون: انظر ما قبلها. أو مفردة (ء): بعد ألف المد: جاء، بعد واو مد: ضوء."}, {"q": "ما العطف وما أحرفه ومعانيها الرئيسية؟", "opts": ["العطف: إلحاق اسم بآخر بدون أداة", "العطف: تبعية بحرف. أشهر أحرفه: (1) الواو: مطلق الجمع بلا ترتيب. (2) الفاء: ترتيب مع تعقيب (بلا فاصل). (3) ثم: ترتيب مع تراخٍ (بفاصل زمني). (4) أو: تخيير أو شك. (5) لا: نفي الحكم عما بعدها. (6) بل: إضراب وانتقال. المعطوف يتبع المعطوف عليه في إعرابه", "العطف أداته «كـ» فقط", "المعطوف يُعرب دائماً منصوباً"], "ans": 1, "exp": "أحرف العطف ومعانيها: الواو (لا ترتيب): «جاء علي وخالد». الفاء (تعقيب فوري): «أسلم ثم صلّى ففاز». ثم (تراخٍ): «دخل ثم خرج بعد ساعة». حتى (غاية): «ماتَ الشيوخُ حتى الأطفالِ». أم (استفهام): «أأنت أم أخوك؟». لا (نفي للثاني): «نجح سعدٌ لا عمرٌ». بل (انتقال): «جاء علي بل خالدٌ»."}, {"q": "ما الفاعل ونائب الفاعل وكيف يختلفان في الحكم النحوي؟", "opts": ["كلاهما منصوب يأتي بعد الفعل", "الفاعل: مرفوع يأتي بعد الفعل المبني للمعلوم ويُسند إليه الفعل (هو من فعل). نائب الفاعل: مرفوع يأتي بعد الفعل المبني للمجهول وهو أصلاً مفعول به (الفعل وقع عليه لا منه). مثال: «كتبَ الطالبُ الدرسَ» vs «كُتِبَ الدرسُ» — «الطالب» فاعل، «الدرس» نائب فاعل", "الفاعل منصوب ونائب الفاعل مرفوع", "نائب الفاعل يأتي بعد الفعل المبني للمعلوم"], "ans": 1, "exp": "الفاعل: يأتي بعد الفعل المبني للمعلوم. نائب الفاعل: يأتي بعد الفعل المبني للمجهول وأصله المفعول به الأول. كلاهما مرفوع. الفعل يتطابق معهما في التأنيث: «كتبَتِ الطالبةُ» و«كُتِبَتِ الرسالةُ». إذا تعدد المفاعيل: يُختار المفعول الأول نائباً للفاعل."}, {"q": "ما الجملة الاسمية والجملة الفعلية وما علامة كل منهما في الإعراب؟", "opts": ["الجملة الاسمية تبدأ بفعل والفعلية باسم", "الجملة الاسمية: تبدأ باسم (مبتدأ+خبر): «العلمُ نورٌ». الجملة الفعلية: تبدأ بفعل (فعل+فاعل+مفعول): «يحترمُ الطالبُ أستاذَه». العلامة في الإعراب: إذا وردتا خبراً لمبتدأ أو حالاً أو صفةً تُسمى «في محل رفع/نصب/جر» وتحتاج رابطاً إذا كانت خبراً", "الجملتان متساويتان في البناء", "الجملة الفعلية لا تحتاج فاعلاً"], "ans": 1, "exp": "الجملة الاسمية Nominal clause: مبتدأ (مرفوع) + خبر (مرفوع أو ما في حكمه). الجملة الفعلية Verbal clause: فعل + فاعل (+ مفعول به إن كان متعدياً). الجملة في محل إعراب: جملة خبر المبتدأ (محل رفع). جملة الحال (محل نصب). جملة الصفة — النعت (محل نصب/رفع/جر). جملة الصلة (لا محل لها)."}],L=["أ", "ب", "ج", "د"],FN=[["🌟 ممتاز! درجة كاملة!", "أجبت على جميع الأسئلة صحيحة!", "⭐⭐⭐⭐⭐"], ["🔥 أداء رائع!", "تقريباً مثالي — راجع نقطةً أو اثنتين", "⭐⭐⭐⭐"], ["👍 أحسنت!", "نتيجة جيدة — المراجعة ستُحسِّن أداءك", "⭐⭐⭐"], ["💡 حاول مجدداً!", "راجع ملاحظاتك وحاول مرة أخرى", "⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#f87171','#fff','#fbbf24','#a855f7'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>{return{x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}})}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(255,255,255,${(1-d/130)*.055})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(255,255,255,.1)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
function lq(){ans=false;document.getElementById('nb').classList.remove('show');const ex=document.getElementById('ex');ex.classList.remove('show');ex.style.display='none';const q=QS[cq];document.getElementById('pf').style.width=((cq/QS.length)*100)+'%';document.getElementById('pl').textContent='السؤال '+(cq+1)+' من '+QS.length;document.getElementById('qn').textContent='QUESTION '+String(cq+1).padStart(2,'0');const qc=document.getElementById('qc');qc.classList.remove('si');void qc.offsetWidth;qc.classList.add('si');document.getElementById('qt').textContent=q.q;const og=document.getElementById('og');og.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="ltr">${L[i]}</span><span>${o}</span>`;b.addEventListener('click',()=>pick(i,b));og.appendChild(b)});bsb();}
function pick(idx,btn){if(ans)return;ans=true;const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);const fb=document.getElementById('fb');fb.classList.remove('sc','wr');if(idx===q.ans){btn.classList.add('correct');sc+=10;const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);fb.textContent=['✅','🎯','⭐','🔥'][Math.floor(Math.random()*4)];fb.classList.add('sc');for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);setTimeout(()=>document.getElementById('nb').classList.add('show'),500);}else{btn.classList.add('wrong');bs[q.ans].classList.add('correct');fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);setTimeout(()=>document.getElementById('nb').classList.add('show'),350);}bsb();}
function nxt(){cq++;if(cq<QS.length)lq();else sf()}
function sf(){document.getElementById('qs').style.display='none';document.getElementById('fs').classList.add('vis');document.getElementById('fsn').textContent=sc;const p=sc/(QS.length*10),f=p===1?FN[0]:p>=.75?FN[1]:p>=.5?FN[2]:FN[3];document.getElementById('ftl').textContent=f[0];document.getElementById('fmg').textContent=f[1];document.getElementById('fst').textContent=f[2];setTimeout(()=>{for(let i=0;i<8;i++)setTimeout(()=>lc(innerWidth*Math.random(),-20,20),i*100)},250);}
function rst(){cq=0;sc=0;ans=false;cf=[];document.getElementById('sv').textContent='0';document.getElementById('fs').classList.remove('vis');document.getElementById('qs').style.display='flex';lq()}
lq();
</script></body></html>
