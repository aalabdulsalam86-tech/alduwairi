<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#fbbf24;--c2:#b45309;--bg:#08060a;--brd:rgba(251,191,36,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr"><div class="logo">☪️ إسلامية — الثاني عشر علمي</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>

</div>
<script>
const QS=[
  // المجال الأول: العقيدة — القضاء والقدر
  {q:"ما تعريف القضاء والقدر وما الفرق بينهما؟",opts:["كلاهما شيء واحد لا فرق","القدر: علم الله بالأشياء قبل وقوعها وتقديره لها في اللوح المحفوظ — القضاء: حكمه تعالى بوقوع الأمور عند حلول أوقاتها وفق ما قدّره","القضاء أقدم من القدر","القدر يخص البشر والقضاء يخص الكون"],ans:1,exp:"القَدَر: هو علم الله تعالى الأزلي بجميع الأشياء قبل وجودها، وكتابته لها في اللوح المحفوظ قبل خلق السماوات والأرض بخمسين ألف سنة. القَضاء: هو إيجاد الله تعالى للأشياء وتنفيذ ما قدّره عند حلول أوقاتها المحددة. القضاء والقدر معاً: من أركان الإيمان الستة، والإيمان بهما واجب."},
  {q:"ما أركان الإيمان بالقضاء والقدر الأربعة؟",opts:["ركن واحد فقط: العلم","العلم: أن الله يعلم كل شيء — الكتابة: كتابته في اللوح المحفوظ — المشيئة: ما شاء الله كان وما لم يشأ لم يكن — الخلق: الله خالق كل شيء","ركنان: العلم والكتابة","العلم والإرادة والقدرة والحكمة"],ans:1,exp:"أركان الإيمان بالقضاء والقدر أربعة: (1) العلم: الإيمان بأن الله يعلم كل شيء كان وما سيكون. (2) الكتابة: كتابة كل شيء في اللوح المحفوظ. (3) المشيئة: ما شاء الله كان وما لم يشأ لم يكن لا راد لقضائه. (4) الخلق: الله تعالى خالق كل شيء بما فيه أفعال العباد. الجمع بين القدر والاختيار: الإنسان مُخيَّر في أفعاله ومسؤول عنها."},
  {q:"ما ثمرات الإيمان بالقضاء والقدر على حياة المؤمن؟",opts:["يُسبّب الكسل والتواكل فقط","السعادة القلبية والرضا — التوكل على الله — عدم التكبر والغرور — الشجاعة في مواجهة الشدائد — التوبة والاستغفار — الطمأنينة النفسية","لا ثمرات له","يُسبّب اليأس والإحباط"],ans:1,exp:"ثمرات الإيمان بالقضاء والقدر: (1) السعادة القلبية: الرضا بما يصيبه من خير أو شر لأنه من عند الله. (2) التوكل على الله في جميع الأمور. (3) عدم التكبر: فلا يتكبّر لأنه يعلم أن ما أوتي من نعمة فمن الله. (4) الشجاعة: يواجه الشدائد بثبات لأن الآجال محددة. (5) التوبة والاستغفار لأن ما صدر منه إنما هو بعمله واختياره. (6) الطمأنينة وعدم القلق المفرط."},
  // علوم الحديث
  {q:"ما أقسام الحديث من حيث درجة القبول والرد؟",opts:["قسم واحد فقط: الصحيح","المقبول: الصحيح (أعلى درجة) والحسن — المردود: الضعيف (ضعف في السند أو المتن) والموضوع (مكذوب على النبي ﷺ)","قسمان متساويان","الصحيح والكذب فقط"],ans:1,exp:"أقسام الحديث: المقبول: (1) الصحيح: رواه عدد من الثقات المتصل السند دون شذوذ أو علة. (2) الحسن: كالصحيح لكن راويه أقل ضبطاً. المردود: (3) الضعيف: نقص في شرط من شروط القبول (انقطاع سند أو ضعف راوٍ). (4) الموضوع: المكذوب والمختلق على النبي ﷺ وهو أشد أنواع الضعف. يجوز رواية الحديث الضعيف في فضائل الأعمال بشروط لا في الأحكام."},
  {q:"ما مكوّنا الحديث النبوي الشريف وما المقصود بكل منهما؟",opts:["الحديث جزء واحد فقط","السند (الإسناد): سلسلة الرواة الذين نقلوا الحديث من النبي ﷺ حتى المُدوِّن — المتن: نص الحديث ذاته (كلام النبي ﷺ أو وصف فعله أو تقريره)","السند هو نص الحديث","المتن هو سلسلة الرواة"],ans:1,exp:"مكوّنا الحديث: (1) السند (الإسناد): سلسلة الرواة المتصلة من الصحابي الذي سمع الحديث وصولاً إلى المُدوِّن. مثال: حدثنا البخاري... عن أبي هريرة. يُدرس السند للتحقق من عدالة الرواة وضبطهم واتصال السلسلة. (2) المتن: نص الحديث وهو قول النبي ﷺ أو فعله أو تقريره أو صفته. يُدرس المتن للتأكد من عدم مخالفته للقرآن أو الأحاديث الصحيحة الأخرى."},
  {q:"ما شروط الحديث الصحيح الخمسة؟",opts:["شرط واحد: صدق الراوي","اتصال السند — عدالة الرواة جميعاً — ضبط الرواة (حفظ وإتقان) — انتفاء الشذوذ (لا يخالف الأوثق) — انتفاء العلة القادحة (لا عيب خفي)","شرطان: الصدق والحفظ","ثلاثة شروط فقط"],ans:1,exp:"شروط الحديث الصحيح: (1) اتصال السند: كل راوٍ سمع ممن فوقه مباشرةً دون انقطاع. (2) عدالة الرواة: كلهم مسلمون بالغون عقلاء ملتزمون بآداب الإسلام. (3) الضبط: حفظ الراوي للحديث وإتقانه سواء في صدره أو كتابه. (4) انتفاء الشذوذ: لا يخالف الراوي من هو أوثق وأكثر منه. (5) انتفاء العلة القادحة: لا توجد علة خفية تقدح في صحة الحديث رغم ظهور الصحة."},
  // الاقتصاد الإسلامي
  {q:"ما مبادئ الاقتصاد الإسلامي الأساسية التي تُميّزه عن غيره؟",opts:["هو نفس الرأسمالية مع بعض تعديلات","الملكية الفردية مقيّدة بشرع الله — تحريم الربا والغرر والاحتكار — الزكاة والصدقات لتوزيع الثروة — مبدأ الاستخلاف (المال لله) — الحلال والحرام ضابط للنشاط الاقتصادي","لا قواعد له","نظام شيوعي بحت"],ans:1,exp:"مبادئ الاقتصاد الإسلامي: (1) الملكية الفردية مباحة لكنها مقيّدة: لا إسراف ولا إفساد ولا كنز. (2) تحريم الربا (Riba): أي زيادة مشروطة في القرض. (3) تحريم الغرر والجهالة في المعاملات. (4) تحريم الاحتكار. (5) الزكاة: فريضة واجبة لتوزيع الثروة. (6) مبدأ الاستخلاف: الإنسان مستخلف في المال، والمال لله في الأصل. (7) الحلال والحرام: ضابط كل نشاط اقتصادي."},
  {q:"ما مراحل نشأة الفكر الاقتصادي الإسلامي الثلاث؟",opts:["نشأ في القرن العشرين فقط","المرحلة الأولى: عهد النبي ﷺ والخلفاء (تطبيق عملي) — المرحلة الثانية: القرن الثاني الهجري (تأليف مصنفات فقهية كالخراج والأموال) — المرحلة الثالثة: العصر الحاضر (دراسات اقتصادية شاملة ومؤتمرات)","مرحلتان فقط","نشأ في عهد الخلفاء العباسيين فقط"],ans:1,exp:"مراحل نشأة الفكر الاقتصادي الإسلامي: (1) الأولى: عهد النبي ﷺ والخلفاء الراشدين — تطبيق عملي لمبادئ الاقتصاد الإسلامي دون تدوين خاص. (2) الثانية: من القرن الثاني الهجري — ظهرت مصنفات فقهية تتضمن مسائل اقتصادية: كتاب الخراج لأبي يوسف، الأموال لأبي عبيد، المدونة للإمام مالك. (3) الثالثة: العصر الحاضر — دراسات اقتصادية شاملة، مؤتمرات، مجلات متخصصة، بنوك إسلامية."},
  // الأخلاق — الحذر من الأخلاق السيئة
  {q:"ما تعريف سوء الخلق وما أبرز صوره المنهي عنها في الإسلام؟",opts:["سوء الخلق محمود أحياناً","الاتصاف بالرذائل والتخلي عن الفضائل — صوره: الظلم، الغلظة والفظاظة، الغيبة والنميمة، الكذب، الغرور والتكبر، التجسس، الحقد والحسد، التنابز بالألقاب","سوء الخلق لا يؤثر على الآخرين","صورة واحدة فقط: الكذب"],ans:1,exp:"سوء الخلق: الاتصاف بالرذائل الأخلاقية والتخلي عن الفضائل. أبرز صوره: (1) الظلم: وضع الشيء في غير موضعه. (2) الغلظة والفظاظة: والمبالغة في اللوم والتوبيخ. (3) الغيبة والنميمة: ذكر المسلم بما يكره وإفساد ذات البين. (4) الكذب والخيانة. (5) التكبر والغرور. (6) التجسس وإفشاء الأسرار. (7) الحسد والحقد. (8) إساءة الظن بالآخرين. (9) التنابز بالألقاب. قال ﷺ: «الحياء والإيمان هما قرينان دائماً فإذا رفع أحدهما رفع الآخر»."},
  {q:"ما خطر الجهر بالمعصية (المجاهرة) وما موقف الإسلام منها؟",opts:["المجاهرة بالمعصية أخف من السرية","المجاهرة بالمعصية من أشد الذنوب: تهتك ستر الله على العبد — تُشجّع الآخرين على المعصية — تُفسد المجتمع — قال ﷺ: (كل أمتي معافى إلا المجاهرين)","المجاهرة مسموح بها في الملأ","لا فرق بين السر والجهر"],ans:1,exp:"المجاهرة بالمعصية: أشد وأخطر من المعصية السرية لأسباب: (1) هتك ستر الله على العبد بعد أن ستره الله فكشف نفسه. (2) إفساد الآخرين وتشجيعهم على المعصية. (3) تُفقد الحياء من النفس والمجتمع. (4) إظهار الاستهانة بحدود الله. قال ﷺ: «كُلُّ أُمَّتي مُعافىً إلا المجاهرين». ومن المجاهرة: نشر الصور والمقاطع الفاضحة على الإنترنت والتباهي بارتكاب المحرمات أمام الناس."}
];
const L=["أ","ب","ج","د"],FN=[["🌟 ممتاز!","جميع الإجابات صحيحة!","⭐⭐⭐⭐⭐"],["🔥 رائع!","تقريباً مثالي!","⭐⭐⭐⭐"],["👍 أحسنت!","نتيجة جيدة!","⭐⭐⭐"],["💡 حاول مجدداً!","راجع الملاحظات!","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#fbbf24','#fff','#fde68a','#b45309'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(251,191,36,${(1-d/130)*.07})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(251,191,36,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
function lq(){ans=false;document.getElementById('nb').classList.remove('show');const ex=document.getElementById('ex');ex.classList.remove('show');ex.style.display='none';const q=QS[cq];document.getElementById('pf').style.width=((cq/QS.length)*100)+'%';document.getElementById('pl').textContent='السؤال '+(cq+1)+' من '+QS.length;document.getElementById('qn').textContent='QUESTION '+String(cq+1).padStart(2,'0');const qc=document.getElementById('qc');qc.classList.remove('si');void qc.offsetWidth;qc.classList.add('si');document.getElementById('qt').textContent=q.q;const og=document.getElementById('og');og.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="ltr">${L[i]}</span><span>${o}</span>`;b.addEventListener('click',()=>pick(i,b));og.appendChild(b)});bsb()}
function pick(idx,btn){if(ans)return;ans=true;const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);const fb=document.getElementById('fb');fb.classList.remove('sc','wr');if(idx===q.ans){btn.classList.add('correct');sc+=10;const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);fb.textContent=['✅','🎯','⭐','🔥'][Math.floor(Math.random()*4)];fb.classList.add('sc');for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);setTimeout(()=>document.getElementById('nb').classList.add('show'),500)}else{btn.classList.add('wrong');bs[q.ans].classList.add('correct');fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);setTimeout(()=>document.getElementById('nb').classList.add('show'),350)}bsb()}
function nxt(){cq++;if(cq<QS.length)lq();else sf()}
function sf(){document.getElementById('qs').style.display='none';document.getElementById('fs').classList.add('vis');document.getElementById('fsn').textContent=sc;const p=sc/(QS.length*10),f=p===1?FN[0]:p>=.75?FN[1]:p>=.5?FN[2]:FN[3];document.getElementById('ftl').textContent=f[0];document.getElementById('fmg').textContent=f[1];document.getElementById('fst').textContent=f[2];setTimeout(()=>{for(let i=0;i<8;i++)setTimeout(()=>lc(innerWidth*Math.random(),-20),i*100)},250)}
function rst(){cq=0;sc=0;ans=false;cf=[];document.getElementById('sv').textContent='0';document.getElementById('fs').classList.remove('vis');document.getElementById('qs').style.display='flex';lq()}
lq();
</script></body></html>
