<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>رياضيات — الفصل الأول | الوحدات 1-3: الأعداد الحقيقية والدوال التربيعية وكثيرات الحدود</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#fb923c;--c2:#c2410c;--bg:#0a0400;--brd:rgba(251,146,60,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}} .exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}} .nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head><body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs"><div class="hdr"><div class="logo">📐 الرياضيات — الحادي عشر علمي</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div><div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div><div class="plbl" id="pl"></div><div class="sbar" id="sbar"></div><div class="qcard" id="qc"><div class="qn" id="qn"></div><div class="qt" id="qt"></div><div class="opts" id="og"></div><div class="exp" id="ex"></div><button class="nbtn" id="nb" onclick="nxt()">التالي ←</button></div></div>
<div class="final" id="fs"><div class="fstars" id="fst"></div><div class="ftitle" id="ftl"></div><div class="fmsg" id="fmg"></div><div class="fsbox"><div class="fslbl">مجموع النقاط</div><div class="fsnum" id="fsn">0</div></div><button class="rbtn" onclick="rst()">🔄 إعادة المحاولة</button><span class="bhome" onclick="window.history.back()">← العودة للموقع</span></div>
<script>
const QS=[{"q": "ما تبسيط √48؟", "opts": ["6√2", "4√3", "8√3", "2√12"], "ans": 1, "exp": "√48 = √(16×3) = 4√3. نُحلِّل 48 = 16×3، ثم √16=4، فالناتج 4√3. قاعدة: √(ab)=√a·√b إذا a,b ≥ 0."}, {"q": "ما قيمة 8^(2/3)؟", "opts": ["4", "2", "16", "√8"], "ans": 0, "exp": "8^(2/3) = (³√8)² = 2² = 4. القاعدة: a^(m/n) = (ⁿ√a)^m. ³√8=2 (لأن 2³=8)، ثم 2²=4."}, {"q": "ما مجال الدالة f(x) = √(x-3)؟", "opts": ["x > 3", "x ≥ 3، أي [3, ∞)", "x ≤ 3", "جميع الأعداد الحقيقية"], "ans": 1, "exp": "لكي يكون الجذر معرَّفاً نحتاج: x-3 ≥ 0 → x ≥ 3. إذن المجال [3, +∞). للدالة الكسرية: المقام ≠ 0."}, {"q": "في الدالة التربيعية f(x)=ax²+bx+c، ما إحداثية x لرأس المنحنى؟", "opts": ["x = b/2a", "x = -b/(2a)", "x = -c/a", "x = √(b²-4ac)"], "ans": 1, "exp": "رأس المنحنى Vertex: x = -b/(2a). ثم k=f(h). إذا a>0: رأس المنحنى أدنى قيمة. إذا a<0: أعلى قيمة. محور التماثل: x=-b/(2a)."}, {"q": "ما المميِّز Discriminant للمعادلة التربيعية ax²+bx+c=0 وماذا يدل إذا كان سالباً؟", "opts": ["Δ=b²+4ac، سالب: جذران حقيقيان", "Δ=b²-4ac، سالب: لا جذور حقيقية — جذران مركبان", "Δ=√(b²-4ac)، سالب: جذر واحد", "Δ=4ac-b², سالب: جذران موجبان"], "ans": 1, "exp": "المميِّز Δ=b²-4ac: Δ>0: جذران حقيقيان مختلفان. Δ=0: جذر حقيقي مكرر. Δ<0: لا جذور حقيقية (جذران مركبان متقارنان)."}, {"q": "ما معكوس الدالة f(x)=x² على المجال [0,∞)؟", "opts": ["f⁻¹(x)=x/2", "f⁻¹(x)=√x (على [0,∞))", "f⁻¹(x)=-√x", "f⁻¹(x)=x²"], "ans": 1, "exp": "لإيجاد المعكوس: y=x² → x=y² → y=√x (الموجب لأن المجال [0,∞)). رسماً: انعكاس على y=x. شرط الوجود: يجب تقييد المجال لأن f(x)=x² ليست واحداً لواحد على كامل ℝ."}, {"q": "بمبرهنة الباقي: ما باقي قسمة P(x)=x³-2x+1 على (x-2)؟", "opts": ["0", "5", "3", "7"], "ans": 1, "exp": "مبرهنة الباقي: الباقي = P(c) عند القسمة على (x-c). P(2)=2³-2(2)+1=8-4+1=5. ∴ الباقي=5. إذا كان الباقي=0 فإن (x-2) عامل من عوامل P(x)."}, {"q": "ما الجذور الممكنة لـ P(x)=2x³-3x²-11x+6 بمبرهنة الجذور العقلانية؟", "opts": ["±1, ±2, ±3, ±6", "±1, ±2, ±3, ±6, ±1/2, ±3/2", "±1, ±6 فقط", "±2, ±3 فقط"], "ans": 1, "exp": "مبرهنة الجذور العقلانية: الجذور الممكنة = ±(عوامل الحد المستقل)/(عوامل المعامل الرئيسي). الحد المستقل=6: ±1,±2,±3,±6. المعامل الرئيسي=2: ±1,±2. الجذور الممكنة: ±1, ±2, ±3, ±6, ±1/2, ±3/2."}, {"q": "ما سلوك كثير الحدود P(x)=2x⁴-3x+1 عند ±∞؟", "opts": ["يتجه للأسفل في كلا الاتجاهين", "يتجه للأعلى في كلا الاتجاهين (لأن الدرجة زوجية والمعامل الرئيسي موجب)", "يتجه للأعلى يميناً وللأسفل يساراً", "قيمته تبقى ثابتة"], "ans": 1, "exp": "سلوك P(x) عند ±∞ يُحدده: الدرجة (زوجية/فردية) والمعامل الرئيسي (+/-). الدرجة 4 زوجية والمعامل 2>0 → كلا الطرفين ↑∞. إذا المعامل <0 → كلا الطرفين ↓-∞."}, {"q": "حلّل P(x)=x³-x²-4x+4 إلى عواملها الخطية.", "opts": ["(x-1)(x-2)(x+2)", "(x+1)(x-2)(x+2)", "(x-1)(x+2)²", "(x-1)²(x+2)"], "ans": 0, "exp": "نجرب P(1)=1-1-4+4=0 ✓ → (x-1) عامل. بالقسمة: P(x)÷(x-1)=x²-4=(x-2)(x+2). ∴ P(x)=(x-1)(x-2)(x+2). التحقق: الجذور x=1, x=2, x=-2."}],L=["أ", "ب", "ج", "د"],FN=[["🌟 ممتاز! درجة كاملة!", "أجبت على جميع الأسئلة صحيحة!", "⭐⭐⭐⭐⭐"], ["🔥 أداء رائع!", "تقريباً مثالي — راجع نقطةً أو اثنتين", "⭐⭐⭐⭐"], ["👍 أحسنت!", "نتيجة جيدة — المراجعة ستُحسِّن أداءك", "⭐⭐⭐"], ["💡 حاول مجدداً!", "راجع ملاحظاتك وحاول مرة أخرى", "⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#fb923c','#fff','#fbbf24','#a855f7'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>{return{x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}})}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(255,255,255,${(1-d/130)*.055})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(255,255,255,.1)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
function lq(){ans=false;document.getElementById('nb').classList.remove('show');const ex=document.getElementById('ex');ex.classList.remove('show');ex.style.display='none';const q=QS[cq];document.getElementById('pf').style.width=((cq/QS.length)*100)+'%';document.getElementById('pl').textContent='السؤال '+(cq+1)+' من '+QS.length;document.getElementById('qn').textContent='QUESTION '+String(cq+1).padStart(2,'0');const qc=document.getElementById('qc');qc.classList.remove('si');void qc.offsetWidth;qc.classList.add('si');document.getElementById('qt').textContent=q.q;const og=document.getElementById('og');og.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="ltr">${L[i]}</span><span>${o}</span>`;b.addEventListener('click',()=>pick(i,b));og.appendChild(b)});bsb();}
function pick(idx,btn){if(ans)return;ans=true;const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);const fb=document.getElementById('fb');fb.classList.remove('sc','wr');if(idx===q.ans){btn.classList.add('correct');sc+=10;const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);fb.textContent=['✅','🎯','⭐','🔥'][Math.floor(Math.random()*4)];fb.classList.add('sc');for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);setTimeout(()=>document.getElementById('nb').classList.add('show'),500);}else{btn.classList.add('wrong');bs[q.ans].classList.add('correct');fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);setTimeout(()=>document.getElementById('nb').classList.add('show'),350);}bsb();}
function nxt(){cq++;if(cq<QS.length)lq();else sf()}
function sf(){document.getElementById('qs').style.display='none';document.getElementById('fs').classList.add('vis');document.getElementById('fsn').textContent=sc;const p=sc/(QS.length*10),f=p===1?FN[0]:p>=.75?FN[1]:p>=.5?FN[2]:FN[3];document.getElementById('ftl').textContent=f[0];document.getElementById('fmg').textContent=f[1];document.getElementById('fst').textContent=f[2];setTimeout(()=>{for(let i=0;i<8;i++)setTimeout(()=>lc(innerWidth*Math.random(),-20,20),i*100)},250);}
function rst(){cq=0;sc=0;ans=false;cf=[];document.getElementById('sv').textContent='0';document.getElementById('fs').classList.remove('vis');document.getElementById('qs').style.display='flex';lq()}
lq();
</script></body></html>
