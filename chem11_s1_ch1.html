<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>كيمياء — الوحدتان الأولى والثانية | الأفلاك الجزيئية والمحاليل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#a78bfa;--c2:#7c3aed;--bg:#04010f;--brd:rgba(167,139,250,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr"><div class="logo">⚗️ كيمياء — الحادي عشر علمي</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
  <div class="plbl" id="pl"></div>
  <div class="sbar" id="sbar"></div>
  <div class="qcard" id="qc">
    <div class="qn" id="qn"></div>
    <div class="qt" id="qt"></div>
    <div class="opts" id="og"></div>
    <div class="exp" id="ex"></div>
    <button class="nbtn" id="nb" onclick="nxt()">التالي ←</button>
  </div>
</div>
<div class="final" id="fs">
  <div class="fstars" id="fst"></div><div class="ftitle" id="ftl"></div>
  <div class="fmsg" id="fmg"></div>
  <div class="fsbox"><div class="fslbl">مجموع النقاط</div><div class="fsnum" id="fsn">0</div></div>
  <button class="rbtn" onclick="rst()">🔄 إعادة المحاولة</button>
  <span class="bhome" onclick="window.history.back()">← العودة للموقع</span>
</div>
<script>
const QS=[
  // ---- الوحدة الأولى: الأفلاك الجزيئية والتهجين ----
  {q:"ما الفرق الجوهري بين نظرية رابطة التكافؤ ونظرية الفلك الجزيئي؟",opts:["في رابطة التكافؤ الإلكترونات في أفلاك ذرية، في الفلك الجزيئي تشغل أفلاكاً جزيئية جديدة تمتد على الجزيء كله","كلتا النظريتين متطابقتان تماماً","نظرية التكافؤ تشرح الأفلاك الجزيئية فقط","لا توجد علاقة بينهما"],ans:0,exp:"نظرية رابطة التكافؤ (Valence Bond): الإلكترونات في الأفلاك الذرية للجزيء. نظرية الفلك الجزيئي (MO): الأفلاك الذرية تتداخل لتكوّن أفلاكاً جزيئية جديدة تُسمى Molecular Orbitals تمتد على الجزيء بأكمله."},
  {q:"ما نوع الرابطة الناتجة عن التداخل المحوري (رأساً لرأس) بين الأفلاك الذرية؟",opts:["رابطة باي π","رابطة سيجما σ","رابطة هيدروجينية","رابطة فان دير فالس"],ans:1,exp:"الرابطة σ (سيجما): تتكوّن بالتداخل المحوري رأساً لرأس. تعتبر أقوى أنواع الروابط. الرابطة π (باي): تتكوّن بالتداخل الجانبي (كتفاً لكتف) بين أفلاك p. الرابطة الأولى في أي جزيء هي دائماً σ، وأي روابط إضافية هي π."},
  {q:"ما نوع التهجين في جزيء الميثان CH₄؟",opts:["sp","sp²","sp³","sp³d"],ans:2,exp:"الكربون في CH₄ يكوّن 4 روابط مع 4 ذرات هيدروجين، مع عدم وجود أزواج حرة. هذا يتطلب تهجين sp³: فلك s واحد + 3 أفلاك p = 4 أفلاك مهجّنة متكافئة. الزاوية بين الروابط 109.5° وشكل الجزيء رباعي الأوجه (Tetrahedral)."},
  {q:"ما نوع التهجين في ذرة الكربون في جزيء الإيثيلين C₂H₄؟",opts:["sp³","sp²","sp","sp³d²"],ans:1,exp:"كل ذرة كربون في C₂H₄ ترتبط بـ 3 مجموعات (ذرتا H + ذرة C) برابطة مزدوجة. التهجين sp²: فلك s + فلكان p = 3 أفلاك مهجّنة تكوّن روابط σ. الفلك p المتبقي غير مهجّن يكوّن رابطة π مع الكربون المجاور. الشكل مستوٍ مثلثي، الزاوية 120°."},
  {q:"ما نوع التهجين في جزيء البنزين C₆H₆ وما شكله الهيكلي؟",opts:["sp³ — شكل رباعي الأوجه","sp² — حلقة سداسية مستوية","sp — خطي","sp³d — هرمي مثلثي"],ans:1,exp:"في البنزين: كل كربون يرتبط بـ 3 مجموعات → تهجين sp². 6 ذرات كربون في حلقة سداسية مستوية، الزوايا 120°. الأفلاك p غير المهجّنة تتداخل جانبياً فوق وتحت الحلقة مكوّنةً نظام π متوضّع (Delocalized) يمنح البنزين استقراراً استثنائياً."},
  {q:"ما مميّز الجزيئات الأروماتية (Aromatic) مثل البنزين؟",opts:["تحتوي على روابط أحادية فقط","حلقة مستوية ونظام π متوضّع يُعطيها استقراراً خاصاً","تذوب فقط في الماء","تحتوي على ذرات نيتروجين دائماً"],ans:1,exp:"المركبات الأروماتية تتميز بـ: (1) حلقة مستوية. (2) نظام π متوضّع (غير متمركز) على الحلقة كلها. (3) استقرار كيميائي أعلى من المتوقع. (4) تميل للتفاعلات الإحلالية لا الإضافية. البنزين هو أبسط مثال وأصل المركبات الأروماتية."},
  // ---- الوحدة الثانية: المحاليل ----
  {q:"ما تعريف المحلول (Solution) وما مكوّناه الأساسيان؟",opts:["مخلوط غير متجانس من مادتين","مخلوط متجانس من مذيب (Solvent) ومذاب (Solute)","مادة نقية ذات تركيب ثابت","خليط يمكن فصله بالترشيح"],ans:1,exp:"المحلول: مخلوط متجانس تكون فيه جسيمات المذاب موزّعة بشكل منتظم في المذيب. المذيب (Solvent): الموجود بكمية أكبر (عادةً الماء). المذاب (Solute): الموجود بكمية أقل. المحاليل لا تُرى جسيماتها بالعين المجردة ولا تُفصل بالترشيح."},
  {q:"ما ظاهرة تندال (Tyndall Effect) وأيّ أنظمة تُظهرها؟",opts:["إذابة مواد صلبة في سوائل","تشتّت الضوء الذي يُظهره المحلول الغروي (Colloid) دون المحلول الحقيقي","ترسّب المواد الصلبة في القاع","تبخّر المذيب عند التسخين"],ans:1,exp:"ظاهرة تندال: عند تمرير شعاع ضوئي عبر محلول غروي يُرى مسار الضوء بوضوح (تشتّت الضوء) بسبب حجم جسيمات الغروي (1-1000 nm). المحلول الحقيقي لا يُظهر هذه الظاهرة لأن جسيماته أصغر (0.1-1 nm). مثال: شعاع الشمس في غرفة مظلمة."},
  {q:"ما المولارية (Molarity) وما وحدتها؟",opts:["عدد مولات المذاب في كيلوغرام المذيب — mol/kg","عدد مولات المذاب في لتر المحلول — mol/L أو M","كتلة المذاب في 100 مل — g/mL","عدد جزيئات المذاب في اللتر — جزيء/L"],ans:1,exp:"المولارية M = n(مول) / V(لتر المحلول). وحدتها mol/L أو M. مثال: محلول 2M من NaCl يحتوي على مولَين من NaCl في كل لتر محلول. تختلف عن المولالية (mol/kg مذيب). المولارية تتغير بتغير درجة الحرارة لأن الحجم يتمدد."},
  {q:"ما العوامل الثلاثة الرئيسية التي تؤثر في سرعة ذوبان مادة صلبة في مذيب؟",opts:["اللون والرائحة والكثافة","التحريك (Mixing) — درجة الحرارة (Temperature) — مساحة السطح (Surface Area)","الضغط الجوي والرطوبة والضوء","نوع الإناء وحجمه وشكله"],ans:1,exp:"(1) التحريك/الخلط Mixing: يزيد التماس بين المذاب والمذيب فيُسرّع الذوبان. (2) درجة الحرارة Temperature: رفعها يزيد طاقة حركة الجزيئات ويسرّع الذوبان (لمعظم المواد الصلبة). (3) مساحة السطح Surface Area: تفتيت المذاب يزيد السطح المعرّض فيُسرّع الذوبان."},
  {q:"ما الفرق بين المحلول المشبع والمحلول غير المشبع والمحلول فوق المشبع؟",opts:["لا يوجد فرق بينهم","المشبع: بلغ الحد الأقصى للذوبانية عند درجة حرارة معينة. غير المشبع: يمكن إضافة مزيد. فوق المشبع: يحتوي أكثر من الحد الأقصى ويكون غير مستقر","المشبع: لا يحتوي على مذاب. غير المشبع: يحتوي على مذاب","فوق المشبع أكثر استقراراً من المشبع"],ans:1,exp:"المحلول المشبع (Saturated): لا يمكن إذابة مزيد من المذاب عند درجة حرارة معينة. غير المشبع (Unsaturated): يمكن إضافة مزيد. فوق المشبع (Supersaturated): يحتوي أكثر من الطاقة الاستيعابية الطبيعية وغير مستقر — أي اضطراب بسيط يُسبّب تبلوراً سريعاً."},
  {q:"ما المقصود بالذوبانية (Solubility) وكيف تتأثر بدرجة الحرارة للمواد الصلبة؟",opts:["كمية المذاب التي يمكن إذابتها في كمية محددة من المذيب عند درجة حرارة معينة — تزيد عموماً بزيادة الحرارة للمواد الصلبة","كمية المذاب في لتر المحلول — تقل دائماً بالتسخين","كثافة المحلول — لا تتأثر بالحرارة","المسافة بين جزيئات المذاب — تقل بالتسخين"],ans:0,exp:"الذوبانية: الكمية القصوى من المذاب التي تذوب في كمية معينة من المذيب عند درجة حرارة محددة لتكوين محلول مشبع. للمواد الصلبة في الماء: تزداد عموماً بزيادة درجة الحرارة. للغازات في الماء: تقل بزيادة درجة الحرارة وتزداد بزيادة الضغط (قانون هنري Henry's Law)."}
];
const L=["أ","ب","ج","د"],FN=[[" 🌟 ممتاز! درجة كاملة!","أجبت على جميع الأسئلة صحيحة!","⭐⭐⭐⭐⭐"],[" 🔥 أداء رائع!","تقريباً مثالي — راجع نقطةً أو اثنتين","⭐⭐⭐⭐"],["👍 أحسنت!","نتيجة جيدة — المراجعة ستُحسّن أداءك","⭐⭐⭐"],["💡 حاول مجدداً!","راجع ملاحظاتك وحاول مرة أخرى","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#a78bfa','#fff','#c4b5fd','#7c3aed'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(167,139,250,${(1-d/130)*.06})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(167,139,250,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
function lq(){ans=false;document.getElementById('nb').classList.remove('show');const ex=document.getElementById('ex');ex.classList.remove('show');ex.style.display='none';const q=QS[cq];document.getElementById('pf').style.width=((cq/QS.length)*100)+'%';document.getElementById('pl').textContent='السؤال '+(cq+1)+' من '+QS.length;document.getElementById('qn').textContent='QUESTION '+String(cq+1).padStart(2,'0');const qc=document.getElementById('qc');qc.classList.remove('si');void qc.offsetWidth;qc.classList.add('si');document.getElementById('qt').textContent=q.q;const og=document.getElementById('og');og.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="ltr">${L[i]}</span><span>${o}</span>`;b.addEventListener('click',()=>pick(i,b));og.appendChild(b)});bsb()}
function pick(idx,btn){if(ans)return;ans=true;const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);const fb=document.getElementById('fb');fb.classList.remove('sc','wr');if(idx===q.ans){btn.classList.add('correct');sc+=10;const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);fb.textContent=['✅','🎯','⭐','🔥'][Math.floor(Math.random()*4)];fb.classList.add('sc');for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);setTimeout(()=>document.getElementById('nb').classList.add('show'),500)}else{btn.classList.add('wrong');bs[q.ans].classList.add('correct');fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);setTimeout(()=>document.getElementById('nb').classList.add('show'),350)}bsb()}
function nxt(){cq++;if(cq<QS.length)lq();else sf()}
