<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Français 12 أدبي · Semestre 2 — Dossiers 4-6 + DELF A1</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Orbitron:wght@700;900&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00f5ff;--gold:#fbbf24;--purple:#c026d3;--dark:#020617;--dark2:#0f172a;--text:#f1f5f9;--muted:rgba(241,245,249,0.6);--border:rgba(0,245,255,0.15);--fr-blue:#1e3a8a;--fr-red:#dc2626;--ok:#10d18b;--bad:#ff5875}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"Tajawal",sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:rgba(0,245,255,0.3);border-radius:3px}

#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.cw{position:relative;z-index:1}

nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(2,6,23,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:"Orbitron",sans-serif;font-size:14px;color:var(--cyan);letter-spacing:3px;text-shadow:0 0 20px rgba(0,245,255,0.5)}
.nav-back{color:var(--muted);text-decoration:none;font-size:14px;padding:7px 16px;border-radius:8px;transition:all 0.2s;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1)}
.nav-back:hover{color:var(--text);background:rgba(255,255,255,0.08)}

.wrap{max-width:920px;margin:0 auto;padding:96px 24px 72px}

.hero{
  background:rgba(15,23,42,0.9);border:1.5px solid var(--border);border-radius:22px;padding:28px 32px;margin-bottom:26px;
  background-image:linear-gradient(135deg,rgba(30,58,138,0.15),rgba(220,38,38,0.1));
  position:relative;overflow:hidden;
}
.hero::before{content:"";position:absolute;top:0;right:0;width:180px;height:180px;background:radial-gradient(circle,rgba(0,245,255,0.15),transparent 70%);pointer-events:none}
.hero-top{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.hero-badge{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--fr-blue),var(--fr-red));display:grid;place-items:center;font-family:"Cormorant Garamond",serif;font-style:italic;font-size:28px;color:#fff;font-weight:700;box-shadow:0 0 30px rgba(220,38,38,0.3)}
.hero h1{font-size:26px;font-weight:900;line-height:1.3;background:linear-gradient(135deg,#fff,#b2f5ff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:var(--muted);font-size:14px;margin-top:4px}
.hero-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.hero-pill{background:rgba(0,245,255,0.08);border:1px solid rgba(0,245,255,0.25);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--cyan);font-weight:700}
.hero-pill.gold{background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.25);color:var(--gold)}

.progress-bar{background:rgba(15,23,42,0.9);border:1.5px solid var(--border);border-radius:14px;padding:14px 20px;margin-bottom:22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pb-text{font-size:13px;color:var(--muted);flex-shrink:0}
.pb-text b{color:var(--cyan);font-family:"Orbitron";font-weight:700}
.pb-track{flex:1;min-width:180px;height:8px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;width:0;background:linear-gradient(90deg,var(--fr-blue),var(--fr-red),var(--gold));border-radius:99px;transition:width 0.4s ease;box-shadow:0 0 12px rgba(220,38,38,0.4)}
.pb-score{font-family:"Orbitron";font-weight:900;font-size:14px;color:var(--gold)}

.card{background:rgba(15,23,42,0.85);border:1.5px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px;box-shadow:0 10px 40px rgba(0,0,0,0.3);backdrop-filter:blur(12px)}
.qnum{display:inline-block;font-family:"Orbitron";font-weight:900;font-size:11px;letter-spacing:2px;color:var(--gold);background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.2);padding:5px 10px;border-radius:8px;margin-bottom:14px}
.qtext{font-size:18px;font-weight:500;line-height:1.8;margin-bottom:6px}
.qtext .fr{font-family:"Cormorant Garamond",serif;font-style:italic;color:#c9d5f0;font-weight:500}
.dossier-tag{display:inline-block;background:linear-gradient(135deg,var(--fr-blue),var(--fr-red));color:#fff;font-size:10px;font-family:"Orbitron";letter-spacing:1.5px;padding:3px 8px;border-radius:6px;margin-left:8px;vertical-align:middle;font-weight:700}

.passage{background:rgba(30,58,138,0.12);border:1px dashed rgba(245,245,245,0.18);border-radius:12px;padding:14px 18px;margin-bottom:16px;font-family:"Cormorant Garamond",serif;font-size:15.5px;line-height:1.8;color:#e8edfa}
.passage .eh{font-family:"Tajawal";font-size:12px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:6px;margin-bottom:8px}
.passage .eh b{color:var(--gold)}

.options{display:grid;gap:10px;margin-top:14px}
.opt{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);padding:13px 16px;border-radius:12px;cursor:pointer;font-size:15px;transition:all 0.18s;text-align:right;font-family:inherit;color:var(--text);width:100%}
.opt .fr-txt{font-family:"Cormorant Garamond",serif;font-size:16.5px;color:#dbe4f8}
.opt:hover{border-color:var(--cyan);background:rgba(0,245,255,0.05);transform:translateX(-3px)}
.opt .letter{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.06);display:grid;place-items:center;font-family:"Orbitron";font-weight:700;color:var(--gold);flex-shrink:0;font-size:13px}
.opt.correct{background:rgba(16,209,139,0.12);border-color:var(--ok)}
.opt.correct .letter{background:var(--ok);color:#04241a}
.opt.wrong{background:rgba(255,88,117,0.12);border-color:var(--bad)}
.opt.wrong .letter{background:var(--bad);color:#2a050c}
.opt:disabled{cursor:not-allowed;opacity:0.88}

.feedback{margin-top:14px;padding:14px 16px;border-radius:12px;font-size:14px;line-height:1.8;display:none;border-right:3px solid var(--gold);background:rgba(251,191,36,0.06)}
.feedback.show{display:block;animation:fadeIn 0.35s ease}
.feedback b{color:var(--gold)}
.feedback .fr{font-family:"Cormorant Garamond",serif;font-style:italic;color:#e7ecff}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.nav-btns{display:flex;justify-content:space-between;gap:10px;margin-top:20px}
.btn{font-family:"Tajawal";font-weight:900;font-size:14px;padding:12px 22px;border-radius:12px;border:none;cursor:pointer;transition:all 0.18s}
.btn-primary{background:var(--cyan);color:var(--dark);box-shadow:0 6px 20px rgba(0,245,255,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,245,255,0.4)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid rgba(255,255,255,0.1)}
.btn-ghost:hover{background:rgba(255,255,255,0.08)}

.result{display:none;text-align:center;padding:44px 24px}
.result.show{display:block;animation:fadeIn 0.5s ease}
.result .emoji{font-size:80px;margin-bottom:16px}
.result h2{font-family:"Cormorant Garamond",serif;font-size:40px;margin-bottom:8px;color:#fff;font-weight:700}
.result .score-big{font-family:"Orbitron";font-size:56px;font-weight:900;background:linear-gradient(90deg,var(--fr-blue),var(--fr-red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:16px 0}
.result .tier{color:var(--gold);font-size:20px;margin-bottom:22px;font-family:"Cormorant Garamond",serif;font-style:italic}
.result .msg{color:var(--muted);margin-bottom:28px;font-size:15px;line-height:1.8;max-width:500px;margin-left:auto;margin-right:auto}
.result-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

@media(max-width:640px){
  nav{padding:0 20px}
  .wrap{padding:90px 16px 60px}
  .hero{padding:22px}
  .hero h1{font-size:21px}
  .hero-top{flex-wrap:wrap}
  .card{padding:22px 18px}
  .qtext{font-size:16px}
  .passage{font-size:14px}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<nav>
  <div class="nav-logo">A · A · J</div>
  <a class="nav-back" href="index.html">→ رجوع</a>
</nav>

<div class="cw">
<div class="wrap">

  <div class="hero">
    <div class="hero-top">
      <div class="hero-badge">Fr</div>
      <div>
        <h1>Dossiers 4-6 + DELF A1</h1>
        <div class="hero-sub">الفرنسي · الصف الثاني عشر أدبي · الفصل الدراسي الثاني</div>
      </div>
    </div>
    <div class="hero-meta">
      <span class="hero-pill">Une fête</span>
      <span class="hero-pill">Une maladie</span>
      <span class="hero-pill">Un logement</span>
      <span class="hero-pill gold">Vers le DELF Junior A1</span>
    </div>
  </div>

  <div class="progress-bar">
    <div class="pb-text">Question <b id="q-cur">1</b> / <b>15</b></div>
    <div class="pb-track"><div class="pb-fill" id="pb-fill"></div></div>
    <div class="pb-score">Score: <span id="score">0</span>/15</div>
  </div>

  <div id="quiz"></div>

  <div class="result" id="result">
    <div class="emoji" id="result-emoji">🎉</div>
    <h2>Terminé !</h2>
    <div class="score-big"><span id="final-score">0</span>/15</div>
    <div class="tier" id="tier">—</div>
    <div class="msg" id="result-msg"></div>
    <div class="result-buttons">
      <button class="btn btn-primary" onclick="location.reload()">🔄 إعادة المحاولة</button>
      <a class="btn btn-ghost" href="index.html" style="text-decoration:none;display:inline-block">→ القائمة الرئيسية</a>
    </div>
  </div>

</div>
</div>

<script>
const QUESTIONS = [
  // ============ DOSSIER 4 : UNE FÊTE (5 questions) ============
  {
    dossier: 'D4 · Une fête',
    q: 'اختر الترجمة الصحيحة: "<span class="fr">Une fête d\'anniversaire</span>"',
    options: ['حفلة زواج','حفلة عيد ميلاد','حفلة وطنية','حفلة تخرج'],
    answer: 1,
    explain: '<span class="fr">Une fête d\'anniversaire</span> تعني حفلة عيد ميلاد. أما <span class="fr">fête de mariage</span> = حفلة زواج، و<span class="fr">fête nationale</span> = حفلة وطنية.'
  },
  {
    dossier: 'D4 · Grammaire',
    q: 'اختر التصريف الصحيح: <span class="fr">Je ___ que tu as raison.</span>',
    options: ['pense','penses','pensons','pensent'],
    answer: 0,
    explain: 'مع الضمير <span class="fr">Je</span> يُصرَّف فعل <span class="fr">penser</span> إلى <span class="fr">pense</span>. الصيغة <span class="fr">penser que</span> تُستخدم لإبداء الرأي.'
  },
  {
    dossier: 'D4 · Quantificateurs',
    q: 'اختر صيغة الكمية الصحيحة: <span class="fr">Ma mère achète un kilo ___ fruits.</span>',
    options: ['des','de','du','de la'],
    answer: 1,
    explain: 'مع الكميات المحددة مثل <span class="fr">un kilo, une bouteille, un paquet</span> نستعمل <span class="fr">de</span> دائمًا (أو <span class="fr">d\'</span> أمام حرف علة).'
  },
  {
    dossier: 'D4 · Imparfait',
    q: 'ما تصريف الفعل <span class="fr">être</span> في الـ<span class="fr">imparfait</span> مع الضمير <span class="fr">Il</span>؟',
    options: ['est','était','étais','a été'],
    answer: 1,
    explain: 'تصريف <span class="fr">être</span> في الـ<span class="fr">imparfait</span>: j\'étais, tu étais, il/elle <b>était</b>, nous étions, vous étiez, ils/elles étaient. وهو الاستثناء الوحيد في قاعدة الـ<span class="fr">imparfait</span>.'
  },
  {
    dossier: 'D4 · Culture',
    q: 'يحتفل الكويت بـ<span class="fr">la fête nationale</span> في أي تاريخ؟',
    options: [
      '<span class="fr-txt">Le 15 janvier</span>',
      '<span class="fr-txt">Le 25 février</span>',
      '<span class="fr-txt">Le 1er mai</span>',
      '<span class="fr-txt">Le 26 février</span>'
    ],
    answer: 1,
    explain: '<span class="fr">Le 25 février</span> هو تاريخ العيد الوطني للكويت، و<span class="fr">le 26 février</span> هو يوم التحرير (<span class="fr">la libération de l\'occupation irakienne de 1991</span>).'
  },

  // ============ DOSSIER 5 : UNE MALADIE (5 questions) ============
  {
    dossier: 'D5 · Une maladie',
    q: 'ما معنى عبارة "<span class="fr">Ça ne va pas</span>"؟',
    options: ['أنا بخير','أنا لست بخير','أنا سعيد','أنا متعب قليلاً'],
    answer: 1,
    explain: '<span class="fr">Ça ne va pas = Je vais mal</span> أي "أنا لست بخير". وعكسها <span class="fr">Ça va / Je vais bien</span>.'
  },
  {
    dossier: 'D5 · Avoir mal',
    q: 'أكمل: <span class="fr">J\'ai mal ___ tête.</span>',
    options: ['au','à la','à','aux'],
    answer: 1,
    explain: 'مع <span class="fr">avoir mal</span> نستعمل: <span class="fr">à la</span> قبل المؤنث (<span class="fr">la tête</span>)، <span class="fr">au</span> قبل المذكر، <span class="fr">à l\'</span> قبل حرف العلة، و<span class="fr">aux</span> للجمع.'
  },
  {
    dossier: 'D5 · Impératif',
    q: 'حوّل للأمر المنفي: <span class="fr">Tu manges trop.</span>',
    options: [
      '<span class="fr-txt">Manges pas !</span>',
      '<span class="fr-txt">Ne manges pas trop !</span>',
      '<span class="fr-txt">Ne mange pas trop !</span>',
      '<span class="fr-txt">Pas manger !</span>'
    ],
    answer: 2,
    explain: 'في <span class="fr">l\'impératif</span>، مع أفعال المجموعة الأولى (<span class="fr">-er</span>) تُحذف الـ<span class="fr">s</span> من <span class="fr">tu</span>. ثم النفي: <span class="fr">Ne mange pas trop !</span>'
  },
  {
    dossier: 'D5 · Verbes pronominaux',
    q: 'اختر التصريف الصحيح: <span class="fr">Je ___ tôt le matin.</span> (se lever)',
    options: ['me lève','te lèves','se lève','nous levons'],
    answer: 0,
    explain: 'فعل <span class="fr">se lever</span> فعل ضميري. مع <span class="fr">Je</span> يصبح <span class="fr">je me lève</span>. الضمائر الضميرية: <span class="fr">me, te, se, nous, vous, se</span>.'
  },
  {
    dossier: 'D5 · Atelier',
    q: 'في ورشة حماية البيئة، أي من التالي ليس حلاً لمكافحة التلوث؟',
    options: [
      '<span class="fr-txt">Recycler les déchets</span>',
      '<span class="fr-txt">Planter des arbres</span>',
      '<span class="fr-txt">Gaspiller l\'eau</span>',
      '<span class="fr-txt">Éviter les gaz d\'échappement</span>'
    ],
    answer: 2,
    explain: '<span class="fr">Gaspiller l\'eau</span> (إهدار الماء) هو <b>مشكلة</b> وليس حلاً. الحلول: <span class="fr">Réduire les déchets, protéger la nature, nettoyer les plages</span>.'
  },

  // ============ DOSSIER 6 : UN LOGEMENT (4 questions) ============
  {
    dossier: 'D6 · Un logement',
    q: 'ما معنى "<span class="fr">déménager</span>"؟',
    options: [
      'تنظيف المنزل',
      'شراء منزل',
      'تغيير السكن',
      'استئجار منزل'
    ],
    answer: 2,
    explain: '<span class="fr">Déménager = changer de logement</span> أي الانتقال إلى سكن جديد. ومنها <span class="fr">un logement = un domicile = un habitat</span>.'
  },
  {
    dossier: 'D6 · Conditionnel',
    q: 'اختر التصريف الصحيح في الـ<span class="fr">conditionnel présent</span>: <span class="fr">J\'___ une maison à la campagne.</span> (aimer)',
    options: ['aime','aimais','aimerai','aimerais'],
    answer: 3,
    explain: 'الـ<span class="fr">conditionnel présent</span> = جذر المستقبل + نهايات الـ<span class="fr">imparfait</span> (-ais, -ais, -ait, -ions, -iez, -aient). <span class="fr">aimer → j\'aimerais</span>.'
  },
  {
    dossier: 'D6 · Adjectifs',
    q: 'اختر الصفة الصحيحة: <span class="fr">Une villa ___.</span>',
    options: ['beau','bel','belle','beaux'],
    answer: 2,
    explain: '<span class="fr">Beau</span> مذكر، <span class="fr">bel</span> مذكر قبل حرف علة، <span class="fr">belle</span> مؤنث، <span class="fr">beaux</span> جمع مذكر. مع <span class="fr">une villa</span> (مؤنث) نستعمل <span class="fr">belle</span>.'
  },
  {
    dossier: 'D6 · Vie urbaine',
    q: 'ما هو من "<span class="fr">avantages</span>" السكن في المدينة؟',
    options: [
      '<span class="fr-txt">Beaucoup de bruit</span>',
      '<span class="fr-txt">Pollution</span>',
      '<span class="fr-txt">Proximité des écoles et hôpitaux</span>',
      '<span class="fr-txt">Loyer cher</span>'
    ],
    answer: 2,
    explain: 'من مزايا المدينة: <span class="fr">proximité des services, écoles, hôpitaux, magasins, transports publics</span>. من عيوبها: <span class="fr">bruit, pollution, loyer cher</span>.'
  },

  // ============ DELF A1 (1 question — reading comprehension) ============
  {
    dossier: 'DELF A1 · Compréhension écrite',
    passage: `<div class="eh"><b>De :</b> Magali &nbsp; <b>À :</b> Farah</div>Salut Farah,<br>Le 31 octobre, je vais avoir 30 ans. Pour fêter ça, j'organise une fête jeudi soir à partir de vingt heures dans mon nouvel appartement.<br>Est-ce que tu peux venir ? Est-ce que tu pourrais apporter une tarte ?<br>Voici ma nouvelle adresse : 16, rue des Arts 75019 Paris.<br>À jeudi, Magali`,
    q: 'بعد قراءة الرسالة: <span class="fr">À quelle heure commencera la fête ?</span>',
    options: [
      '<span class="fr-txt">À 18 heures</span>',
      '<span class="fr-txt">À 19 heures</span>',
      '<span class="fr-txt">À 20 heures</span>',
      '<span class="fr-txt">À 22 heures</span>'
    ],
    answer: 2,
    explain: '<span class="fr">à partir de vingt heures</span> = ابتداءً من الساعة 20:00 (الثامنة مساءً). وعمر ماغالي سيصبح 30 سنة، والدعوة إلى شقتها الجديدة في باريس.'
  }
];

const letters = ['A','B','C','D'];
let idx = 0, score = 0, locked = false;
const quiz = document.getElementById('quiz');
const pbFill = document.getElementById('pb-fill');
const qCur = document.getElementById('q-cur');
const scoreEl = document.getElementById('score');

function render(){
  if(idx >= QUESTIONS.length){ finish(); return; }
  const q = QUESTIONS[idx];
  pbFill.style.width = (idx / QUESTIONS.length * 100) + '%';
  qCur.textContent = idx + 1;
  quiz.innerHTML = `
    <div class="card">
      <div class="qnum">QUESTION ${String(idx+1).padStart(2,'0')} / 15 <span class="dossier-tag">${q.dossier}</span></div>
      ${q.passage ? `<div class="passage">${q.passage}</div>` : ''}
      <div class="qtext">${q.q}</div>
      <div class="options">
        ${q.options.map((o,i) => `<button class="opt" data-i="${i}"><span class="letter">${letters[i]}</span><span>${o}</span></button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <div class="nav-btns">
        <button class="btn btn-ghost" id="skip">تخطّي</button>
        <button class="btn btn-primary" id="next" disabled>التالي ←</button>
      </div>
    </div>
  `;
  locked = false;
  quiz.querySelectorAll('.opt').forEach(b => b.addEventListener('click', () => choose(parseInt(b.dataset.i))));
  document.getElementById('next').addEventListener('click', () => { idx++; render(); });
  document.getElementById('skip').addEventListener('click', () => { idx++; render(); });
}

function choose(i){
  if(locked) return;
  locked = true;
  const q = QUESTIONS[idx];
  const opts = quiz.querySelectorAll('.opt');
  opts.forEach((b, bi) => {
    b.disabled = true;
    if(bi === q.answer) b.classList.add('correct');
    else if(bi === i) b.classList.add('wrong');
  });
  const fb = document.getElementById('fb');
  const correct = i === q.answer;
  if(correct){ score++; scoreEl.textContent = score; }
  fb.innerHTML = `<b>${correct ? '✔ Correct !' : '✘ Incorrect.'}</b> ${q.explain}`;
  fb.classList.add('show');
  document.getElementById('next').disabled = false;
}

function finish(){
  document.getElementById('quiz').style.display = 'none';
  pbFill.style.width = '100%';
  qCur.textContent = '15';
  const r = document.getElementById('result');
  r.classList.add('show');
  document.getElementById('final-score').textContent = score;
  const pct = score / QUESTIONS.length * 100;
  let emoji, tier, msg;
  if(pct >= 90){ emoji = '🏆'; tier = 'Excellent — Félicitations !'; msg = 'أداء متميز! إتقان كامل للدوسيهات 4-5-6 وجاهزية عالية لامتحان <span class="fr">DELF Junior A1</span>.'; }
  else if(pct >= 75){ emoji = '🎉'; tier = 'Très bien — مستوى ممتاز'; msg = 'نتيجة جيدة جداً. راجع الأسئلة التي أخطأت فيها للوصول إلى مستوى الإتقان.'; }
  else if(pct >= 60){ emoji = '👍'; tier = 'Bien — جيد'; msg = 'اقتربت من الهدف. ركّز على الـ<span class="fr">imparfait</span> والـ<span class="fr">conditionnel</span> وتصريف الأفعال الضميرية.'; }
  else if(pct >= 40){ emoji = '📚'; tier = 'Passable — يحتاج مراجعة'; msg = 'راجع الدوسيهات 4-5-6 بعناية: المفردات، القواعد، والتواصل.'; }
  else{ emoji = '💪'; tier = 'À refaire — حاول مجدداً'; msg = 'لا تيأس! أعد قراءة الكتاب ثم حاول مرة أخرى.'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('tier').textContent = tier;
  document.getElementById('result-msg').innerHTML = msg;
}

// particle background - matches index.html exactly
const cv = document.getElementById('bg'), cx = cv.getContext('2d');
let ns = [];
function rsz(){ cv.width = innerWidth; cv.height = innerHeight; }
function ini(){ ns = Array.from({length: 50}, () => ({ x: Math.random()*cv.width, y: Math.random()*cv.height, vx: (Math.random()-0.5)*0.45, vy: (Math.random()-0.5)*0.45, r: Math.random()*2.5 + 1.2 })); }
function draw(){
  cx.clearRect(0, 0, cv.width, cv.height);
  ns.forEach(n => { n.x += n.vx; n.y += n.vy; if(n.x<0||n.x>cv.width) n.vx *= -1; if(n.y<0||n.y>cv.height) n.vy *= -1; });
  for(let i=0; i<ns.length; i++) for(let j=i+1; j<ns.length; j++){
    const dx = ns[i].x - ns[j].x, dy = ns[i].y - ns[j].y, d = Math.sqrt(dx*dx + dy*dy);
    if(d < 160){ cx.beginPath(); cx.moveTo(ns[i].x, ns[i].y); cx.lineTo(ns[j].x, ns[j].y); cx.strokeStyle = `rgba(0,245,255,${(1-d/160)*0.1})`; cx.lineWidth = 0.7; cx.stroke(); }
  }
  ns.forEach(n => { cx.beginPath(); cx.arc(n.x, n.y, n.r, 0, Math.PI*2); cx.fillStyle = 'rgba(0,245,255,0.22)'; cx.fill(); });
  requestAnimationFrame(draw);
}
rsz(); ini(); draw();
window.addEventListener('resize', () => { rsz(); ini(); });

render();
</script>
