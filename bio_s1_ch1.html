<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧬 الفصل الأول: دراسة الخليّة الحية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--g:#22c55e;--g2:#16a34a;--p:#7c3aed;--gold:#fbbf24;--dark:#020617;--card:rgba(15,23,42,0.92);--text:#f1f5f9;--muted:rgba(241,245,249,0.6);--red:#ef4444;--border:rgba(34,197,94,0.18)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Tajawal",sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
#bgc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:10;width:100%;max-width:1000px;padding:20px 32px;display:flex;flex-direction:column;gap:16px}
.header{display:flex;justify-content:space-between;align-items:center}
.logo{font-family:"Orbitron",sans-serif;font-size:12px;color:var(--g);letter-spacing:2px;text-shadow:0 0 14px rgba(34,197,94,0.5)}
.score-badge{background:rgba(34,197,94,0.08);border:2px solid var(--g);border-radius:50px;padding:8px 22px;display:flex;align-items:center;gap:8px;box-shadow:0 0 18px rgba(34,197,94,0.2)}
.sc-lbl{font-size:15px;color:var(--muted)}
.sc-val{font-family:"Orbitron",sans-serif;font-size:26px;font-weight:900;color:var(--g);text-shadow:0 0 12px var(--g);transition:transform 0.3s cubic-bezier(.34,1.56,.64,1)}
.sc-val.pop{transform:scale(1.5)}
.prog-track{width:100%;height:7px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--g));border-radius:999px;transition:width 0.6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(34,197,94,0.5)}
.prog-lbl{text-align:center;font-size:15px;color:var(--muted);margin-top:3px;letter-spacing:1px}
.qcard{background:var(--card);border:1.5px solid var(--border);border-radius:22px;padding:32px 38px;position:relative;backdrop-filter:blur(14px);box-shadow:0 0 30px rgba(34,197,94,0.05)}
.qcard.si{animation:sIn 0.45s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes sIn{from{transform:translateX(70px);opacity:0}to{transform:translateX(0);opacity:1}}
.q-num{font-family:"Orbitron",sans-serif;font-size:13px;color:var(--p);margin-bottom:12px;letter-spacing:3px}
.q-text{font-size:26px;font-weight:700;line-height:1.6;color:#f1f5f9}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.opt{background:rgba(30,41,59,0.9);border:2px solid rgba(255,255,255,0.09);border-radius:16px;padding:18px 22px;font-family:"Tajawal",sans-serif;font-size:19px;font-weight:700;color:#e2e8f0;cursor:pointer;text-align:right;display:flex;align-items:center;gap:12px;transition:all 0.18s ease;position:relative;overflow:hidden;line-height:1.4}
.opt:hover:not(:disabled){border-color:rgba(34,197,94,0.45);transform:translateY(-3px);box-shadow:0 8px 24px rgba(34,197,94,0.13);color:#fff}
.opt:active:not(:disabled){transform:scale(0.97)}
.opt-ltr{font-family:"Orbitron",sans-serif;font-size:14px;font-weight:900;color:var(--g);background:rgba(34,197,94,0.1);border:1.5px solid rgba(34,197,94,0.25);border-radius:8px;min-width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.18s}
.opt.correct{background:rgba(34,197,94,0.14)!important;border-color:var(--g)!important;color:#fff!important;box-shadow:0 0 24px rgba(34,197,94,0.35)!important;animation:cpulse 0.6s ease}
.opt.correct .opt-ltr{background:var(--g);color:#fff;border-color:var(--g)}
@keyframes cpulse{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
.opt.wrong{background:rgba(239,68,68,0.13)!important;border-color:var(--red)!important;box-shadow:0 0 24px rgba(239,68,68,0.25)!important;animation:shake 0.45s ease}
.opt.wrong .opt-ltr{background:var(--red);color:#fff;border-color:var(--red)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
.explanation{margin-top:16px;background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.25);border-right:3px solid var(--g);border-radius:12px;padding:14px 18px;font-size:16px;line-height:1.8;color:rgba(241,245,249,0.85);display:none}
.explanation.show{display:block;animation:fadeIn 0.35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.next-btn{margin-top:14px;width:100%;padding:14px;background:linear-gradient(135deg,var(--g2),var(--g));border:none;border-radius:12px;font-family:"Tajawal",sans-serif;font-size:18px;font-weight:900;color:#fff;cursor:pointer;transition:all 0.2s;display:none}
.next-btn.show{display:block;animation:fadeIn 0.3s ease}
.next-btn:hover{transform:translateY(-2px);filter:brightness(1.1)}
.fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:90px;z-index:100;pointer-events:none}
.fb.sc{animation:fbSc 0.9s ease forwards}
.fb.wr{animation:fbWr 0.9s ease forwards}
@keyframes fbSc{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}70%{transform:translate(-50%,-50%) scale(1.0);opacity:1}100%{transform:translate(-50%,-65%) scale(0.65);opacity:0}}
@keyframes fbWr{0%{transform:translate(-50%,-50%) scale(0) rotate(0deg);opacity:0}40%{transform:translate(-50%,-50%) scale(1.15) rotate(-8deg);opacity:1}100%{transform:translate(-50%,-65%) scale(0.65) rotate(8deg);opacity:0}}
#cfcvs{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:6}
.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:50px 30px;max-width:700px;margin:0 auto}
.final.vis{display:flex;animation:fadeIn 0.5s ease}
.f-stars{font-size:48px;margin-bottom:18px}
.f-title{font-size:36px;font-weight:900;margin-bottom:10px}
.f-msg{font-size:18px;color:var(--muted);margin-bottom:28px;line-height:1.7}
.f-score-box{background:rgba(34,197,94,0.08);border:2px solid var(--g);border-radius:20px;padding:28px 60px;margin-bottom:32px}
.f-sc-lbl{font-size:16px;color:var(--muted);margin-bottom:6px}
.f-sc-num{font-family:"Orbitron",sans-serif;font-size:64px;font-weight:900;color:var(--g);text-shadow:0 0 20px var(--g)}
.restart-btn{background:linear-gradient(135deg,var(--p),var(--g));color:#fff;border:none;border-radius:14px;padding:16px 48px;font-family:"Tajawal",sans-serif;font-size:20px;font-weight:900;cursor:pointer;transition:all 0.2s;margin-bottom:16px}
.restart-btn:hover{transform:translateY(-3px);filter:brightness(1.1)}
.back-home{color:var(--muted);font-size:15px;cursor:pointer;text-decoration:underline}
.streak-bar{display:flex;gap:5px;justify-content:center}
.sd{width:22px;height:8px;border-radius:4px;background:rgba(255,255,255,0.1);transition:all 0.3s}
.sd.filled{background:var(--g);box-shadow:0 0 6px var(--g)}
@media(max-width:640px){.wrap{padding:14px 16px}.q-text{font-size:20px}.opts{grid-template-columns:1fr}.opt{font-size:17px}}
</style>
</head>
<body>
<canvas id="bgc"></canvas>
<canvas id="cfcvs"></canvas>
<div id="fb-el" class="fb"></div>

<div class="wrap" id="quiz-screen">
  <div class="header">
    <div class="logo">🧬 CELL BIOLOGY</div>
    <div class="score-badge"><span class="sc-lbl">النقاط</span><span class="sc-val" id="sc-val">0</span></div>
  </div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-lbl" id="prog-lbl"></div>
  <div class="streak-bar" id="streak-bar"></div>
  <div class="qcard" id="qcard">
    <div class="q-num" id="q-num"></div>
    <div class="q-text" id="q-text"></div>
    <div class="opts" id="opts-grid"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">التالي ←</button>
  </div>
</div>

<div class="final" id="final-screen">
  <div class="f-stars" id="f-stars"></div>
  <div class="f-title" id="f-title"></div>
  <div class="f-msg" id="f-msg"></div>
  <div class="f-score-box"><div class="f-sc-lbl">مجموع نقاطك</div><div class="f-sc-num" id="f-sc-num">0</div></div>
  <button class="restart-btn" onclick="restart()">🔄 إعادة المحاولة</button>
  <span class="back-home" onclick="window.history.back()">← العودة للموقع</span>
</div>

<script>
const QS = [{"q": "ما الوحدة الأساسية التركيبية والوظيفية في جميع الكائنات الحية؟", "opts": ["الجين 🧬", "الخليّة 🔬", "النسيج 🫀", "العضو 🫁"], "ans": 1, "exp": "الخليّة هي الوحدة الأساسية للحياة وفقاً لنظرية الخليّة Cell Theory، فكل كائن حي يتكوّن من خلية واحدة أو أكثر."}, {"q": "من أول من اكتشف الخلايا باستخدام المجهر في القرن السابع عشر؟", "opts": ["لويس باستور", "روبرت هوك Robert Hooke", "تشارلز داروين", "آنطون فان ليفنهوك"], "ans": 1, "exp": "روبرت هوك Robert Hooke هو أول من رصد الخلايا عام 1665 عند فحصه للفلّين تحت المجهر، وأطلق عليها اسم 'خلايا' Cells."}, {"q": "أيٌّ من الخلايا التالية تمتلك نواة حقيقية محاطة بغشاء؟", "opts": ["الخلايا بدائية النواة Prokaryotic", "الخلايا حقيقية النواة Eukaryotic", "البكتيريا", "الفيروسات"], "ans": 1, "exp": "الخلايا حقيقية النواة Eukaryotic تمتلك نواة حقيقية محاطة بغشاء نووي، بعكس الخلايا بدائية النواة Prokaryotic كالبكتيريا."}, {"q": "ما وظيفة الميتوكوندريا Mitochondria؟", "opts": ["تصنيع البروتينات 🔧", "إنتاج الطاقة ATP ⚡", "التخزين المائي 💧", "هضم المواد الغذائية"], "ans": 1, "exp": "الميتوكوندريا Mitochondria هي 'مصنع الطاقة' في الخلية، إذ تُنتج ATP عبر عملية التنفس الخلوي Cellular Respiration."}, {"q": "ما الفرق الرئيسي بين الخلية النباتية والخلية الحيوانية؟", "opts": ["الخلية النباتية لا تمتلك نواة", "الخلية النباتية تمتلك جداراً خلوياً Cell Wall وبلاستيدات خضراء Chloroplasts", "الخلية الحيوانية أكبر حجماً", "الخلية الحيوانية تمتلك فجوة عصارية Vacuole أكبر"], "ans": 1, "exp": "تتميز الخلية النباتية بامتلاكها جداراً خلوياً Cell Wall من السيليلوز وبلاستيدات خضراء Chloroplasts للتمثيل الضوئي."}, {"q": "ما وظيفة الشبكة الإندوبلازمية الخشنة Rough ER؟", "opts": ["تصنيع الدهون", "تصنيع البروتينات وتجهيزها 🔬", "تخزين الطاقة", "التخلص من الفضلات"], "ans": 1, "exp": "الشبكة الإندوبلازمية الخشنة Rough ER تحمل الريبوسومات Ribosomes على سطحها وتُساهم في تصنيع البروتينات وتجهيزها للإفراز."}, {"q": "أيٌّ من الأنسجة التالية يُغطّي سطح الجسم ويبطّن التجاويف؟", "opts": ["النسيج العضلي Muscle Tissue", "النسيج الضام Connective Tissue", "النسيج الطلائي Epithelial Tissue", "النسيج العصبي Nervous Tissue"], "ans": 2, "exp": "النسيج الطلائي Epithelial Tissue يُغطّي الأسطح الخارجية والداخلية للجسم، ويؤدي وظائف الحماية والامتصاص والإفراز."}, {"q": "ما الذي يميّز الفيروسات Viruses عن الكائنات الحية الأخرى؟", "opts": ["تتكاثر بشكل مستقل", "لا تمتلك خلايا وتحتاج خلية مضيفة للتكاثر", "تمتلك جدار خلوي", "تقوم بعملية التمثيل الضوئي"], "ans": 1, "exp": "الفيروسات Viruses ليست خلايا حية، فهي تتكوّن من مادة وراثية (DNA أو RNA) محاطة ببروتين، ولا تستطيع التكاثر بدون خلية مضيفة Host Cell."}, {"q": "ما وظيفة الليزوسومات Lysosomes داخل الخلية؟", "opts": ["تصنيع البروتين", "هضم وتكسير المواد والعضيات التالفة ♻️", "إنتاج الطاقة", "تخزين المعلومات الوراثية"], "ans": 1, "exp": "الليزوسومات Lysosomes تحتوي على إنزيمات هاضمة تُفكّك المواد الغذائية والعضيات التالفة وتُنظّف الخلية — لهذا تُسمّى 'وحدات الهضم الخلوي'."}, {"q": "أيٌّ مما يلي ليس من مبادئ نظرية الخليّة Cell Theory؟", "opts": ["جميع الكائنات الحية مؤلّفة من خلايا", "الخليّة هي الوحدة الأساسية للحياة", "الفيروسات خلايا حية متطوّرة 🦠", "كل خلية تنشأ من خلية سابقة"], "ans": 2, "exp": "تنص نظرية الخليّة Cell Theory على ثلاثة مبادئ: كل الكائنات من خلايا، الخليّة وحدة الحياة، وكل خلية تأتي من خلية. الفيروسات ليست خلايا حية."}];
const L = ['A','B','C','D'];
let cq=0, sc=0, streak=0, maxStreak=0, answered=false;

// Confetti
const cfc=document.getElementById('cfcvs'),ccx=cfc.getContext('2d');
cfc.width=innerWidth;cfc.height=innerHeight;
let cfs=[];
function launchCf(x,y,n=18){
  const cols=['#22c55e','#7c3aed','#fbbf24','#00f5ff','#f472b6'];
  for(let i=0;i<n;i++) cfs.push({x,y,vx:(Math.random()-.5)*13,vy:(Math.random()-1)*11,r:Math.random()*5+2,color:cols[Math.floor(Math.random()*cols.length)],life:1,spin:Math.random()*5-2.5,angle:Math.random()*360});
}
function drawCf(){
  ccx.clearRect(0,0,cfc.width,cfc.height);
  cfs=cfs.filter(c=>c.life>0);
  cfs.forEach(c=>{c.x+=c.vx;c.y+=c.vy;c.vy+=0.38;c.life-=0.022;c.angle+=c.spin;ccx.save();ccx.globalAlpha=c.life;ccx.translate(c.x,c.y);ccx.rotate(c.angle*Math.PI/180);ccx.fillStyle=c.color;ccx.fillRect(-c.r/2,-c.r/2,c.r,c.r*2);ccx.restore()});
  requestAnimationFrame(drawCf);
}
drawCf();

// Neural background
const bgc=document.getElementById('bgc'),bgx=bgc.getContext('2d');
let ns=[];
function rszBg(){bgc.width=innerWidth;bgc.height=innerHeight}
function initNs(){ns=Array.from({length:45},()=>{return{x:Math.random()*bgc.width,y:Math.random()*bgc.height,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2.5+1}})}
function drawBg(){
  bgx.clearRect(0,0,bgc.width,bgc.height);
  ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bgc.width)n.vx*=-1;if(n.y<0||n.y>bgc.height)n.vy*=-1});
  for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<150){bgx.beginPath();bgx.moveTo(ns[i].x,ns[i].y);bgx.lineTo(ns[j].x,ns[j].y);bgx.strokeStyle=`rgba(34,197,94,${(1-d/150)*.1})`;bgx.lineWidth=.65;bgx.stroke()}}
  ns.forEach(n=>{bgx.beginPath();bgx.arc(n.x,n.y,n.r,0,Math.PI*2);bgx.fillStyle='rgba(34,197,94,0.2)';bgx.fill()});
  requestAnimationFrame(drawBg);
}
rszBg();initNs();drawBg();
window.addEventListener('resize',()=>{rszBg();initNs();cfc.width=innerWidth;cfc.height=innerHeight});

function buildStreak(){
  const bar=document.getElementById('streak-bar');bar.innerHTML='';
  for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' filled':'');bar.appendChild(d)}
}

function loadQ(){
  answered=false;
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('explanation').style.display='none';
  const q=QS[cq];
  const pct=(cq/QS.length)*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-lbl').textContent='السؤال '+(cq+1)+' من '+QS.length;
  document.getElementById('q-num').textContent='QUESTION '+String(cq+1).padStart(2,'0');
  const card=document.getElementById('qcard');
  card.classList.remove('si');void card.offsetWidth;card.classList.add('si');
  document.getElementById('q-text').textContent=q.q;
  const grid=document.getElementById('opts-grid');grid.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="opt-ltr">${L[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click',()=>pick(i,btn));
    grid.appendChild(btn);
  });
  buildStreak();
}

function pick(idx,btn){
  if(answered)return;answered=true;
  const q=QS[cq];
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb-el');
  fb.classList.remove('sc','wr');

  if(idx===q.ans){
    btn.classList.add('correct');sc+=10;streak++;if(streak>maxStreak)maxStreak=streak;
    const sv=document.getElementById('sc-val');
    document.getElementById('sc-val').textContent=sc;
    sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');
    setTimeout(()=>sv.classList.remove('pop'),400);
    fb.textContent=['🎯','✅','🔥','💥','⭐'][Math.floor(Math.random()*5)];
    fb.classList.add('sc');
    for(let i=0;i<4;i++)setTimeout(()=>launchCf(innerWidth*(0.2+Math.random()*0.6),innerHeight*0.4,14),i*80);
    // Show next button directly for correct
    setTimeout(()=>{
      document.getElementById('next-btn').classList.add('show');
    },600);
  }else{
    btn.classList.add('wrong');streak=0;
    btns[q.ans].classList.add('correct');
    fb.textContent=['❌','😬','💀','🙈'][Math.floor(Math.random()*4)];
    fb.classList.add('wr');
    // Show explanation for wrong answer
    const expEl=document.getElementById('explanation');
    expEl.textContent='💡 '+q.exp;
    expEl.style.display='block';
    setTimeout(()=>expEl.classList.add('show'),50);
    setTimeout(()=>document.getElementById('next-btn').classList.add('show'),400);
  }
  buildStreak();
}

function nextQ(){
  cq++;
  if(cq<QS.length)loadQ();
  else showFinal();
}

function showFinal(){
  document.getElementById('quiz-screen').style.display='none';
  const fs=document.getElementById('final-screen');fs.classList.add('vis');
  document.getElementById('f-sc-num').textContent=sc;
  const pct=sc/(QS.length*10);
  let title,msg,stars;
  if(pct===1){title='🌟 ممتاز! درجة كاملة!';msg='أجبت على جميع الأسئلة بشكل صحيح — أداء رائع! 🎉';stars='⭐⭐⭐⭐⭐'}
  else if(pct>=0.75){title='🔥 أداء رائع!';msg='تقريباً مثالي — مراجعة بسيطة وستصل للكمال! 💪';stars='⭐⭐⭐⭐'}
  else if(pct>=0.5){title='👍 أحسنت!';msg='نتيجة جيدة — راجع الدروس مرة أخرى لتتحسّن 📚';stars='⭐⭐⭐'}
  else{title='💡 حاول مجدداً!';msg='لا بأس، المراجعة ستُساعدك على الفهم أكثر 🌱';stars='⭐⭐'}
  document.getElementById('f-stars').textContent=stars;
  document.getElementById('f-title').textContent=title;
  document.getElementById('f-msg').textContent=msg;
  setTimeout(()=>{for(let i=0;i<10;i++)setTimeout(()=>launchCf(innerWidth*Math.random(),-20,25),i*110)},300);
}

function restart(){
  cq=0;sc=0;streak=0;maxStreak=0;answered=false;cfs=[];
