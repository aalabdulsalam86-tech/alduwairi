<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#f472b6;--c2:#be185d;--bg:#09000a;--brd:rgba(244,114,182,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr"><div class="logo">🧬 أحياء — الثاني عشر علمي</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>

    <div class="qn" id="qn"></div><div class="qt" id="qt"></div>

</div>

  <div class="fstars" id="fst"></div><div class="ftitle" id="ftl"></div>
  <div class="fmsg" id="fmg"></div>

  <span class="bhome" onclick="window.history.back()">← العودة للموقع</span>
</div>
<script>
const QS=[
  // الجهاز العصبي
  {q:"ما أنواع الخلايا العصبية (Neurons) من حيث الوظيفة؟",opts:["نوع واحد فقط","Sensory Neurons (حسية): تنقل السيالات من المستقبلات للجهاز المركزي — Motor Neurons (حركية): تنقل من المركزي للأعضاء المنفّذة — Interneurons (رابطة): تربط بين الحسية والحركية","نوعان فقط: حسية وحركية","ثلاثة أنواع متطابقة الوظيفة"],ans:1,exp:"أنواع الخلايا العصبية الثلاثة: Sensory (Afferent): تنقل السيالات من المستقبلات الحسية إلى الجهاز العصبي المركزي. Motor (Efferent): تنقل السيالات من الجهاز المركزي إلى الأعضاء المنفّذة (العضلات والغدد). Interneurons (Relay): توجد داخل الجهاز العصبي المركزي وتربط بين النوعين السابقين."},
  {q:"ما مكوّنات الجهاز العصبي المركزي (Central Nervous System) ووظائفه؟",opts:["الأعصاب الطرفية فقط","المخ (Brain) + النخاع الشوكي (Spinal Cord) — المخ: يتحكم في التفكير والذاكرة والحواس — النخاع: ينقل السيالات ويتحكم في الأفعال الانعكاسية","القلب والرئتان","الغدد فقط"],ans:1,exp:"الجهاز العصبي المركزي (CNS): يتكون من: (1) المخ Brain: مركز التحكم العليا — يحتوي على المخ الكبير (Cerebrum) للتفكير والحواس، والمخيخ (Cerebellum) للتوازن، وجذع الدماغ (Brain Stem) لوظائف حيوية. (2) النخاع الشوكي Spinal Cord: يمتد في العمود الفقري، ينقل السيالات بين المخ وباقي الجسم، ويتحكم في الأفعال الانعكاسية Reflexes."},
  {q:"ما الفعل الانعكاسي (Reflex Action) وكيف يختلف عن الاستجابة الإرادية؟",opts:["كلاهما يمر بالمخ","الفعل الانعكاسي: استجابة تلقائية سريعة تمر عبر النخاع الشوكي فقط دون المخ (Arc Reflex) — الإرادية: تمر بالمخ وتتطلب تفكيراً واعياً","الفعل الانعكاسي أبطأ من الإرادي","لا فرق بينهما"],ans:1,exp:"Reflex Action: استجابة لا إرادية سريعة جداً تمر عبر Reflex Arc في النخاع الشوكي مباشرةً دون انتظار المخ. مثال: سحب اليد عند لمس شيء حار. مسار القوس الانعكاسي: مستقبل → خلية حسية → النخاع الشوكي → خلية رابطة → خلية حركية → عضلة. الاستجابة الإرادية تمر بالمخ وتتطلب وعياً وتفكيراً."},
  // الجهاز الهرموني
  {q:"ما الفرق بين الجهاز العصبي والجهاز الهرموني (Endocrine System) في التنظيم؟",opts:["كلاهما متطابقان","العصبي: سريع (ميللي ثانية) عبر سيالات كهربائية، تأثيره محدد ومؤقت — الهرموني: بطيء (دقائق/ساعات) عبر هرمونات في الدم، تأثيره أوسع وأطول أمداً","الهرموني أسرع دائماً","العصبي أبطأ دائماً"],ans:1,exp:"مقارنة: الجهاز العصبي: سريع جداً (ميللي ثانية)، يستخدم سيالات عصبية، تأثيره موضعي ومحدد وقصير. الجهاز الهرموني (Endocrine): بطيء (دقائق إلى ساعات)، يستخدم هرمونات تنتقل عبر الدم، تأثيره واسع وعلى أعضاء متعددة وأطول أمداً. يعملان معاً لتنظيم وظائف الجسم وحفظ التوازن (Homeostasis)."},
  {q:"ما وظيفة الغدة النخامية (Pituitary Gland) ولماذا تُسمّى 'الغدة القائدة'؟",opts:["تُنتج الأنسولين فقط","تُفرز هرمونات تتحكم في الغدد الأخرى (درقية، كظرية، جنسية) + هرمون النمو GH + ADH + أوكسيتوسين — لذا تُسمّى Master Gland","تنظم سكر الدم فقط","تقع في البطن"],ans:1,exp:"الغدة النخامية Pituitary Gland: تقع في قاعدة الدماغ وتُسمّى Master Gland لأنها تتحكم في معظم الغدد الأخرى. تُفرز: هرمون النمو GH، TSH (يحفّز الدرقية)، ACTH (يحفّز الكظرية)، FSH وLH (يحفّزان الغدد الجنسية)، ADH (ينظم الماء في الكلى)، أوكسيتوسين (المخاض والرضاعة). تتحكم فيها منطقة الوطاء Hypothalamus."},
  {q:"ما وظيفة الأنسولين والجلوكاجون في تنظيم سكر الدم؟",opts:["كلاهما يرفع السكر","الأنسولين (Insulin): تُفرزه خلايا بيتا في البنكرياس عند ارتفاع السكر — يُخفّض الجلوكوز في الدم. الجلوكاجون (Glucagon): تُفرزه خلايا ألفا — يُرفع الجلوكوز. يعملان بشكل تعارضي (Antagonistic)","كلاهما يخفض السكر","الأنسولين يُرفع والجلوكاجون يُخفّض"],ans:1,exp:"تنظيم سكر الدم بالبنكرياس (Pancreas): Insulin (خلايا بيتا): عند ارتفاع الجلوكوز → يُحوّل الجلوكوز إلى جليكوجين في الكبد والعضلات → يُخفّض السكر في الدم. Glucagon (خلايا ألفا): عند انخفاض الجلوكوز → يُحوّل الجليكوجين إلى جلوكوز → يُرفع السكر. نقص الأنسولين أو عدم استجابة الخلايا له يُسبّب مرض السكري Diabetes Mellitus."},
  // الجهاز التناسلي
  {q:"ما مراحل تكوين الحيوانات المنوية (Spermatogenesis) في الخصيتين؟",opts:["تتكون مباشرة دون مراحل","خلايا جرثومية → Spermatogonia (انقسام ميتوزي) → Primary Spermatocyte → (انقسام ميوزي أول) → Secondary Spermatocyte → (ميوزي ثاني) → Spermatids → Sperm","تتكون في الكبد","خطوتان فقط: ميتوزيس ثم إنتاج"],ans:1,exp:"Spermatogenesis تحدث في الأنابيب المنوية Seminiferous Tubules في الخصية: Spermatogonium (2n) → ينقسم ميتوزياً → Primary Spermatocyte (2n) → ينقسم ميوزياً أول → 2 Secondary Spermatocytes (n) → ميوزي ثاني → 4 Spermatids (n) → تتحول إلى 4 Sperm ناضجة. العملية بأكملها تستغرق حوالي 74 يوماً. يُنظّمها هرمون FSH وTestosterone."},
  {q:"ما الإباضة (Ovulation) ومتى تحدث في الدورة الشهرية؟",opts:["تحدث يوم 1 من الدورة","خروج البويضة الناضجة من المبيض نحو قناة فالوب — تحدث عادةً حول اليوم 14 من الدورة (28 يوماً) استجابةً لارتفاع هرمون LH","تحدث يوم 28","تحدث يومياً"],ans:1,exp:"Ovulation: إطلاق بويضة ناضجة Graafian Follicle من المبيض نحو قناة فالوب Fallopian Tube. تحدث حوالي اليوم 14 من دورة 28 يوماً. المحفّز: ارتفاع مفاجئ في هرمون LH (Luteinizing Hormone) من النخامية. بعد الإباضة: يتحول الجريب إلى Corpus Luteum الذي يُفرز البروجيستيرون لتهيئة بطانة الرحم. البويضة تظل قابلة للإخصاب لمدة 12-24 ساعة."},
  {q:"ما مراحل الدورة الشهرية ودور الهرمونات فيها؟",opts:["مرحلة واحدة فقط","الطمث (1-5) → التكاثفي/الجُريبي (1-13): هرمون FSH + إستروجين — الإباضة (14): LH ↑ — الجسم الأصفر/الإفرازي (15-28): بروجيستيرون + إستروجين — إذا لم يحدث حمل: انهيار بطانة الرحم وطمث جديد","مرحلتان فقط","الهرمونات لا تؤثر في الدورة"],ans:1,exp:"الدورة الشهرية Menstrual Cycle (28 يوماً): (1) الطمث (1-5): تقشّر بطانة الرحم. (2) الجُريبي/التكاثفي (1-13): FSH يحفّز نضج الجريب → إستروجين يُسمّك البطانة. (3) الإباضة (يوم 14): LH ↑ → إطلاق البويضة. (4) الأصفري/الإفرازي (15-28): الجسم الأصفر Corpus Luteum يُفرز بروجيستيرون + إستروجين لإعداد البطانة. إذا لم يحدث إخصاب: انخفاض الهرمونات → طمث."},
  {q:"ما دور هرموني FSH وLH في الجهاز التناسلي لكلا الجنسين؟",opts:["يعملان في الإناث فقط","FSH: يحفّز نضج الحويصلات (إناث) وإنتاج الحيوانات المنوية (ذكور) — LH: يحفّز الإباضة وتكوين الجسم الأصفر (إناث) وإفراز التستوستيرون (ذكور)","LH لا يعمل عند الذكور","FSH يعمل عند الإناث فقط"],ans:1,exp:"FSH (Follicle Stimulating Hormone) وLH (Luteinizing Hormone) كلاهما من النخامية: في الإناث: FSH → نضج الجريب وإفراز الإستروجين. LH → الإباضة وتكوين Corpus Luteum. في الذكور: FSH → Spermatogenesis في الأنابيب المنوية. LH (يُسمى ICSH) → يحفّز خلايا Leydig لإفراز Testosterone. كلا الهرمونين تتحكم فيهما هرمون GnRH من الوطاء."},
  {q:"ما مراحل التخصيب والانقسام الخلوي الأولي (Cleavage) في البويضة الملقّحة؟",opts:["التخصيب يحدث في الرحم","التخصيب يحدث في قناة فالوب → تكوين Zygote (2n) → Cleavage (انقسامات ميتوزية متتالية) → Morula (كتلة صلبة) → Blastocyst → انغراس في بطانة الرحم يوم 6-7","التخصيب يحدث في المبيض","Zygote لا تنقسم قبل الانغراس"],ans:1,exp:"التخصيب Fertilization: اندماج الحيوان المنوي Sperm مع البويضة Ovum في الثلث الخارجي من قناة فالوب → Zygote (2n). Cleavage: انقسامات ميتوزية متتالية سريعة دون نمو: Zygote → 2 cells → 4 → 8 → Morula (16-32 خلية صلبة) → Blastocyst (فارغة من الداخل). الانغراس Implantation: يوم 6-7 يغرس Blastocyst في بطانة الرحم Endometrium."}
];
const L=["أ","ب","ج","د"],FN=[["🌟 ممتاز!","جميع الإجابات صحيحة!","⭐⭐⭐⭐⭐"],["🔥 رائع!","تقريباً مثالي!","⭐⭐⭐⭐"],["👍 أحسنت!","نتيجة جيدة!","⭐⭐⭐"],["💡 حاول مجدداً!","راجع الملاحظات!","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#f472b6','#fff','#fbcfe8','#be185d'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(244,114,182,${(1-d/130)*.07})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(244,114,182,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
