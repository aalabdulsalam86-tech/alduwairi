<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفرنسي - الثاني عشر أدبي - Vers le DELF Junior A1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Orbitron:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--bg2:#0f1524;--panel:rgba(15,21,36,.85);
  --cyan:#00d9ff;--gold:#ffb840;
  --fr-blue:#1e3a8a;--fr-red:#dc2626;--fr-white:#f5f5f5;
  --text:#e6edf7;--muted:#8fa0bd;
  --ok:#10d18b;--bad:#ff5875;--border:rgba(0,217,255,.25);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;overflow-x:hidden}
body{background:radial-gradient(1200px 700px at 15% -10%, rgba(30,58,138,.22), transparent 60%),radial-gradient(900px 600px at 100% 0%, rgba(220,38,38,.15), transparent 60%),radial-gradient(800px 600px at 50% 110%, rgba(255,184,64,.10), transparent 60%),var(--bg)}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:2;max-width:980px;margin:0 auto;padding:24px 18px 60px}
.header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;background:linear-gradient(135deg, rgba(30,58,138,.35), rgba(220,38,38,.25));border:1px solid var(--border);border-radius:18px;padding:18px 22px;box-shadow:0 10px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06)}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:54px;height:54px;border-radius:14px;background:conic-gradient(from 210deg, #1e3a8a, #dc2626, #f5f5f5, #1e3a8a);display:grid;place-items:center;color:#fff;font-family:'Orbitron';font-weight:900;box-shadow:0 0 30px rgba(30,58,138,.4)}
.logo span{font-family:'Cormorant Garamond',serif;font-size:30px;font-style:italic}
.title{font-family:'Orbitron',sans-serif;font-weight:800;font-size:17px;letter-spacing:1px;color:#fff}
.subtitle{color:var(--muted);font-size:13px;margin-top:2px}
.subject{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--gold);text-shadow:0 0 20px rgba(255,184,64,.35)}
.back{text-decoration:none;color:var(--text);background:rgba(255,255,255,.05);border:1px solid var(--border);padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;transition:all .2s}
.back:hover{background:rgba(0,217,255,.12);border-color:var(--cyan)}
.hero{margin-top:18px;background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:18px;padding:22px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}
.hero h1{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:32px;line-height:1.2;background:linear-gradient(90deg,#fff,#ffb840);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .meta{color:var(--muted);margin-top:6px;font-size:14px}
.badge{background:linear-gradient(135deg,var(--fr-blue),var(--fr-red));color:#fff;padding:10px 14px;border-radius:12px;font-family:'Orbitron';font-weight:700;font-size:13px;letter-spacing:1px;box-shadow:0 0 20px rgba(220,38,38,.3)}
.progress-wrap{margin-top:16px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 18px}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;color:var(--muted)}
.progress-top .score{font-family:'Orbitron';color:var(--gold);font-weight:700}
.bar{height:10px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;position:relative}
.bar>span{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--fr-blue),var(--fr-red),var(--gold));border-radius:99px;transition:width .4s ease;box-shadow:0 0 12px rgba(220,38,38,.4)}
.card{margin-top:18px;background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.qnum{display:inline-block;font-family:'Orbitron';font-weight:700;font-size:12px;letter-spacing:2px;color:var(--gold);background:rgba(255,184,64,.1);padding:5px 10px;border-radius:8px;margin-bottom:10px}
.passage{background:rgba(30,58,138,.10);border:1px dashed rgba(245,245,245,.2);border-radius:12px;padding:14px 18px;margin-bottom:16px;font-family:'Cormorant Garamond',serif;font-size:16.5px;line-height:1.8;color:#e8edfa}
.passage .email-head{font-family:'Tajawal';font-size:13px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:8px;margin-bottom:10px}
.passage .email-head b{color:var(--gold)}
.qtext{font-size:19px;font-weight:500;line-height:1.7;margin-bottom:6px}
.qtext .fr{font-family:'Cormorant Garamond',serif;font-style:italic;color:#c9d5f0}
.options{display:grid;gap:10px;margin-top:10px}
.opt{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);padding:13px 16px;border-radius:12px;cursor:pointer;font-size:15.5px;transition:all .18s;text-align:right;font-family:inherit;color:var(--text);width:100%}
.opt .fr-txt{font-family:'Cormorant Garamond',serif;font-size:17px;color:#dbe4f8}
.opt:hover{border-color:var(--cyan);background:rgba(0,217,255,.05);transform:translateX(-3px)}
.opt .letter{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);display:grid;place-items:center;font-family:'Orbitron';font-weight:700;color:var(--gold);flex-shrink:0;font-size:14px}
.opt.correct{background:rgba(16,209,139,.12);border-color:var(--ok)}
.opt.correct .letter{background:var(--ok);color:#04241a}
.opt.wrong{background:rgba(255,88,117,.12);border-color:var(--bad)}
.opt.wrong .letter{background:var(--bad);color:#2a050c}
.opt:disabled{cursor:not-allowed;opacity:.85}
.feedback{margin-top:14px;padding:14px 16px;border-radius:12px;font-size:14.5px;line-height:1.7;display:none;border-left:3px solid var(--gold);background:rgba(255,184,64,.06)}
.feedback.show{display:block;animation:fadeIn .35s ease}
.feedback b{color:var(--gold)}
.feedback .fr{font-family:'Cormorant Garamond',serif;font-style:italic;color:#e7ecff}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.nav{display:flex;justify-content:space-between;gap:10px;margin-top:18px}
.btn{font-family:'Orbitron';font-weight:700;font-size:14px;letter-spacing:1px;padding:12px 22px;border-radius:12px;border:none;cursor:pointer;transition:all .18s}
.btn-primary{background:linear-gradient(135deg,var(--fr-blue),var(--fr-red));color:#fff;box-shadow:0 6px 20px rgba(220,38,38,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(220,38,38,.45)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(0,217,255,.1)}
.result{display:none;text-align:center;padding:40px 20px}
.result.show{display:block;animation:fadeIn .5s ease}
.result .emoji{font-size:80px;margin-bottom:14px}
.result h2{font-family:'Cormorant Garamond',serif;font-size:38px;margin-bottom:8px;color:#fff}
.result .score-big{font-family:'Orbitron';font-size:54px;font-weight:900;background:linear-gradient(90deg,var(--fr-blue),var(--fr-red),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;margin:14px 0}
.result .tier{color:var(--gold);font-size:19px;margin-bottom:20px;font-family:'Cormorant Garamond',serif;font-style:italic}
.result .msg{color:var(--muted);margin-bottom:24px;font-size:15px}
@media (max-width:640px){.hero{grid-template-columns:1fr}.hero h1{font-size:24px}.title{font-size:14px}.subject{font-size:18px}.qtext{font-size:17px}.passage{font-size:15px}}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="wrap">
  <div class="header">
    <div class="brand">
      <div class="logo"><span>Fr</span></div>
      <div>
        <div class="title">ثانوية فهد الدويري للبنين</div>
        <div class="subtitle">الثاني عشر أدبي · الفصل الدراسي الثاني</div>
      </div>
    </div>
    <div class="subject">Vers le DELF A1</div>
    <a class="back" href="index.html">→ عودة</a>
  </div>
  <div class="hero">
    <div>
      <h1>Vers le DELF Junior A1</h1>
      <div class="meta">تدريب على امتحان <span style="font-family:'Cormorant Garamond';font-style:italic">DELF</span> — فهم المقروء والمكتوب</div>
    </div>
    <div class="badge">15 Questions</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-top">
      <span id="progress-text">السؤال 1 من 15</span>
      <span class="score">النتيجة: <span id="score">0</span>/15</span>
    </div>
    <div class="bar"><span id="bar"></span></div>
  </div>
  <div id="quiz"></div>
  <div class="result" id="result">
    <div class="emoji" id="result-emoji">🎉</div>
    <h2>Terminé !</h2>
    <div class="score-big"><span id="final-score">0</span>/15</div>
    <div class="tier" id="tier">—</div>
    <div class="msg" id="result-msg"></div>
    <button class="btn btn-primary" onclick="location.reload()">إعادة المحاولة</button>
    <a class="back" href="index.html" style="margin-right:10px;display:inline-block">→ القائمة الرئيسية</a>
  </div>
</div>
<script>
/* Passage 1: Fabien's email about Marrakech trip */
const P1 = `<div class="email-head"><b>De :</b> Fabien &nbsp; <b>À :</b> Victor &nbsp; <b>Objet :</b> Voyage à Marrakech</div>
Salut Victor,<br>Nous allons voyager dimanche soir de Marseille. Notre avion va arriver vers dix heures à Marrakech. Ali et moi allons rester une semaine chez ses parents. Ils ont une grande maison à côté de la grande place. Lundi matin, nous allons faire des courses au marché, l'après-midi, nous visiterons les jardins Majorelle. Mardi et mercredi, toute la journée nous irons à la piscine parce qu'il fera chaud. Jeudi, nous prendrons le bus pour passer deux jours à Essaouira, une petite ville sur la côte atlantique. Samedi, je vais aller au souk pour acheter des cadeaux pour ma famille. Ce sera une semaine agréable !<br>Et toi, que vas-tu faire pendant tes vacances ?<br>À bientôt, Fabien`;

/* Passage 2: Magali's birthday invitation */
const P2 = `<div class="email-head"><b>De :</b> Magali &nbsp; <b>À :</b> Farah</div>
Salut Farah,<br>Le 31 octobre, je vais avoir 30 ans. Pour fêter ça, j'organise une fête jeudi soir à partir de vingt heures dans mon nouvel appartement.<br>Est-ce que tu peux venir ? Est-ce que tu pourrais apporter une tarte ?<br>Voici ma nouvelle adresse : 16, rue des Arts 75019 Paris.<br>À jeudi, Magali`;

const QUESTIONS = [
  {
    passage: P1,
    q: '<span class="fr">Où est-ce que Fabien va partir en vacances ?</span>',
    options: [
      '<span class="fr-txt">À Marseille</span>',
      '<span class="fr-txt">À Paris</span>',
      '<span class="fr-txt">À Marrakech</span>',
      '<span class="fr-txt">À Essaouira</span>'
    ],
    answer: 2,
    explain: 'النص يقول: <span class="fr">Notre avion va arriver vers dix heures à Marrakech</span>. مرسيليا هي نقطة الانطلاق وليست الوجهة.'
  },
  {
    passage: P1,
    q: '<span class="fr">Où est-ce que Fabien et Ali vont habiter ?</span>',
    options: [
      '<span class="fr-txt">À l\'hôtel</span>',
      '<span class="fr-txt">Chez la famille de Ali</span>',
      '<span class="fr-txt">Au chalet</span>',
      '<span class="fr-txt">Dans un appartement loué</span>'
    ],
    answer: 1,
    explain: '<span class="fr">Ali et moi allons rester une semaine chez ses parents</span> — عند والدَي علي (أي عائلته).'
  },
  {
    passage: P1,
    q: '<span class="fr">Qu\'est-ce qu\'ils vont visiter lundi après-midi ?</span>',
    options: [
      '<span class="fr-txt">Le souk</span>',
      '<span class="fr-txt">Essaouira</span>',
      '<span class="fr-txt">Les jardins Majorelle</span>',
      '<span class="fr-txt">La piscine</span>'
    ],
    answer: 2,
    explain: '<span class="fr">Lundi matin... l\'après-midi, nous visiterons les jardins Majorelle.</span>'
  },
  {
    passage: P1,
    q: '<span class="fr">Quel temps fera-t-il à Marrakech ?</span>',
    options: [
      '<span class="fr-txt">Il fera froid.</span>',
      '<span class="fr-txt">Il pleuvra.</span>',
      '<span class="fr-txt">Il fera chaud.</span>',
      '<span class="fr-txt">Il neigera.</span>'
    ],
    answer: 2,
    explain: '<span class="fr">...nous irons à la piscine parce qu\'il fera chaud.</span> الطقس سيكون حاراً.'
  },
  {
    passage: P1,
    q: '<span class="fr">Pourquoi Fabien ira au souk samedi ?</span>',
    options: [
      '<span class="fr-txt">Pour acheter des vêtements</span>',
      '<span class="fr-txt">Pour se promener</span>',
      '<span class="fr-txt">Pour acheter des cadeaux pour sa famille</span>',
      '<span class="fr-txt">Pour manger</span>'
    ],
    answer: 2,
    explain: '<span class="fr">Samedi, je vais aller au souk pour acheter des cadeaux pour ma famille.</span>'
  },
  {
    passage: P1,
    q: '<span class="fr">Combien de temps Fabien va-t-il rester à Essaouira ?</span>',
    options: ['Un jour','Deux jours','Une semaine','Trois jours'],
    answer: 1,
    explain: '<span class="fr">...nous prendrons le bus pour passer deux jours à Essaouira</span>.'
  },
  {
    passage: P1,
    q: 'كم عدد وسائل النقل المذكورة في الرسالة؟',
    options: ['واحدة','اثنتان (طائرة + حافلة)','ثلاث','لا توجد'],
    answer: 1,
    explain: 'ذُكرت <span class="fr">l\'avion</span> (الطائرة) و<span class="fr">le bus</span> (الحافلة) فقط.'
  },
  {
    passage: P2,
    q: '<span class="fr">Qu\'est-ce que Farah doit apporter ?</span>',
    options: [
      '<span class="fr-txt">Des boissons</span>',
      '<span class="fr-txt">Une tarte</span>',
      '<span class="fr-txt">Des cadeaux</span>',
      '<span class="fr-txt">Des fleurs</span>'
    ],
    answer: 1,
    explain: '<span class="fr">Est-ce que tu pourrais apporter une tarte ?</span>'
  },
  {
    passage: P2,
    q: '<span class="fr">Ce message est :</span>',
    options: [
      '<span class="fr-txt">Une carte de nouvel an</span>',
      '<span class="fr-txt">Une carte postale de vacances</span>',
      '<span class="fr-txt">Une carte d\'invitation (anniversaire)</span>',
      '<span class="fr-txt">Une lettre officielle</span>'
    ],
    answer: 2,
    explain: 'هي <span class="fr">carte d\'invitation à un anniversaire</span> لأن ماغالي تحتفل بعيد ميلادها الـ30 وتدعو فرح.'
  },
  {
    passage: P2,
    q: '<span class="fr">Où aura lieu la fête ?</span>',
    options: [
      '<span class="fr-txt">Dans un restaurant</span>',
      '<span class="fr-txt">Dans le nouvel appartement de Magali</span>',
      '<span class="fr-txt">Au parc</span>',
      '<span class="fr-txt">Chez Farah</span>'
    ],
    answer: 1,
    explain: '<span class="fr">...j\'organise une fête jeudi soir à partir de vingt heures dans mon nouvel appartement.</span>'
  },
  {
    passage: P2,
    q: '<span class="fr">À quelle heure commencera la fête ?</span>',
    options: [
      '<span class="fr-txt">À 18 heures</span>',
      '<span class="fr-txt">À 19 heures</span>',
      '<span class="fr-txt">À 20 heures</span>',
      '<span class="fr-txt">À 22 heures</span>'
    ],
    answer: 2,
    explain: '<span class="fr">à partir de vingt heures</span> = ابتداءً من الساعة 20:00 (الثامنة مساءً).'
  },
  {
    passage: P2,
    q: 'كم سيصبح عمر ماغالي؟',
    options: ['20','25','30','35'],
    answer: 2,
    explain: '<span class="fr">Le 31 octobre, je vais avoir 30 ans.</span>'
  },
  {
    q: 'في جزء <b>Production écrite</b> من الـ<span class="fr">DELF A1</span>، ما الحد الأدنى المطلوب من الكلمات عادةً؟',
    options: ['10 كلمات','20 كلمة','40 كلمة','100 كلمة'],
    answer: 2,
    explain: 'في تمارين الإنتاج الكتابي لمستوى A1، المطلوب عادةً <span class="fr">40 mots minimum</span>.'
  },
  {
    q: 'عند كتابة بريد إلكتروني للطبيب يصف مرضك، ما أفضل صيغة افتتاحية؟',
    options: [
      '<span class="fr-txt">Salut mec !</span>',
      '<span class="fr-txt">Bonjour Docteur,</span>',
      '<span class="fr-txt">Cher ami,</span>',
      '<span class="fr-txt">Coucou !</span>'
    ],
    answer: 1,
    explain: 'في السياق الرسمي/شبه الرسمي نستعمل <span class="fr">Bonjour Docteur</span>. أما <span class="fr">Salut, Coucou</span> فهي لصديق مقرّب.'
  },
  {
    q: 'للختام في بريد رسمي، أي صيغة أنسب؟',
    options: [
      '<span class="fr-txt">À plus !</span>',
      '<span class="fr-txt">Bisous !</span>',
      '<span class="fr-txt">Cordialement,</span>',
      '<span class="fr-txt">Ciao !</span>'
    ],
    answer: 2,
    explain: '<span class="fr">Cordialement</span> هي صيغة ختام محترمة للبريد شبه الرسمي/الرسمي. <span class="fr">À plus, Bisous, Ciao</span> كلها غير رسمية.'
  }
];

(function(){
  const c=document.getElementById('particles');const x=c.getContext('2d');
  let w,h,pts;
  function rs(){w=c.width=innerWidth;h=c.height=innerHeight;pts=Array.from({length:55},()=>({
    x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
    r:Math.random()*1.8+.4,
    c:['rgba(30,58,138,','rgba(220,38,38,','rgba(255,184,64,'][Math.floor(Math.random()*3)]
  }))}
  function draw(){x.clearRect(0,0,w,h);for(const p of pts){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=p.c+'.6)';x.fill()}requestAnimationFrame(draw)}
  rs();draw();addEventListener('resize',rs);
})();

let idx=0, score=0, locked=false;
const quiz=document.getElementById('quiz');
const bar=document.getElementById('bar');
const progressText=document.getElementById('progress-text');
const scoreEl=document.getElementById('score');

function render(){
  if(idx>=QUESTIONS.length){finish();return}
  const q=QUESTIONS[idx];
  bar.style.width=((idx)/QUESTIONS.length*100)+'%';
  progressText.textContent=`السؤال ${idx+1} من ${QUESTIONS.length}`;
  const letters=['A','B','C','D'];
  quiz.innerHTML=`
    <div class="card">
      <div class="qnum">QUESTION ${String(idx+1).padStart(2,'0')}</div>
      ${q.passage?`<div class="passage">${q.passage}</div>`:''}
      <div class="qtext">${q.q}</div>
      <div class="options">
        ${q.options.map((o,i)=>`<button class="opt" data-i="${i}"><span class="letter">${letters[i]}</span><span>${o}</span></button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <div class="nav">
        <button class="btn btn-ghost" id="skip">تخطّي</button>
        <button class="btn btn-primary" id="next" disabled>التالي ←</button>
      </div>
    </div>
  `;
  locked=false;
  quiz.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>choose(parseInt(b.dataset.i))));
  document.getElementById('next').addEventListener('click',()=>{idx++;render()});
  document.getElementById('skip').addEventListener('click',()=>{idx++;render()});
}
function choose(i){
  if(locked)return;locked=true;
  const q=QUESTIONS[idx];
  const opts=quiz.querySelectorAll('.opt');
  opts.forEach((b,bi)=>{b.disabled=true;if(bi===q.answer)b.classList.add('correct');else if(bi===i)b.classList.add('wrong')});
  const fb=document.getElementById('fb');
  const correct=i===q.answer;
  if(correct){score++;scoreEl.textContent=score}
  fb.innerHTML=`<b>${correct?'✔ Correct !':'✘ Incorrect.'}</b> ${q.explain}`;
  fb.classList.add('show');
  document.getElementById('next').disabled=false;
}
function finish(){
  document.getElementById('quiz').style.display='none';
  bar.style.width='100%';
  progressText.textContent=`اكتمل الاختبار`;
  const r=document.getElementById('result');
  r.classList.add('show');
  document.getElementById('final-score').textContent=score;
  const pct=score/QUESTIONS.length*100;
  let emoji,tier,msg;
  if(pct>=90){emoji='🏆';tier='Excellent — Prêt pour le DELF !';msg='أداء ممتاز! أنت جاهز لاجتياز امتحان <span class="fr">DELF Junior A1</span>.'}
  else if(pct>=75){emoji='🎉';tier='Très bien — Presque prêt';msg='نتيجة جيدة جداً. مزيد من التدريب وستكون جاهزاً.'}
  else if(pct>=60){emoji='👍';tier='Bien — Continue à t\'entraîner';msg='أنت في الطريق الصحيح. دَرِّب نفسك على قراءة المزيد من النصوص الفرنسية القصيرة.'}
  else if(pct>=40){emoji='📚';tier='Passable — Plus d\'entraînement';msg='ركّز على فهم المقروء وتمارين الـ<span class="fr">compréhension écrite</span>.'}
  else{emoji='💪';tier='À refaire — Ne perds pas courage';msg='لا تيأس! راجع الدوسيهات 4-5-6 وأعد المحاولة.'}
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('tier').textContent=tier;
  document.getElementById('result-msg').innerHTML=msg;
}
render();
</script>
</body>
</html>
