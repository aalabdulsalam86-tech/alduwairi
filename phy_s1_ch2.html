<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>فيزياء — الفصل الأول | المادة وخواصها الميكانيكية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--c:#38bdf8;--c2:#0369a1;--bg:#020b14;--brd:rgba(56,189,248,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}
#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
#bgc{z-index:0}#cfc{z-index:6}
#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}
#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}
@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}
@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}
.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}
.hdr{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px;text-shadow:0 0 14px color-mix(in srgb,var(--c) 50%,transparent)}
.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}
.sl{font-size:13px;color:var(--mut)}
.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.sv.pop{transform:scale(1.55)}
.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}
.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}
.sbar{display:flex;gap:5px;justify-content:center}
.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}
.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}
.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}
.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}
.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}
.qt{font-size:21px;font-weight:700;line-height:1.7;margin-bottom:18px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:14px 16px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .17s;line-height:1.45}
.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}
.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important;animation:cp .5s ease}
.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}
@keyframes cp{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}
.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:15px;line-height:1.85;color:var(--mut);display:none}
.exp.show{display:block;animation:fd .3s ease}
@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}
.nbtn.show{display:block;animation:fd .25s ease}
.nbtn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}
.final.vis{display:flex;animation:fd .4s ease}
.fstars{font-size:42px;margin-bottom:12px}
.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}
.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}
.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}
.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}
.fsnum{font-size:56px;font-weight:900;color:var(--c)}
.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px;transition:all .2s}
.rbtn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}
@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:18px}.opts{grid-template-columns:1fr}.opt{font-size:15px}}
</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr">
    <div class="logo">🧪 الفيزياء — الصف العاشر</div>
    <div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div>
  </div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
  <div class="plbl" id="pl"></div>
  <div class="sbar" id="sbar"></div>
  <div class="qcard" id="qc">
    <div class="qn" id="qn"></div>
    <div class="qt" id="qt"></div>
    <div class="opts" id="og"></div>
    <div class="exp" id="ex"></div>
    <button class="nbtn" id="nb" onclick="nxt()">التالي ←</button>
  </div>
</div>
<div class="final" id="fs">
  <div class="fstars" id="fst"></div>
  <div class="ftitle" id="ftl"></div>
  <div class="fmsg" id="fmg"></div>
  <div class="fsbox"><div class="fslbl">مجموع النقاط</div><div class="fsnum" id="fsn">0</div></div>
  <button class="rbtn" onclick="rst()">🔄 إعادة المحاولة</button>
  <span class="bhome" onclick="window.history.back()">← العودة للموقع</span>
</div>
<script>
const QS=[{"q": "ما حالات المادة الثلاث الأساسية وما الفرق الجوهري بينها؟", "opts": ["الحارة والباردة والمتوسطة", "Solid (صلبة): حجم وشكل ثابتان. Liquid (سائلة): حجم ثابت وشكل يأخذ شكل الإناء. Gas (غازية): تملأ أي حجم وتأخذ أي شكل", "الخشنة والناعمة والمسطحة", "المرنة والصلبة والمائعة"], "ans": 1, "exp": "حالات المادة: Solid (صلب): ذرات متقاربة ومنتظمة، حجم وشكل ثابتان. Liquid (سائل): ذرات متقاربة وغير منتظمة، حجم ثابت وشكل متغير. Gas (غاز): ذرات متباعدة وعشوائية، حجم وشكل متغيران يتطابقان مع الإناء."}, {"q": "ما الكثافة Density وما وحدتها في نظام SI؟", "opts": ["الكثافة = الحجم / الكتلة", "الكثافة = الكتلة / الحجم (ρ = m/V) ووحدتها kg/m³", "الكثافة = الوزن / المساحة", "الكثافة = القوة / الكتلة"], "ans": 1, "exp": "Density (الكثافة): ρ = m/V أي الكتلة لكل وحدة حجم. وحدتها في SI هي kg/m³ وأحياناً g/cm³. مثال: كثافة الماء 1000 kg/m³ = 1 g/cm³. وكثافة الحديد حوالي 7800 kg/m³."}, {"q": "ما الضغط Pressure وما وحدته؟", "opts": ["Pressure = الكتلة / المساحة", "Pressure = القوة / المساحة (P = F/A) ووحدته Pascal (Pa = N/m²)", "Pressure = الحجم / المساحة", "Pressure = السرعة / الزمن"], "ans": 1, "exp": "Pressure (الضغط): P = F/A أي القوة المؤثرة عمودياً على وحدة المساحة. وحدته Pascal (Pa) = N/m². كلما صغرت المساحة زاد الضغط (لذلك إبرة الحقنة رفيعة وحافة السكين حادة)."}, {"q": "ما قانون باسكال Pascal's Law ومثال تطبيقي عليه؟", "opts": ["الضغط يتناقص مع العمق في السوائل", "الضغط المؤثر على سائل محصور ينتقل بمقداره إلى جميع أجزاء السائل وجدرانه — ويُطبَّق في المكابح الهيدروليكية ورافعات السيارات", "كثافة السائل تزيد بزيادة الضغط", "الضغط يختلف من نقطة لأخرى في السائل الساكن"], "ans": 1, "exp": "Pascal's Law: الضغط المطبق على سائل محصور ينتقل بالتساوي لجميع الاتجاهات. يُستخدم في: مكابح السيارات الهيدروليكية، رافعات السيارات في المحطات، المكابس الهيدروليكية في المصانع — كلها تستغل نقل الضغط في السوائل."}, {"q": "كيف يتغير ضغط السائل مع العمق؟", "opts": ["يتناقص مع زيادة العمق", "يزيد مع زيادة العمق وفق القانون P = ρgh حيث ρ الكثافة وg عجلة الجاذبية وh العمق", "يبقى ثابتاً بغض النظر عن العمق", "يعتمد فقط على نوع السائل لا على العمق"], "ans": 1, "exp": "ضغط السائل: P = ρgh. حيث ρ كثافة السائل (kg/m³)، g عجلة الجاذبية (9.8 m/s²)، h العمق (m). كلما ازداد العمق ازداد الضغط. لذلك تحتاج الغوّاصات والسدود لجدران أسمك في الأسفل."}, {"q": "ما قاعدة أرخميدس Archimedes' Principle؟", "opts": ["الجسم يطفو على الماء دائماً", "أي جسم مغمور كلياً أو جزئياً في سائل يتأثر بقوة طفو تساوي وزن السائل المزاح (قوة Buoyancy = ρ × V × g)", "وزن الجسم في السائل أكبر من وزنه في الهواء", "الأجسام الصلبة فقط تتأثر بقوة الطفو"], "ans": 1, "exp": "Archimedes' Principle: قوة الطفو (Buoyant Force) = وزن السائل المزاح = ρ_fluid × V_submerged × g. الجسم يطفو إذا كانت كثافته أقل من كثافة السائل، ويغرق إذا كانت أكبر. هذا يُفسر طفو السفن وعوّامات إنقاذ الأرواح."}, {"q": "ما المرونة Elasticity في المواد وما قانون هوك Hooke's Law؟", "opts": ["قدرة المادة على الانكسار بسهولة", "قدرة المادة على العودة لشكلها الأصلي بعد رفع القوة المشوِّهة، وقانون هوك: F = kx (القوة تتناسب طردياً مع الإزاحة x وثابت النابض k)", "المادة تبقى مشوَّهة بعد رفع القوة", "قانون هوك يُطبَّق على الغازات فقط"], "ans": 1, "exp": "Elasticity: قدرة الجسم على استعادة شكله بعد رفع القوة. Hooke's Law: F = kx حيث k ثابت النابض بالـ N/m وx الإزاحة بالمتر. ينطبق في حدود المرونة فقط. يُستخدم في النوابض والمواد المطاطة."}, {"q": "ما اللزوجة Viscosity في السوائل؟", "opts": ["درجة انجماد السائل", "مقاومة السائل للجريان، فالسائل عالي اللزوجة (مثل العسل) يجري ببطء مقارنة بسائل منخفض اللزوجة (مثل الماء)", "الكثافة العالية للسائل", "قابلية السائل للضغط"], "ans": 1, "exp": "Viscosity (اللزوجة): مقياس مقاومة السائل للجريان الداخلي بسبب الاحتكاك بين طبقاته. وحدتها Pa·s أو Poise. الماء: لزوجة منخفضة (0.001 Pa·s). الزيت والعسل: لزوجة عالية. اللزوجة تقل بارتفاع درجة الحرارة في السوائل."}, {"q": "ما الفرق بين الكتلة Mass والوزن Weight؟", "opts": ["لا فرق بينهما", "Mass (الكتلة): كمية المادة في الجسم تُقاس بـ kg وثابتة في أي مكان. Weight (الوزن): قوة الجاذبية على الجسم تُقاس بـ N وتتغير من مكان لآخر (W = mg)", "الوزن ثابت دائماً والكتلة تتغير", "الكتلة تُقاس بالنيوتن والوزن بالكيلوجرام"], "ans": 1, "exp": "Mass (m): كمية المادة، ثابتة في الأرض أو القمر أو الفضاء، تُقاس بـ kg. Weight (W): قوة الجاذبية على الجسم، W = mg، تتغير حسب g في كل مكان، تُقاس بـ N. في القمر g=1.6 m/s²، فالوزن أقل لكن الكتلة نفسها."}, {"q": "ما قاعدة باسكال تطبيقياً: في رافعة هيدروليكية مساحة المكبس الصغير 0.01 m² ومساحة المكبس الكبير 0.5 m². ما القوة على المكبس الكبير إذا كانت القوة على الصغير 200 N؟", "opts": ["200 N", "400 N", "10000 N", "4 N"], "ans": 2, "exp": "باستخدام قاعدة باسكال: P₁ = P₂ فـ F₁/A₁ = F₂/A₂. إذن F₂ = F₁ × A₂/A₁ = 200 × (0.5/0.01) = 200 × 50 = 10000 N. هكذا تضخيم القوة: بقوة 200N على المكبس الصغير نحصل على 10000N على الكبير!"}],L=["أ", "ب", "ج", "د"],FN=[["🌟 ممتاز! درجة كاملة!", "أجبت على جميع الأسئلة صحيحة — أداء مشرف!", "⭐⭐⭐⭐⭐"], ["🔥 أداء رائع!", "تقريباً مثالي — راجع نقطة أو اثنتين وستكمل الدرجة", "⭐⭐⭐⭐"], ["👍 أحسنت!", "نتيجة جيدة — راجع الدروس لتتحسّن أكثر", "⭐⭐⭐"], ["💡 حاول مجدداً!", "لا بأس، المراجعة ستساعدك على الفهم", "⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');
cc.width=innerWidth;cc.height=innerHeight;
let cf=[];
function lc(x,y,n=15){const cl=['#38bdf8','#fff','#fbbf24','#a855f7','#22c55e'];for(let i=0;i<n;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>{return{x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}})}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(255,255,255,${(1-d/130)*.055})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(255,255,255,.1)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
function lq(){
  ans=false;document.getElementById('nb').classList.remove('show');
  const ex=document.getElementById('ex');ex.classList.remove('show');ex.style.display='none';
  const q=QS[cq];
  document.getElementById('pf').style.width=((cq/QS.length)*100)+'%';
  document.getElementById('pl').textContent='السؤال '+(cq+1)+' من '+QS.length;
  document.getElementById('qn').textContent='QUESTION '+String(cq+1).padStart(2,'0');
  const qc=document.getElementById('qc');qc.classList.remove('si');void qc.offsetWidth;qc.classList.add('si');
  document.getElementById('qt').textContent=q.q;
  const og=document.getElementById('og');og.innerHTML='';
  q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="ltr">${L[i]}</span><span>${o}</span>`;b.addEventListener('click',()=>pick(i,b));og.appendChild(b)});
  bsb();
}
function pick(idx,btn){
  if(ans)return;ans=true;
  const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');fb.classList.remove('sc','wr');
  if(idx===q.ans){
    btn.classList.add('correct');sc+=10;
    const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);
    fb.textContent=['✅','🎯','⭐','🔥','💥'][Math.floor(Math.random()*5)];fb.classList.add('sc');
    for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);
    setTimeout(()=>document.getElementById('nb').classList.add('show'),500);
  }else{
    btn.classList.add('wrong');bs[q.ans].classList.add('correct');
    fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');
    const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);
    setTimeout(()=>document.getElementById('nb').classList.add('show'),350);
  }
  bsb();
}
function nxt(){cq++;if(cq<QS.length)lq();else sf()}
function sf(){
  document.getElementById('qs').style.display='none';
  document.getElementById('fs').classList.add('vis');
  document.getElementById('fsn').textContent=sc;
  const p=sc/(QS.length*10),f=p===1?FN[0]:p>=.75?FN[1]:p>=.5?FN[2]:FN[3];
  document.getElementById('ftl').textContent=f[0];document.getElementById('fmg').textContent=f[1];document.getElementById('fst').textContent=f[2];
