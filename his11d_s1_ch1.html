<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>تاريخ — الفصل الأول | عصر الرسالة والخلفاء الراشدون</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#f59e0b;--c2:#b45309;--bg:#080400;--brd:rgba(245,158,11,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr"><div class="logo">📜 تاريخ — الحادي عشر أدبي</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
  <div class="plbl" id="pl"></div>
  <div class="sbar" id="sbar"></div>
  <div class="qcard" id="qc">
    <div class="qn" id="qn"></div><div class="qt" id="qt"></div>
    <div class="opts" id="og"></div><div class="exp" id="ex"></div>
    <button class="nbtn" id="nb" onclick="nxt()">التالي ←</button>
  </div>
</div>
<div class="final" id="fs">
  <div class="fstars" id="fst"></div><div class="ftitle" id="ftl"></div>
  <div class="fmsg" id="fmg"></div>
  <div class="fsbox"><div class="fslbl">مجموع النقاط</div><div class="fsnum" id="fsn">0</div></div>
  <button class="rbtn" onclick="rst()">🔄 إعادة المحاولة</button>
  <span class="bhome" onclick="window.history.back()">← العودة للموقع</span>
</div>
<script>
const QS=[
  // الفصل الأول: عصر الرسالة
  {q:"ما أبرز سمات المجتمع العربي قبل الإسلام من الناحية السياسية؟",opts:["دولة مركزية موحدة بقيادة ملك","نظام قبلي — كل قبيلة لها شيخها، وغياب الحكومة المركزية، وانتشار الحروب والغزوات","حكم ديمقراطي منظم","سيطرة الكهنة على السلطة"],ans:1,exp:"تميّز المجتمع العربي قبل الإسلام بالنظام القبلي؛ إذ كانت كل قبيلة تحكم نفسها بنفسها تحت قيادة شيخها، وانتشرت الحروب والغزوات بين القبائل، ولم تكن هناك دولة مركزية موحدة على الجزيرة العربية. وكانت مكة تتمتع بمكانة خاصة بسبب الكعبة والتجارة."},
  {q:"ما الحياة الاقتصادية للعرب قبل الإسلام؟",opts:["الزراعة الحديثة الوحيدة","التجارة والرعي الركيزتان الأساسيتان — مكة مركز تجاري بين اليمن والشام","الصناعة والتعدين","الصيد البحري فقط"],ans:1,exp:"اعتمد العرب قبل الإسلام على التجارة والرعي. كانت مكة مركزاً تجارياً مهماً تتجمع فيها رحلتا الصيف (إلى الشام) والشتاء (إلى اليمن) المذكورتان في القرآن الكريم. اشتهرت بعض المناطق كاليمامة والطائف بالزراعة، بينما اعتمدت قبائل البادية على الرعي."},
  {q:"أين وُلد النبي محمد ﷺ وما نسبه الشريف؟",opts:["المدينة المنورة، من قبيلة الخزرج","مكة المكرمة، من قبيلة قريش — بني هاشم — جد أبيه عبد المطلب","الطائف، من قبيلة ثقيف","اليمن، من قبيلة حِمير"],ans:1,exp:"وُلد النبي محمد ﷺ في مكة المكرمة عام 571م (عام الفيل) من قبيلة قريش، وتحديداً من بني هاشم. توفي والده عبدالله قبل ولادته، وتوفيت أمه آمنة بنت وهب وهو في السادسة، فكفله جده عبد المطلب ثم عمه أبو طالب."},
  {q:"ما مراحل الدعوة الإسلامية الثلاث في مكة؟",opts:["المرحلة العلنية، ثم السرية، ثم الهجرة","المرحلة السرية (3 سنوات) — المرحلة الجهرية لخاصة القوم (الأقربين) — المرحلة الجهرية العامة","مرحلة واحدة علنية من البداية","مرحلتان فقط: سرية ثم علنية"],ans:1,exp:"مرّت الدعوة في مكة بثلاث مراحل: الأولى: السرية (3 سنوات) اقتصر فيها الإسلام على الخاصة كخديجة وعلي وأبي بكر. الثانية: الجهرية الخاصة حين نزل قوله تعالى (وأنذر عشيرتك الأقربين). الثالثة: الجهرية العامة حين صدع النبي ﷺ بالدعوة على الصفا لجميع قريش."},
  {q:"ما سبب هجرة النبي ﷺ من مكة إلى يثرب (المدينة)؟",opts:["رغبة شخصية في السفر","تآمر قريش على اغتياله بعد تصاعد الأذى والاضطهاد، وإذن الله بالهجرة","دعوة من أهل المدينة فقط دون خطر","طلب تجاري"],ans:1,exp:"هاجر النبي ﷺ عام 622م بعد أن تآمرت قريش على اغتياله في ليلة المبيت. نزل جبريل يُعلمه بالمؤامرة وأذِن الله له بالهجرة. خرج ﷺ مع أبي بكر الصديق رضي الله عنه ومكثا في غار ثور ثلاثة أيام، ثم واصلا طريقهما إلى المدينة. وهذه الهجرة أرّخ بها المسلمون تقويمهم الهجري."},
  {q:"ما أعمال النبي ﷺ الأولى عند وصوله المدينة لبناء الدولة الإسلامية؟",opts:["إعلان الحرب على قريش فوراً","بناء المسجد — المؤاخاة بين المهاجرين والأنصار — وضع الصحيفة (الدستور) — تنظيم العلاقات مع اليهود","توزيع الأراضي الزراعية فقط","إقامة الأسواق التجارية"],ans:1,exp:"عند وصوله المدينة قام النبي ﷺ بأعمال جوهرية لبناء الدولة: (1) بناء المسجد النبوي مركزاً للعبادة والحكم. (2) المؤاخاة بين المهاجرين والأنصار لتوطيد الوحدة. (3) وضع صحيفة المدينة (أول دستور في الإسلام) لتنظيم العلاقات بين المسلمين وغيرهم. (4) إقامة السوق الإسلامية."},
  {q:"ما غزوة بدر الكبرى وما أهميتها؟",opts:["أول غزوة انتهت بهزيمة المسلمين عام 1هـ","أول نصر عسكري كبير للمسلمين عام 2هـ — 313 مسلم مقابل 1000 قرشي — أسفرت عن مقتل وأسر صناديد قريش","غزوة دفاعية فقط دون قتال","مجرد تدريب عسكري"],ans:1,exp:"غزوة بدر الكبرى (رمضان 2هـ/ 624م): التقى فيها المسلمون (313 مقاتلاً) بجيش قريش (نحو 1000 مقاتل). انتصر المسلمون انتصاراً حاسماً وقُتل فيها صناديد قريش كأبي جهل وأُسر عدد كبير. كانت معركة فاصلة أعلت شأن الإسلام وأثبتت أن النصر بالإيمان لا بالعدد."},
  {q:"ما غزوة أحد وما درسها الرئيسي؟",opts:["انتصار مسلم كامل عام 3هـ","غزوة عام 3هـ — بدأت بانتصار المسلمين ثم تحوّلت حين ترك الرماة مواقعهم — خسر المسلمون وجُرح النبي ﷺ — الدرس: طاعة القيادة","هزيمة كاملة دون أي مقاومة","مجرد عرض للقوة"],ans:1,exp:"غزوة أحد (شوال 3هـ/ 625م): بعد بداية موفقة، خالف الرماة أمر النبي ﷺ وتركوا مواقعهم للغنائم، فالتف خالد بن الوليد (قبل إسلامه) على المسلمين وانقلبت الموازين. جُرح النبي ﷺ في وجهه الشريف واستشهد 70 صحابياً. الدرس الأبدي: طاعة القيادة وعدم الطمع في الغنائم."},
  // الفصل الثاني: الخلفاء الراشدون
  {q:"ما المشكلتان السياسيتان اللتان واجهتا أبا بكر الصديق رضي الله عنه؟",opts:["الفتوحات الخارجية فقط","مشكلة السقيفة (الخلافة) بعد وفاة النبي — ومشكلة الردة (قبائل ارتدت عن الإسلام ورفضت الزكاة)","اتحاد الفرس والروم ضده","الخلاف مع المهاجرين"],ans:1,exp:"واجه أبو بكر رضي الله عنه مشكلتين كبيرتين: الأولى: مشكلة السقيفة — النقاش حول من يخلف النبي ﷺ بين المهاجرين والأنصار، وانتهت بمبايعة أبي بكر. الثانية: حركة الردة — ارتدت قبائل عديدة ورفضت دفع الزكاة بعد وفاة النبي. أرسل أبو بكر الجيوش وقاتل المرتدين حتى أعاد توحيد الجزيرة العربية."},
  {q:"ما أبرز إنجازات الخليفة عمر بن الخطاب رضي الله عنه في توسيع الدولة الإسلامية؟",opts:["لم تحدث فتوحات في عهده","فتح العراق وبلاد الشام ومصر وبلاد فارس — إنشاء الديوان — التقويم الهجري — تقسيم الأمصار","فتح الأندلس فقط","فتح شبه الجزيرة فقط"],ans:1,exp:"في عهد عمر رضي الله عنه (13-23هـ) توسعت الدولة الإسلامية بشكل هائل: فُتحت بلاد الشام كلها، والعراق، ومصر، وفارس. وعلى الصعيد الإداري: أسّس الديوان (السجلات الحكومية) وقسّم الدولة إلى أمصار (ولايات) ووضع التقويم الهجري وأنشأ بيت المال ونظام العطاء للجند."},
  {q:"ما موقف الخليفة عثمان بن عفان رضي الله عنه المهم الذي أثّر في الحضارة الإسلامية؟",opts:["بناء الأسطول البحري فقط","جمع القرآن الكريم في مصحف موحد (المصحف العثماني) ونسخ منه نسخاً أُرسلت للأمصار","فتح شمال أفريقيا فقط","إلغاء الديوان"],ans:1,exp:"من أعظم إنجازات عثمان رضي الله عنه: جمع القرآن الكريم في مصحف واحد (المصحف العثماني) عندما خشي الاختلاف في القراءات وأُرسلت نسخ منه للأمصار. كذلك وسّع المسجد النبوي، وبنى الأسطول البحري الإسلامي الذي فتح قبرص، وامتدت الفتوحات إلى شمال إيران وأرمينيا."},
  {q:"ما أبرز أحداث خلافة علي بن أبي طالب رضي الله عنه ونتائجها؟",opts:["خلافة هادئة لم تشهد أحداثاً","موقعة الجمل (36هـ) وصفين (37هـ) وموقعة النهروان مع الخوارج — الفتنة الكبرى — اغتياله عام 40هـ","توسع عسكري خارجي فقط","انتصارات على الروم"],ans:1,exp:"تميّزت خلافة علي رضي الله عنه بالفتن الداخلية: موقعة الجمل (36هـ) مع طلحة والزبير وعائشة. موقعة صفين (37هـ) مع معاوية انتهت بالتحكيم. موقعة النهروان ضد الخوارج (38هـ). وقد اغتاله ابن ملجم عام 40هـ في رمضان. سُمّيت هذه المرحلة بالفتنة الكبرى وأثّرت في تشكيل الفرق الإسلامية لاحقاً."}
];
const L=["أ","ب","ج","د"],FN=[["🌟 ممتاز! درجة كاملة!","أجبت على جميع الأسئلة صحيحة!","⭐⭐⭐⭐⭐"],["🔥 أداء رائع!","تقريباً مثالي — راجع نقطةً أو اثنتين","⭐⭐⭐⭐"],["👍 أحسنت!","نتيجة جيدة — المراجعة ستُحسّن أداءك","⭐⭐⭐"],["💡 حاول مجدداً!","راجع ملاحظاتك وحاول مرة أخرى","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#f59e0b','#fff','#fcd34d','#b45309'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(245,158,11,${(1-d/130)*.07})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(245,158,11,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
