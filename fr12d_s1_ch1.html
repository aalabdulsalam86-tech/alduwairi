<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فرنسي 12 أدبي · الفصل الدراسي الأول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Orbitron:wght@700;900&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00f5ff;--gold:#fbbf24;--purple:#c026d3;--green:#22c55e;--red:#ef4444;--blue:#60a5fa;--dark:#020617;--dark2:#0f172a;--text:#f1f5f9;--muted:rgba(241,245,249,0.6);--border:rgba(0,245,255,0.15)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:"Tajawal",sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden;padding:24px}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto}
.hdr{background:rgba(15,23,42,0.9);border:1.5px solid var(--border);border-radius:22px;padding:28px 30px;margin-bottom:22px;backdrop-filter:blur(12px);position:relative;overflow:hidden}
.hdr::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#3b82f6,#ef4444);opacity:0.8}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:14px}
.hdr-title{font-size:24px;font-weight:900;background:linear-gradient(135deg,#fff 0%,#bfdbfe 60%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-sub{font-size:13px;color:var(--muted);margin-top:4px;font-family:"Orbitron",sans-serif;letter-spacing:2px}
.back-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:9px 18px;font-family:"Tajawal",sans-serif;font-size:14px;color:var(--muted);cursor:pointer;text-decoration:none;transition:all 0.2s}
.back-btn:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.progress-wrap{background:rgba(255,255,255,0.05);border-radius:10px;height:8px;overflow:hidden;margin-top:8px}
.progress-bar{height:100%;background:linear-gradient(90deg,#3b82f6,#ef4444);transition:width 0.4s ease;border-radius:10px}
.stats{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.stat b{color:var(--blue);font-weight:900;font-family:"Orbitron",sans-serif}
.stat.sc b{color:var(--gold)}
.q-card{background:rgba(15,23,42,0.85);border:1.5px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px 30px;margin-bottom:18px;backdrop-filter:blur(12px);transition:all 0.3s;animation:fadeUp 0.5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-num{display:inline-flex;align-items:center;gap:6px;background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.25);border-radius:10px;padding:4px 12px;font-family:"Orbitron",sans-serif;font-size:11px;font-weight:900;color:var(--blue);margin-bottom:14px;letter-spacing:1.5px}
.q-tag{display:inline-block;margin-right:6px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);border-radius:8px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px}
.q-text{font-size:17px;font-weight:700;line-height:1.9;margin-bottom:20px}
.q-text .fr{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.25);border-radius:6px;padding:1px 8px;color:var(--blue);direction:ltr;display:inline-block;font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:700;font-size:17px}
.q-text .sentence{background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.25);border-right:3px solid var(--blue);border-radius:8px;padding:10px 16px;margin:10px 0;font-family:"Cormorant Garamond",serif;font-size:18px;color:#dbeafe;line-height:2;direction:ltr;display:block;font-style:italic}
.q-text .sentence .blank{background:rgba(251,191,36,0.2);border-bottom:2px dashed var(--gold);padding:0 14px;margin:0 4px;display:inline-block;min-width:50px;color:var(--gold)}
.options{display:flex;flex-direction:column;gap:10px}
.opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px;font-size:15px;line-height:1.6}
.opt:hover:not(.locked){background:rgba(96,165,250,0.05);border-color:rgba(96,165,250,0.3);transform:translateX(-3px)}
.opt .opt-letter{font-family:"Orbitron",sans-serif;font-size:12px;font-weight:900;background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.25);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--blue);transition:all 0.2s}
.opt .opt-text{flex:1;direction:rtl}
.opt .opt-text .fr{background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.2);border-radius:5px;padding:0 6px;color:var(--blue);direction:ltr;display:inline-block;font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:700}
.opt.correct{background:rgba(34,197,94,0.1);border-color:var(--green)}
.opt.correct .opt-letter{background:var(--green);color:var(--dark);border-color:var(--green)}
.opt.wrong{background:rgba(239,68,68,0.1);border-color:var(--red)}
.opt.wrong .opt-letter{background:var(--red);color:#fff;border-color:var(--red)}
.opt.locked{cursor:default}
.feedback{margin-top:16px;padding:14px 18px;border-radius:12px;font-size:14px;line-height:1.9;display:none;animation:fadeUp 0.3s ease}
.feedback.show{display:block}
.feedback.ok{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.3);color:#bbf7d0}
.feedback.no{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);color:#fecaca}
.feedback b{color:var(--gold)}
.feedback .fr{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);border-radius:5px;padding:0 6px;color:var(--gold);direction:ltr;display:inline-block;font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:700}
.nav-btns{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
.nav-btn{flex:1;min-width:120px;padding:12px 20px;border-radius:12px;font-family:"Tajawal",sans-serif;font-size:14px;font-weight:900;cursor:pointer;border:none;transition:all 0.2s}
.nav-btn.primary{background:var(--blue);color:var(--dark)}
.nav-btn.primary:hover{filter:brightness(1.15);transform:translateY(-2px)}
.nav-btn.primary:disabled{background:rgba(255,255,255,0.08);color:var(--muted);cursor:not-allowed;transform:none;filter:none}
.nav-btn.ghost{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:var(--muted)}
.nav-btn.ghost:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.result{background:rgba(15,23,42,0.9);border:1.5px solid var(--border);border-radius:22px;padding:40px 32px;text-align:center;display:none;backdrop-filter:blur(12px)}
.result.show{display:block;animation:fadeUp 0.5s ease}
.result-emoji{font-size:72px;margin-bottom:14px;display:block}
.result-score{font-family:"Orbitron",sans-serif;font-size:48px;font-weight:900;background:linear-gradient(135deg,#3b82f6,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.result-msg{font-size:18px;color:var(--text);margin-bottom:8px;font-weight:700}
.result-detail{font-size:14px;color:var(--muted);margin-bottom:28px}
.result-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
@media(max-width:640px){body{padding:14px}.hdr{padding:20px}.q-card{padding:20px 22px}.hdr-title{font-size:20px}.result{padding:28px 20px}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-title">🇫🇷 فرنسي · الثاني عشر أدبي</div>
        <div class="hdr-sub">SEMESTER 1 · LE NOUVEAU BON VOYAGE · DOSSIERS 1-3</div>
      </div>
      <a class="back-btn" href="index.html">→ رجوع</a>
    </div>
    <div class="stats">
      <div class="stat">📖 <b id="qnum">1</b>/<b id="qtot">15</b></div>
      <div class="stat sc">⭐ <b id="sc">0</b></div>
      <div class="stat">✅ <b id="corr">0</b></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="prog" style="width:0"></div></div>
  </div>

  <div id="quiz"></div>

  <div class="result" id="result">
    <span class="result-emoji" id="re">🎯</span>
    <div class="result-score" id="rs">0/15</div>
    <div class="result-msg" id="rm">Bravo !</div>
    <div class="result-detail" id="rd">نسبة الإجابات الصحيحة: 0%</div>
    <div class="result-btns">
      <button class="nav-btn primary" onclick="restart()">🔄 حاول مرة أخرى</button>
      <a class="nav-btn ghost" href="index.html" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center">🏠 الرئيسية</a>
    </div>
  </div>
</div>

<script>
const QUESTIONS=[
  {
    tag:"Dossier 1 · Lexique · الجنسيات",
    q:'الترجمة الصحيحة لـ "هو كويتي":',
    opts:['<span class="fr">Il est koweïtien</span>','<span class="fr">Elle est koweïtienne</span>','<span class="fr">Ils sont koweïtiens</span>','<span class="fr">Je suis koweïtien</span>'],
    ans:0,
    exp:'ضمير المذكر المفرد <span class="fr">Il</span> + فعل <span class="fr">être</span> مصرّف <span class="fr">est</span> + الجنسية المذكرة <span class="fr">koweïtien</span>. للمؤنث نضيف <span class="fr">-ne</span>.'
  },
  {
    tag:"Dossier 1 · Grammaire · Articles",
    q:'اختر أداة التعريف الصحيحة: <span class="sentence">___ voyage est intéressant.</span>',
    opts:['<span class="fr">La</span>','<span class="fr">Le</span>','<span class="fr">Les</span>','<span class="fr">L\'</span>'],
    ans:1,
    exp:'كلمة <span class="fr">voyage</span> مذكر مفرد ⟵ <span class="fr">Le voyage</span>. نستخدم <span class="fr">L\'</span> قبل الكلمات المبدوءة بحرف علة أو هاء صامتة.'
  },
  {
    tag:"Dossier 1 · Grammaire · Passé composé",
    q:'الصيغة الصحيحة في الماضي المركّب: <span class="sentence">Hier, j\' ___ à Paris.</span>',
    opts:['<span class="fr">ai allé</span>','<span class="fr">suis allé</span>','<span class="fr">vais</span>','<span class="fr">allais</span>'],
    ans:1,
    exp:'فعل <span class="fr">aller</span> من أفعال الحركة يتصرّف في <span class="fr">Passé composé</span> مع <span class="fr">être</span>. والتصريف: <span class="fr">je suis allé(e)</span>.'
  },
  {
    tag:"Dossier 1 · Pronoms personnels",
    q:'الضمير الصحيح لاستبدال <span class="fr">mes amis</span> في: <span class="sentence">J\'aime mes amis.</span>',
    opts:['<span class="fr">le</span>','<span class="fr">la</span>','<span class="fr">les</span>','<span class="fr">lui</span>'],
    ans:2,
    exp:'<span class="fr">mes amis</span> = C.O.D جمع ⟵ ضمير المفعول المباشر <span class="fr">les</span>: <span class="fr">Je les aime</span>.'
  },
  {
    tag:"Dossier 1 · Adjectifs démonstratifs",
    q:'اختر أداة الإشارة الصحيحة: <span class="sentence">___ hôtel est confortable.</span>',
    opts:['<span class="fr">Ce</span>','<span class="fr">Cet</span>','<span class="fr">Cette</span>','<span class="fr">Ces</span>'],
    ans:1,
    exp:'<span class="fr">hôtel</span> مذكر مفرد يبدأ بحرف <span class="fr">h</span> صامت ⟵ نستخدم <span class="fr">Cet</span> (لتجنب التقاء ساكنين). <span class="fr">Ce</span> تُستخدم قبل حرف ساكن.'
  },
  {
    tag:"Dossier 1 · Communication",
    q:'العبارة المناسبة لـ "حجز فندق":',
    opts:['<span class="fr">Je voudrais réserver une chambre.</span>','<span class="fr">Où est la gare ?</span>','<span class="fr">Bon appétit !</span>','<span class="fr">Je suis fatigué.</span>'],
    ans:0,
    exp:'<span class="fr">Je voudrais réserver</span> = "أودّ أن أحجز". صيغة مهذبة من <span class="fr">vouloir</span> بصيغة الشرط للأدب في طلب الخدمة.'
  },
  {
    tag:"Dossier 2 · Lexique · Études",
    q:'معنى كلمة <span class="fr">l\'emploi du temps</span>:',
    opts:['العمل الإضافي','الجدول الدراسي','الوقت الحر','الإجازة'],
    ans:1,
    exp:'<span class="fr">l\'emploi du temps</span> = الجدول الدراسي / جدول الحصص. يحدّد المواد والأوقات خلال الأسبوع.'
  },
  {
    tag:"Dossier 2 · Grammaire · Futur proche",
    q:'تركيب المستقبل القريب <span class="fr">Futur proche</span> هو:',
    opts:['<span class="fr">avoir + participe passé</span>','<span class="fr">aller (au présent) + infinitif</span>','<span class="fr">être + participe passé</span>','<span class="fr">verbe au présent</span>'],
    ans:1,
    exp:'<span class="fr">Futur proche</span> = <span class="fr">aller</span> مصرّف في المضارع + المصدر. مثال: <span class="fr">Je vais étudier demain</span>.'
  },
  {
    tag:"Dossier 2 · Verbes",
    q:'تصريف فعل <span class="fr">apprendre</span> مع ضمير <span class="fr">nous</span> في المضارع:',
    opts:['<span class="fr">apprenons</span>','<span class="fr">apprennons</span>','<span class="fr">apprends</span>','<span class="fr">apprennent</span>'],
    ans:0,
    exp:'<span class="fr">nous apprenons</span>. من أفعال المجموعة الثالثة غير المنتظمة، مثل <span class="fr">prendre</span>: <span class="fr">nous prenons</span>.'
  },
  {
    tag:"Dossier 2 · Communication",
    q:'العبارة المستخدمة لطلب المساعدة:',
    opts:['<span class="fr">Bonne nuit !</span>','<span class="fr">Est-ce que tu peux m\'aider ?</span>','<span class="fr">Au revoir !</span>','<span class="fr">De rien.</span>'],
    ans:1,
    exp:'<span class="fr">Est-ce que tu peux m\'aider ?</span> = "هل يمكنك مساعدتي؟". <span class="fr">pouvoir</span> + ضمير + <span class="fr">aider</span>.'
  },
  {
    tag:"Dossier 3 · Lexique · Soirée",
    q:'معنى <span class="fr">un film d\'horreur</span>:',
    opts:['فيلم كوميدي','فيلم رعب','فيلم وثائقي','فيلم رومانسي'],
    ans:1,
    exp:'<span class="fr">horreur</span> = رعب. أنواع أخرى: <span class="fr">comédie</span> (كوميدي)، <span class="fr">documentaire</span> (وثائقي)، <span class="fr">drame</span> (درامي).'
  },
  {
    tag:"Dossier 3 · Grammaire · Négation",
    q:'النفي الصحيح لـ: <span class="sentence">Je regarde la télé.</span>',
    opts:['<span class="fr">Je ne regarde la télé.</span>','<span class="fr">Je ne regarde pas la télé.</span>','<span class="fr">Je regarde pas la télé.</span>','<span class="fr">Je pas regarde la télé.</span>'],
    ans:1,
    exp:'النفي في الفرنسية: <span class="fr">ne ... pas</span> تحيط بالفعل المصرّف. <span class="fr">Je <b>ne</b> regarde <b>pas</b> la télé</span>.'
  },
  {
    tag:"Dossier 3 · Adjectifs qualificatifs",
    q:'التوافق الصحيح للصفة: <span class="sentence">Une fille ___.</span>',
    opts:['<span class="fr">intelligent</span>','<span class="fr">intelligente</span>','<span class="fr">intelligents</span>','<span class="fr">intelligentes</span>'],
    ans:1,
    exp:'الصفة تتفق مع الموصوف في النوع والعدد. <span class="fr">fille</span> مؤنث مفرد ⟵ نضيف <span class="fr">-e</span>: <span class="fr">intelligente</span>.'
  },
  {
    tag:"Dossier 3 · Communication",
    q:'وصف صحيح لشخصية: <span class="sentence">Elle est grande, ___ et gentille.</span>',
    opts:['<span class="fr">blond</span>','<span class="fr">blonde</span>','<span class="fr">blonds</span>','<span class="fr">blondes</span>'],
    ans:1,
    exp:'الضمير <span class="fr">Elle</span> يعود على مفرد مؤنث، والصفات تتفق: <span class="fr">grande, blonde, gentille</span> — كلها مؤنث مفرد.'
  },
  {
    tag:"Atelier · L\'île de Failaka",
    q:'جزيرة فيلكا <span class="fr">l\'île de Failaka</span> تقع في:',
    opts:['البحر الأحمر','الخليج العربي قبالة سواحل الكويت','البحر المتوسط','المحيط الهندي'],
    ans:1,
    exp:'<span class="fr">Failaka</span> جزيرة كويتية تاريخية في الخليج العربي، تبعد <span class="fr">20 km</span> عن السواحل الكويتية. فيها آثار يونانية وإسلامية قديمة.'
  }
];

let cur=0,score=0,correctCount=0,locked=false;

function render(){
  const quiz=document.getElementById("quiz");
  const q=QUESTIONS[cur];
  document.getElementById("qnum").textContent=cur+1;
  document.getElementById("qtot").textContent=QUESTIONS.length;
  document.getElementById("prog").style.width=((cur)/QUESTIONS.length*100)+"%";
  document.getElementById("sc").textContent=score;
  document.getElementById("corr").textContent=correctCount;
  locked=false;
  const letters=["أ","ب","ج","د"];
  quiz.innerHTML=`
    <div class="q-card">
      <div class="q-num">Q${String(cur+1).padStart(2,"0")}${q.tag?`<span class="q-tag">${q.tag}</span>`:""}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts">
        ${q.opts.map((o,i)=>`<div class="opt" data-i="${i}"><span class="opt-letter">${letters[i]}</span><span class="opt-text">${o}</span></div>`).join("")}
      </div>
      <div class="feedback" id="fb"></div>
      <div class="nav-btns">
        <button class="nav-btn primary" id="nxt" disabled>${cur===QUESTIONS.length-1?"📊 عرض النتيجة":"السؤال التالي ←"}</button>
      </div>
    </div>`;
  quiz.querySelectorAll(".opt").forEach(el=>el.onclick=()=>pick(parseInt(el.dataset.i)));
  document.getElementById("nxt").onclick=next;
}

function pick(i){
  if(locked)return;locked=true;
  const q=QUESTIONS[cur];
  const opts=document.querySelectorAll(".opt");
  opts.forEach(o=>o.classList.add("locked"));
  const fb=document.getElementById("fb");
  if(i===q.ans){opts[i].classList.add("correct");score+=10;correctCount++;fb.className="feedback show ok";fb.innerHTML=`<b>✅ Bravo ! إجابة صحيحة</b><br>${q.exp}`}
  else{opts[i].classList.add("wrong");opts[q.ans].classList.add("correct");fb.className="feedback show no";fb.innerHTML=`<b>❌ Incorrect</b><br>${q.exp}`}
  document.getElementById("nxt").disabled=false;
  document.getElementById("sc").textContent=score;
  document.getElementById("corr").textContent=correctCount;
}

function next(){if(cur===QUESTIONS.length-1){showResult();return}cur++;render()}

function showResult(){
  document.getElementById("quiz").style.display="none";
  const r=document.getElementById("result");r.classList.add("show");
  const pct=Math.round(correctCount/QUESTIONS.length*100);
  document.getElementById("rs").textContent=`${correctCount}/${QUESTIONS.length}`;
  document.getElementById("rd").textContent=`نسبة الإجابات الصحيحة: ${pct}% · مجموع النقاط: ${score}`;
  let emoji="🎯",msg="Bon travail !";
  if(pct>=90){emoji="🏆";msg="Excellent ! Performance exceptionnelle"}
  else if(pct>=75){emoji="⭐";msg="Très bien, continuez !"}
  else if(pct>=50){emoji="📚";msg="Bien, révisez certains points"}
  else{emoji="💪";msg="Réessayez, vous allez progresser !"}
  document.getElementById("re").textContent=emoji;
  document.getElementById("rm").textContent=msg;
  document.getElementById("prog").style.width="100%";
}

function restart(){cur=0;score=0;correctCount=0;document.getElementById("result").classList.remove("show");document.getElementById("quiz").style.display="block";render()}

render();

const cv=document.getElementById("bg"),cx=cv.getContext("2d");let ns=[];
function rsz(){cv.width=innerWidth;cv.height=innerHeight}
function ini(){ns=Array.from({length:40},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2.2+1}))}
function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>cv.width)n.vx*=-1;if(n.y<0||n.y>cv.height)n.vy*=-1});
  for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<150){cx.beginPath();cx.moveTo(ns[i].x,ns[i].y);cx.lineTo(ns[j].x,ns[j].y);cx.strokeStyle=`rgba(96,165,250,${(1-d/150)*.09})`;cx.lineWidth=.6;cx.stroke()}}
  ns.forEach(n=>{cx.beginPath();cx.arc(n.x,n.y,n.r,0,Math.PI*2);cx.fillStyle="rgba(96,165,250,0.25)";cx.fill()});
  requestAnimationFrame(draw);
}
rsz();ini();draw();addEventListener("resize",()=>{rsz();ini()});
</script>
