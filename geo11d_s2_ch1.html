<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>جغرافيا — الفصل الثاني | الغلاف المائي والجوي والحيوي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#38bdf8;--c2:#0369a1;--bg:#00040a;--brd:rgba(56,189,248,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr"><div class="logo">🗺️ جغرافيا — الفصل الثاني</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
  <div class="plbl" id="pl"></div>
  <div class="sbar" id="sbar"></div>
  <div class="qcard" id="qc">
    <div class="qn" id="qn"></div><div class="qt" id="qt"></div>
    <div class="opts" id="og"></div><div class="exp" id="ex"></div>
    <button class="nbtn" id="nb" onclick="nxt()">التالي ←</button>
  </div>
</div>
<div class="final" id="fs">
  <div class="fstars" id="fst"></div><div class="ftitle" id="ftl"></div>
  <div class="fmsg" id="fmg"></div>
  <div class="fsbox"><div class="fslbl">مجموع النقاط</div><div class="fsnum" id="fsn">0</div></div>
  <button class="rbtn" onclick="rst()">🔄 إعادة المحاولة</button>
  <span class="bhome" onclick="window.history.back()">← العودة للموقع</span>
</div>
<script>
const QS=[
  // الغلاف المائي
  {q:"ما الغلاف المائي (Hydrosphere) وما توزيع المياه على الأرض؟",opts:["مياه الأنهار فقط","يشمل جميع المياه على الأرض — 97% مياه مالحة (محيطات وبحار) — 3% مياه عذبة (جليد وأنهار وجوفية)","50% مالحة و50% عذبة","المياه الجوفية فقط"],ans:1,exp:"الغلاف المائي يشمل كل مياه الأرض. التوزيع: نحو 97% مياه مالحة في المحيطات والبحار. 3% فقط مياه عذبة، منها: 69% متجمدة في القطبين، 30% مياه جوفية، وأقل من 1% في الأنهار والبحيرات والغلاف الجوي. تُغطي المحيطات نحو 71% من سطح الأرض."},
  {q:"ما التيارات البحرية وما أثرها على المناخ؟",opts:["حركة مياه عشوائية بلا تأثير","حركة منتظمة لمياه المحيط — الدافئة ترفع درجة حرارة الشواطئ المجاورة — الباردة تخفّضها وتُسبّب الضباب والجفاف","تيارات هوائية فوق البحار","موجات ناتجة عن الزلازل فقط"],ans:1,exp:"التيارات البحرية حركة منظمة لمياه المحيط يسببها الرياح وفروق الكثافة والحرارة. التيارات الدافئة (كتيار الخليج Gulf Stream): ترفع حرارة الشواطئ المجاورة وتجعلها رطبة. التيارات الباردة (كتيار كاليفورنيا): تُخفّض الحرارة وتُسبّب الضباب وتُقلّل الأمطار. تؤثر مباشرة في مناخ المناطق الساحلية."},
  {q:"ما الخصائص الطبيعية لمياه البحار والمحيطات؟",opts:["مياه عذبة تماماً وباردة دائماً","ملوحتها 35 جزء في الألف في المتوسط — درجة حرارتها تتراوح بين -2° و30°م — لون مائل للأزرق بسبب امتصاص الضوء الأحمر","ملوحة 100% وحرارة ثابتة","ملوحة تختلف باختلاف اليوم"],ans:1,exp:"خصائص مياه البحار: (1) الملوحة: تبلغ نحو 35‰ (35 جراماً من الأملاح في كل كيلوجرام ماء) وتزداد في البحار شبه المغلقة كالبحر الأحمر والبحر الميت. (2) درجة الحرارة: تتراوح بين -2° بالقطبين و30°م في المناطق الاستوائية. (3) اللون: يتراوح بين الأزرق العميق والأخضر والبني حسب العمق والعوالق."},
  // الغلاف الجوي
  {q:"ما الغلاف الجوي (Atmosphere) وما تركيبه الغازي؟",opts:["طبقة رقيقة من الأكسجين فقط","غلاف غازي يحيط بالأرض — 78% نيتروجين + 21% أكسجين + 1% غازات أخرى (أرجون، CO₂...) — سمكه 100-200 كم","طبقة من الماء فوق الأرض","صلب يحيط بالأرض من الخارج"],ans:1,exp:"الغلاف الجوي (Atmosphere): غلاف غازي يحيط بالأرض تمسكه الجاذبية. تركيبه: 78% نيتروجين (N₂) + 21% أكسجين (O₂) + 0.93% أرجون + 0.04% CO₂ وغازات أخرى. يمتد من سطح الأرض إلى ما بين 100-1000 كم. وظائفه: يحمي من الأشعة فوق البنفسجية، يُعتدل الحرارة، يُمكّن الحياة."},
  {q:"ما الطبقات الرأسية للغلاف الجوي من الأسفل للأعلى؟",opts:["طبقة واحدة متجانسة","التروبوسفير (0-12كم، الطقس) — الستراتوسفير (12-50كم، الأوزون) — الميزوسفير (50-85كم) — الثيرموسفير — الإكزوسفير","طبقتان فقط: سفلى وعليا","ثلاث طبقات متساوية السُّمك"],ans:1,exp:"طبقات الغلاف الجوي من الأرض للفضاء: (1) التروبوسفير (0-12 كم): تحدث فيها كل الظواهر الجوية. (2) الستراتوسفير (12-50 كم): تحتوي على طبقة الأوزون التي تمتص الأشعة فوق البنفسجية. (3) الميزوسفير (50-85 كم): تحترق فيها معظم النيازك. (4) الثيرموسفير: ترتفع فيها الحرارة جداً. (5) الإكزوسفير: الطبقة الخارجية."},
  {q:"ما عناصر الطقس والمناخ الرئيسية؟",opts:["المطر فقط","درجة الحرارة — الضغط الجوي — الرياح — الرطوبة والتساقط — الإشعاع الشمسي","درجة الحرارة والرطوبة فقط","الرياح والأمطار والبرق"],ans:1,exp:"عناصر الطقس والمناخ: (1) درجة الحرارة: تتحكم فيها خط العرض والارتفاع والتيارات البحرية. (2) الضغط الجوي: يقلّ بالارتفاع وفوق المناطق الدافئة. (3) الرياح: تنتقل من مناطق الضغط المرتفع للمنخفض. (4) الرطوبة والتساقط: المطر والثلج والضباب. (5) الإشعاع الشمسي: المصدر الأساسي للطاقة. الطقس: الحالة اليومية. المناخ: المتوسط على 30 سنة."},
  {q:"ما ظاهرة ثقب الأوزون وأسبابها وخطورتها؟",opts:["ظاهرة طبيعية مفيدة","تآكل طبقة الأوزون في الستراتوسفير بسبب الـ CFCs (مركبات الكلوروفلوروكربون) — يُتيح مرور أشعة UV الضارة مسببةً سرطان الجلد وإضرار الحياة","ثقب في الغلاف الجوي يُسقط الأمطار","انخفاض درجات الحرارة في القطبين"],ans:1,exp:"ظاهرة ثقب الأوزون: تآكل طبقة الأوزون في الستراتوسفير (التي تمتص 95-99% من الأشعة فوق البنفسجية). السبب الرئيسي: مركبات الكلوروفلوروكربون (CFCs) المستخدمة في مكيفات الهواء والثلاجات والمبيدات. الخطورة: زيادة الأشعة UV تُسبّب سرطان الجلد وإعتام عدسة العين وتضرر الحياة البحرية. الحل: بروتوكول مونتريال 1987 لوقف استخدام CFCs."},
  // الغلاف الحيوي
  {q:"ما الغلاف الحيوي (Biosphere) وما الأقاليم الحيوية الكبرى؟",opts:["منطقة جغرافية محددة","المنطقة التي تُوجد فيها الحياة على الأرض — تشمل: الغابات الاستوائية — الغابات المعتدلة — إقليم الحشائش — الصحاري — التندرا","الغلاف الجوي فقط","القشرة الأرضية فقط"],ans:1,exp:"الغلاف الحيوي: المنطقة الرقيقة على سطح الأرض التي توجد فيها الحياة وتمتد من عمق البحار لقمم الجبال. الأقاليم الحيوية الكبرى: (1) الغابات الاستوائية المطيرة: كثافة عالية قرب خط الاستواء. (2) الغابات الحارة الموسمية. (3) الغابات المعتدلة. (4) إقليم الحشائش (السافانا والإستبس). (5) الصحاري الحارة والباردة. (6) التايغا (الغابات الصنوبرية). (7) التندرا القطبية."},
  {q:"ما أهمية الغابات الاستوائية وأسباب تدميرها؟",opts:["لا فائدة منها","رئة الأرض — تُنتج الأكسجين — تحتضن 50% من أنواع الحياة — تُنظّم المناخ — تُدمَّر بالإزالة للزراعة والرعي وقطع الأخشاب والتعدين","تُسبّب الفيضانات فقط","مفيدة للجفاف"],ans:1,exp:"الغابات الاستوائية (كأمازون وحوض الكونغو وجنوب شرق آسيا): تُنتج 20% من أكسجين الأرض، تحتضن أكثر من 50% من أنواع الكائنات الحية، تمتص كميات هائلة من CO₂، وتؤثر في دورة المياه والمناخ العالمي. أسباب تدميرها: إزالتها للزراعة وتربية الماشية وقطع الأخشاب والتعدين والتوسع العمراني."},
  {q:"ما الصحاري وأنواعها وأسباب تكوّنها؟",opts:["مناطق باردة دائماً","مناطق تقل فيها الأمطار عن 250مم سنوياً — حارة (كالصحراء الكبرى) — باردة (كالتندرا) — أسبابها: بُعد البحار وحواجز جبلية وتيارات باردة ومناطق الضغط المرتفع","مناطق زراعية خصبة","غابات كثيفة في المناطق الاستوائية"],ans:1,exp:"الصحاري مناطق تقل فيها الأمطار السنوية عن 250 مم. أنواعها: (1) الحارة (كالصحراء الكبرى والعربية): ارتفاع حرارة نهارية وبرودة ليلية. (2) الباردة (كالتندرا والجوبي). أسباب تكوّن الصحاري: بعد المسافة عن البحار، الحواجز الجبلية التي تحجب الأمطار، مناطق الضغط الجوي المرتفع، التيارات البحرية الباردة المجاورة."},
  {q:"ما مظاهر تدمير الغلاف الحيوي وكيف يمكن حمايته؟",opts:["الغلاف الحيوي في أمان تام","إزالة الغابات — الصيد المفرط — التلوث — الرعي الجائر — ثقب الأوزون — التغير المناخي — الحل: المحميات الطبيعية وتشريعات الحماية والتنمية المستدامة","التدمير مفيد للاقتصاد","لا يمكن حماية الغلاف الحيوي"],ans:1,exp:"مظاهر تدمير الغلاف الحيوي: إزالة الغابات، الصيد المفرط وانقراض الأنواع، التلوث (الهواء والماء والتربة)، الرعي الجائر، ثقب الأوزون، والتغير المناخي. وسائل الحماية: (1) إنشاء المحميات الطبيعية. (2) التشريعات البيئية الدولية (اتفاقية التنوع البيولوجي). (3) التنمية المستدامة. (4) تقليل الانبعاثات الكربونية. (5) التوعية البيئية."}
];
const L=["أ","ب","ج","د"],FN=[["🌟 ممتاز! درجة كاملة!","أجبت على جميع الأسئلة صحيحة!","⭐⭐⭐⭐⭐"],["🔥 أداء رائع!","تقريباً مثالي — راجع نقطةً أو اثنتين","⭐⭐⭐⭐"],["👍 أحسنت!","نتيجة جيدة — المراجعة ستُحسّن أداءك","⭐⭐⭐"],["💡 حاول مجدداً!","راجع ملاحظاتك وحاول مرة أخرى","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#38bdf8','#fff','#7dd3fc','#0369a1'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(56,189,248,${(1-d/130)*.07})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(56,189,248,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
