<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>فرنسي — الفصل الأول | Dossiers 0-4: Premier contact, Une rencontre, Une invitation...</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#f97316;--c2:#c2410c;--bg:#0a0300;--brd:rgba(249,115,22,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr"><div class="logo">🇫🇷 فرنسي — الحادي عشر أدبي</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
  <div class="plbl" id="pl"></div><div class="sbar" id="sbar"></div>
  <div class="qcard" id="qc">
    <div class="qn" id="qn"></div><div class="qt" id="qt"></div>
    <div class="opts" id="og"></div><div class="exp" id="ex"></div>
    <button class="nbtn" id="nb" onclick="nxt()">التالي ←</button>
  </div>
</div>
<div class="final" id="fs">
  <div class="fstars" id="fst"></div><div class="ftitle" id="ftl"></div>
  <div class="fmsg" id="fmg"></div>
  <div class="fsbox"><div class="fslbl">مجموع النقاط</div><div class="fsnum" id="fsn">0</div></div>
  <button class="rbtn" onclick="rst()">🔄 إعادة المحاولة</button>
  <span class="bhome" onclick="window.history.back()">← العودة للموقع</span>
</div>
<script>
const QS=[
  // Dossier 0: Premier contact
  {q:"ما الضمائر الشخصية في اللغة الفرنسية؟ Les pronoms sujets",opts:["Je / Tu / He / She / We / You / They","Je / Tu / Il / Elle / Nous / Vous / Ils / Elles","Moi / Toi / Lui / Elle / Nous / Vous","Je / Tu / Lui / Elle / On / Vous / Ils"],ans:1,exp:"الضمائر الشخصية في الفرنسية: Je (أنا) / Tu (أنت - مفرد غير رسمي) / Il (هو) / Elle (هي) / Nous (نحن) / Vous (أنتم أو أنت الرسمي) / Ils (هم للمذكر أو مختلط) / Elles (هن للمؤنث). مثال: Je suis Ahmed. (أنا أحمد)"},
  {q:"كيف نقول 'أنا اسمي...' بالفرنسية؟",opts:["J'appelle... / Mon nom est...","Je m'appelle... (طريقة التقديم الأشيع) / Mon prénom est...","My name is... / Je suis...","Moi s'appelle... / Nom je suis..."],ans:1,exp:"للتعريف بالنفس: Je m'appelle + الاسم (الأكثر شيوعاً). Je suis + الاسم. Mon prénom est + الاسم. مثال: Je m'appelle Fatima. Je suis Ahmed. للسؤال: Comment tu t'appelles ? أو Comment vous vous appelez ?"},
  {q:"ما أرقام 0-10 بالفرنسية بالترتيب الصحيح؟",opts:["Zéro, Une, Deux, Trios, Quatre, Cinq, Sixe, Sept, Huite, Neuf, Dix","Zéro, Un, Deux, Trois, Quatre, Cinq, Six, Sept, Huit, Neuf, Dix","Zero, One, Deux, Three, Quatre, Five, Six, Seven, Huit, Nine, Dix","Zéro, Un, Deux, Trois, Cinq, Quatre, Six, Neuf, Huit, Sept, Dix"],ans:1,exp:"الأرقام 0-10: 0=Zéro, 1=Un/Une, 2=Deux, 3=Trois, 4=Quatre, 5=Cinq, 6=Six, 7=Sept, 8=Huit, 9=Neuf, 10=Dix. ملاحظة: Un (مذكر) / Une (مؤنث). مثال: J'ai deux frères et une sœur."},
  // Dossier 1: Une rencontre
  {q:"ما الفعل être (يكون/هو) في المضارع للضمائر المختلفة؟",opts:["Je suis / Tu suis / Il suis / Nous suis / Vous suis / Ils suis","Je suis / Tu es / Il est / Nous sommes / Vous êtes / Ils sont","Je être / Tu être / Il être / Nous être / Vous être / Ils être","Je es / Tu est / Il suis / Nous sont / Vous êtes / Ils sommes"],ans:1,exp:"تصريف الفعل être في المضارع: Je suis (أنا أكون) / Tu es / Il-Elle est / Nous sommes / Vous êtes / Ils-Elles sont. مثال: Je suis koweïtien. Tu es étudiant. Il est médecin. Nous sommes amis."},
  {q:"كيف نتساءل عن الجنسية بالفرنسية ونُجيب عنها؟",opts:["What is your nationality? — I am Kuwaiti.","Quelle est ta nationalité ? — Je suis koweïtien(ne). / Tu es de quel pays ? — Je suis du Koweït.","Nationalité? — Koweït.","Comment tu viens? — Je viens du Koweït."],ans:1,exp:"السؤال عن الجنسية: Quelle est ta nationalité ? أو Tu es de quel pays ? الإجابة: Je suis + الجنسية. مثال: Je suis koweïtien (مذكر) / koweïtienne (مؤنث). الجنسيات تتطابق مع الجنس غالباً: français/française, anglais/anglaise, arabe/arabe (مشترك)."},
  {q:"ما الصفات للتعبير عن الجنسية والمهنة وقاعدة التطابق مع الجنس؟",opts:["الصفات ثابتة لا تتغير في الفرنسية","الصفة تتطابق مع الاسم في الجنس (مذكر/مؤنث): المؤنث يضيف عادةً -e — مثال: étudiant (م) / étudiante (مؤ)","الصفة تتطابق مع الفعل فقط","لا قاعدة للتطابق في الفرنسية"],ans:1,exp:"قاعدة التطابق في الجنس: المذكر = الشكل الأساسي. المؤنث = إضافة -e في الغالب. أمثلة: étudiant/étudiante (طالب/ة), français/française (فرنسي/ة), koweïtien/koweïtienne. استثناءات: profессeur يستخدم للجنسين. المهن: médecin (طبيب), professeur (أستاذ), ingénieur (مهندس), avocat/avocate (محامي/ة)."},
  // Dossier 2: Une invitation
  {q:"ما تصريف الفعل avoir (يملك/عنده) في المضارع؟",opts:["Je ai / Tu ai / Il ai / Nous ai / Vous ai / Ils ai","J'ai / Tu as / Il a / Nous avons / Vous avez / Ils ont","Je avoir / Tu avoir / Il a / Nous avoir / Vous avez / Ils ont","J'ai / Tu as / Il est / Nous avons / Vous êtes / Ils ont"],ans:1,exp:"تصريف avoir في المضارع: J'ai (أنا عندي) / Tu as / Il-Elle a / Nous avons / Vous avez / Ils-Elles ont. مثال: J'ai 17 ans (عمري 17 سنة). Tu as un frère ? Il a deux sœurs. Nous avons un cours de français."},
  {q:"كيف نسأل عن العمر ونُجيب بالفرنسية؟",opts:["How old are you? — I am 17 years old.","Quel âge as-tu ? / Tu as quel âge ? — J'ai + العمر + ans","Quel est ton âge ? — Je suis 17 ans.","Combien ans tu as ? — J'ai 17."],ans:1,exp:"السؤال عن العمر: Quel âge as-tu ? (غير رسمي) أو Quel âge avez-vous ? (رسمي). الإجابة: J'ai + الرقم + ans. مثال: J'ai dix-sept ans. (عمري 17 سنة). ملاحظة مهمة: نستخدم avoir (عنده) لا être (هو) للتعبير عن العمر في الفرنسية."},
  // Dossier 3 & 4: Réservation et voyage
  {q:"كيف نتحدث عن الوقت والساعة بالفرنسية؟",opts:["What time is it? — It's two o'clock.","Quelle heure est-il ? — Il est + الساعة. مثال: Il est deux heures. / Il est midi (الظهر) / Il est minuit (منتصف الليل)","C'est quelle heure ? — C'est 2h.","Quel temps est-il ? — Il est deux heures."],ans:1,exp:"السؤال عن الوقت: Quelle heure est-il ? أو Il est quelle heure ? الإجابة: Il est + الساعة + heure(s). أمثلة: Il est une heure (الساعة 1). Il est deux heures (الساعة 2). Il est midi (الظهر/12pm). Il est minuit (منتصف الليل). Il est deux heures et demie (والنصف). Il est deux heures moins le quart (إلا الربع)."},
  {q:"ما تصريف الفعل aller (يذهب) في المضارع واستخداماته؟",opts:["Je aller / Tu aller / Il aller...","Je vais / Tu vas / Il va / Nous allons / Vous allez / Ils vont — يستخدم للتنقل وللتعبير عن الحال وللمستقبل القريب","Je vais / Tu vas / Il va / Nous vons / Vous valez / Ils vont","Je aller / Tu vais / Il va / Nous allons / Vous allez / Ils vont"],ans:1,exp:"تصريف aller: Je vais / Tu vas / Il-Elle va / Nous allons / Vous allez / Ils-Elles vont. استخداماته الثلاثة: (1) التنقل: Je vais à l'école (أذهب للمدرسة). (2) الحال: Comment ça va ? — Ça va bien. (3) المستقبل القريب: Je vais manger (سآكل) = aller + مصدر الفعل."},
  {q:"ما حروف الجر للأماكن وكيف تتغير مع المدن والدول؟",opts:["في المدن والدول نستخدم دائماً 'à'","للمدن: à (في/إلى) — للدول المؤنثة: en — للدول المذكرة: au — للدول الجمع: aux. مثال: Je vais à Paris / en France / au Koweït / aux États-Unis","نستخدم دائماً 'de' للمدن والدول","حروف الجر لا تتغير مع الدول"],ans:1,exp:"قاعدة حروف الجر مع أسماء المدن والدول: المدن: à. مثال: à Paris, à Koweït. الدول المؤنثة (تنتهي بـ e): en. مثال: en France, en Angleterre. الدول المذكرة: au. مثال: au Koweït, au Maroc. الدول الجمع: aux. مثال: aux États-Unis. المصدر: de/d' للمدن, de/du/des/d' للدول."}
];
const L=["أ","ب","ج","د"],FN=[["🌟 Parfait! Bravo!","Toutes les réponses sont correctes!","⭐⭐⭐⭐⭐"],["🔥 Très bien!","Presque parfait!","⭐⭐⭐⭐"],["👍 Bien!","Continuez à réviser!","⭐⭐⭐"],["💡 Réessayez!","Révisez vos notes!","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#f97316','#fff','#fdba74','#c2410c'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(249,115,22,${(1-d/130)*.07})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(249,115,22,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
function lq(){ans=false;document.getElementById('nb').classList.remove('show');const ex=document.getElementById('ex');ex.classList.remove('show');ex.style.display='none';const q=QS[cq];document.getElementById('pf').style.width=((cq/QS.length)*100)+'%';document.getElementById('pl').textContent='السؤال '+(cq+1)+' من '+QS.length;document.getElementById('qn').textContent='QUESTION '+String(cq+1).padStart(2,'0');const qc=document.getElementById('qc');qc.classList.remove('si');void qc.offsetWidth;qc.classList.add('si');document.getElementById('qt').textContent=q.q;const og=document.getElementById('og');og.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="ltr">${L[i]}</span><span>${o}</span>`;b.addEventListener('click',()=>pick(i,b));og.appendChild(b)});bsb()}
function pick(idx,btn){if(ans)return;ans=true;const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);const fb=document.getElementById('fb');fb.classList.remove('sc','wr');if(idx===q.ans){btn.classList.add('correct');sc+=10;const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);fb.textContent=['✅','🎯','⭐','🔥'][Math.floor(Math.random()*4)];fb.classList.add('sc');for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);setTimeout(()=>document.getElementById('nb').classList.add('show'),500)}else{btn.classList.add('wrong');bs[q.ans].classList.add('correct');fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);setTimeout(()=>document.getElementById('nb').classList.add('show'),350)}bsb()}
function nxt(){cq++;if(cq<QS.length)lq();else sf()}
function sf(){document.getElementById('qs').style.display='none';document.getElementById('fs').classList.add('vis');document.getElementById('fsn').textContent=sc;const p=sc/(QS.length*10),f=p===1?FN[0]:p>=.75?FN[1]:p>=.5?FN[2]:FN[3];document.getElementById('ftl').textContent=f[0];document.getElementById('fmg').textContent=f[1];document.getElementById('fst').textContent=f[2];setTimeout(()=>{for(let i=0;i<8;i++)setTimeout(()=>lc(innerWidth*Math.random(),-20),i*100)},250)}
function rst(){cq=0;sc=0;ans=false;cf=[];document.getElementById('sv').textContent='0';document.getElementById('fs').classList.remove('vis');document.getElementById('qs').style.display='flex';lq()}
lq();
</script></body></html>
