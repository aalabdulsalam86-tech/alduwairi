<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>كيمياء — الوحدة الخامسة | المركبات الهيدروكربونية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#4ade80;--c2:#15803d;--bg:#010a04;--brd:rgba(74,222,128,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr"><div class="logo">⚗️ كيمياء — المركبات الهيدروكربونية</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
  <div class="plbl" id="pl"></div>
  <div class="sbar" id="sbar"></div>
  <div class="qcard" id="qc">
    <div class="qn" id="qn"></div>
    <div class="qt" id="qt"></div>
    <div class="opts" id="og"></div>
    <div class="exp" id="ex"></div>
    <button class="nbtn" id="nb" onclick="nxt()">التالي ←</button>
  </div>
</div>
<div class="final" id="fs">
  <div class="fstars" id="fst"></div><div class="ftitle" id="ftl"></div>
  <div class="fmsg" id="fmg"></div>
  <div class="fsbox"><div class="fslbl">مجموع النقاط</div><div class="fsnum" id="fsn">0</div></div>
  <button class="rbtn" onclick="rst()">🔄 إعادة المحاولة</button>
  <span class="bhome" onclick="window.history.back()">← العودة للموقع</span>
</div>
<script>
const QS=[
  {q:"ما الهيدروكربونات (Hydrocarbons) وما تصنيفاتها الرئيسية؟",opts:["مركبات تحتوي على C وH وO فقط","مركبات تحتوي على الكربون والهيدروجين فقط — تُصنّف إلى: مشبّعة (Alkanes)، غير مشبّعة (Alkenes/Alkynes)، وأروماتية (Aromatic)","مركبات تحتوي على H فقط","مركبات غير عضوية"],ans:1,exp:"الهيدروكربونات: تحتوي على C و H فقط. المشبّعة (Saturated): Alkanes — روابط أحادية فقط، الصيغة CₙH₂ₙ₊₂. غير المشبّعة (Unsaturated): Alkenes (رابطة مزدوجة CₙH₂ₙ)، Alkynes (رابطة ثلاثية CₙH₂ₙ₋₂). الأروماتية: حلقة بنزينية. مصدرها الرئيسي: النفط الخام والغاز الطبيعي."},
  {q:"ما الصيغة الأولية والصيغة الجزيئية لمركب عضوي وما الفرق بينهما؟",opts:["كلاهما متطابقان دائماً","الصيغة الأولية (Empirical): أبسط نسبة ذرية. الصيغة الجزيئية (Molecular): العدد الفعلي للذرات في الجزيء = الصيغة الأولية × مضاعف صحيح","الصيغة الأولية أكبر من الجزيئية دائماً","الصيغة الجزيئية لا تحتوي على أرقام"],ans:1,exp:"مثال: البنزين C₆H₆ — الصيغة الأولية CH (أبسط نسبة)، الصيغة الجزيئية C₆H₆ = CH×6. الجلوكوز C₆H₁₂O₆ — الصيغة الأولية CH₂O، الجزيئية C₆H₁₂O₆ = CH₂O×6. الصيغة الجزيئية = (الصيغة الأولية)ₙ حيث n = M(جزيئي) ÷ M(أولي)."},
  {q:"ما الألكانات (Alkanes) وما خصائصها؟",opts:["مركبات تحتوي على رابطة ثلاثية","هيدروكربونات مشبّعة — روابط أحادية فقط بين C وH، الصيغة العامة CₙH₂ₙ₊₂، خاملة كيميائياً نسبياً","مركبات تحتوي على رابطة مزدوجة","مركبات عطرية حلقية فقط"],ans:1,exp:"Alkanes: CₙH₂ₙ₊₂. أمثلة: CH₄ (ميثان)، C₂H₆ (إيثان)، C₃H₈ (بروبان)، C₄H₁₀ (بيوتان). الروابط: σ فقط، تهجين sp³. التفاعلات الرئيسية: الاحتراق والإحلال الهالوجيني (Halogenation). خاملة نسبياً بسبب استقرار روابط C-C وC-H."},
  {q:"ما الألكينات (Alkenes) وما التفاعل المميّز لها؟",opts:["هيدروكربونات تحتوي على رابطة ثلاثية C≡C","هيدروكربونات تحتوي على رابطة مزدوجة C=C، الصيغة CₙH₂ₙ، تُميّزها تفاعلات الإضافة (Addition Reactions)","مركبات مشبّعة لا تتفاعل مع البروم","مركبات أروماتية حلقية"],ans:1,exp:"Alkenes: CₙH₂ₙ. أبسطها الإيثيلين C₂H₄. تهجين ذرة C عند الرابطة المزدوجة: sp². التفاعلات المميّزة: (1) إضافة الهالوجين: C₂H₄ + Br₂ → C₂H₄Br₂ (يُزيل لون البروم). (2) إضافة الهيدروجين (Hydrogenation). (3) إضافة الماء (Hydration). يُستخدم Br₂/CCl₄ للكشف عن الرابطة المزدوجة."},
  {q:"ما الألكاينات (Alkynes) وما أبرز أمثلتها؟",opts:["هيدروكربونات مشبّعة بروابط أحادية","هيدروكربونات تحتوي على رابطة ثلاثية C≡C، الصيغة CₙH₂ₙ₋₂، تهجين sp للكربون — أبرز مثال: الأسيتيلين C₂H₂","مركبات تحتوي على الأكسجين","هيدروكربونات حلقية فقط"],ans:1,exp:"Alkynes: CₙH₂ₙ₋₂. رابطة ثلاثية C≡C = رابطة σ + رابطتا π. تهجين sp: خطي، الزاوية 180°. أبرز مثال: الأسيتيلين C₂H₂ (إيثاين) يُستخدم في لحام المعادن (لهب أوكسي-أسيتيلين يصل 3500°C). التفاعلات: إضافة H₂ أو HX أو X₂ (يمكن إضافة 2 جزيء)."},
  {q:"ما تناظر البنية (Structural Isomerism) في الهيدروكربونات؟",opts:["جزيئات متطابقة تماماً في الشكل والصيغة","مركبات لها نفس الصيغة الجزيئية لكن ترتيب ذرات مختلف — مثال: البيوتان C₄H₁₀ يوجد كـ n-butane وisobutane","جزيئات مختلفة الصيغة الجزيئية","ظاهرة تخص العناصر فقط"],ans:1,exp:"التناظر البنائي (Structural Isomers): نفس الصيغة الجزيئية، ترتيب ذرات مختلف. C₄H₁₀: n-butane (سلسلة مستقيمة) وisobutane/2-methylpropane (سلسلة متفرعة). C₅H₁₂: 3 نظائر. كلما ازداد طول السلسلة زاد عدد النظائر. النظائر تختلف في الخصائص الفيزيائية (نقطة غليان) لكن تتشابه في التفاعلات الكيميائية."},
  {q:"ما تسمية الهيدروكربونات وفق نظام IUPAC؟",opts:["يُسمّى بأي اسم شائع بدون قواعد","تُحدَّد أطول سلسلة كربونية (اسم الأساس)، تُرقَّم بداية من أقرب تفرع، تُذكر التفرعات كبادئات مع أرقام مواضعها","تُسمّى بعدد ذرات الهيدروجين فقط","تُسمّى بلون المادة وحالتها"],ans:1,exp:"قواعد IUPAC: (1) حدد أطول سلسلة C: 1=meth، 2=eth، 3=prop، 4=but، 5=pent، 6=hex. (2) نهايات: -ane (ألكان)، -ene (ألكين)، -yne (ألكاين). (3) رقّم السلسلة من أقرب تفرع أو رابطة متعددة. (4) اذكر التفرعات أبجدياً مع أرقامها. مثال: 2-methylbutane."},
  {q:"ما تكسير الهيدروكربونات (Cracking) وما أهميته الصناعية؟",opts:["دمج جزيئات صغيرة لتكوين أكبر","تكسير جزيئات الهيدروكربونات الثقيلة إلى جزيئات أصغر وأكثر نفعاً — يُنتج بنزين ووقوداً أفضل وإيثيلين للبلاستيك","ذوبان النفط في الماء","استخراج النفط من باطن الأرض"],ans:1,exp:"Cracking: تكسير جزيئات الألكانات الثقيلة إلى ألكانات وألكينات أصغر. الحرارة (Thermal Cracking): 450-750°C. الكيميائية الحفازة (Catalytic Cracking): تُستخدم حفازات zeolite، أقل حرارة. الأهمية: (1) إنتاج بنزين عالي الجودة. (2) إنتاج إيثيلين لصناعة البلاستيك (Polyethylene). (3) الاستفادة من الزيوت الثقيلة قليلة الطلب."},
  {q:"ما البلمرة (Polymerization) وما أنواعها الرئيسية؟",opts:["تكسير جزيئات كبيرة إلى صغيرة","ارتباط وحدات صغيرة (مونومرات) لتكوين جزيئات ضخمة (بوليمرات) — نوعان: إضافة (Addition) واتحاد (Condensation)","ذوبان البلاستيك في الماء","تفاعل الهيدروكربونات مع الأكسجين فقط"],ans:1,exp:"البلمرة بالإضافة Addition Polymerization: فتح الرابطة المزدوجة للمونومر. مثال: n(CH₂=CH₂) → (-CH₂-CH₂-)ₙ (بولي إيثيلين PE). البلمرة بالتكثيف Condensation: مونومرين مختلفين مع إطلاق H₂O. مثال: النايلون، البوليستر. تطبيقات: أكياس، زجاجات، ملابس، إطارات، بلاستيك."},
  {q:"ما المركبات العضوية التي تحتوي على مجموعات وظيفية (Functional Groups)؟",opts:["الهيدروكربونات فقط بلا مجموعات وظيفية","مجموعات ذرات تُضفي على المركب خصائص كيميائية مميّزة — أمثلة: -OH (كحولات)، -COOH (أحماض كربوكسيلية)، -CHO (ألدهيدات)، -CO- (كيتونات)","الأملاح فقط","المركبات غير العضوية فقط"],ans:1,exp:"المجموعات الوظيفية الأساسية: -OH → كحولات (Alcohols) مثل الإيثانول C₂H₅OH. -COOH → أحماض كربوكسيلية مثل حمض الخليك CH₃COOH. -CHO → ألدهيدات. -CO- → كيتونات. -NH₂ → أمينات. -COO- → إسترات. المجموعة الوظيفية تُحدد طبيعة التفاعلات الكيميائية للمركب."}
];
const L=["أ","ب","ج","د"],FN=[[" 🌟 ممتاز! درجة كاملة!","أجبت على جميع الأسئلة صحيحة!","⭐⭐⭐⭐⭐"],[" 🔥 أداء رائع!","تقريباً مثالي — راجع نقطةً أو اثنتين","⭐⭐⭐⭐"],["👍 أحسنت!","نتيجة جيدة — المراجعة ستُحسّن أداءك","⭐⭐⭐"],["💡 حاول مجدداً!","راجع ملاحظاتك وحاول مرة أخرى","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#4ade80','#fff','#86efac','#15803d'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(74,222,128,${(1-d/130)*.07})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(74,222,128,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
function lq(){ans=false;document.getElementById('nb').classList.remove('show');const ex=document.getElementById('ex');ex.classList.remove('show');ex.style.display='none';const q=QS[cq];document.getElementById('pf').style.width=((cq/QS.length)*100)+'%';document.getElementById('pl').textContent='السؤال '+(cq+1)+' من '+QS.length;document.getElementById('qn').textContent='QUESTION '+String(cq+1).padStart(2,'0');const qc=document.getElementById('qc');qc.classList.remove('si');void qc.offsetWidth;qc.classList.add('si');document.getElementById('qt').textContent=q.q;const og=document.getElementById('og');og.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="ltr">${L[i]}</span><span>${o}</span>`;b.addEventListener('click',()=>pick(i,b));og.appendChild(b)});bsb()}
function pick(idx,btn){if(ans)return;ans=true;const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);const fb=document.getElementById('fb');fb.classList.remove('sc','wr');if(idx===q.ans){btn.classList.add('correct');sc+=10;const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);fb.textContent=['✅','🎯','⭐','🔥'][Math.floor(Math.random()*4)];fb.classList.add('sc');for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);setTimeout(()=>document.getElementById('nb').classList.add('show'),500)}else{btn.classList.add('wrong');bs[q.ans].classList.add('correct');fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);setTimeout(()=>document.getElementById('nb').classList.add('show'),350)}bsb()}
function nxt(){cq++;if(cq<QS.length)lq();else sf()}
function sf(){document.getElementById('qs').style.display='none';document.getElementById('fs').classList.add('vis');document.getElementById('fsn').textContent=sc;const p=sc/(QS.length*10),f=p===1?FN[0]:p>=.75?FN[1]:p>=.5?FN[2]:FN[3];document.getElementById('ftl').textContent=f[0];document.getElementById('fmg').textContent=f[1];document.getElementById('fst').textContent=f[2];setTimeout(()=>{for(let i=0;i<8;i++)setTimeout(()=>lc(innerWidth*Math.random(),-20),i*100)},250)}
function rst(){cq=0;sc=0;ans=false;cf=[];document.getElementById('sv').textContent='0';document.getElementById('fs').classList.remove('vis');document.getElementById('qs').style.display='flex';lq()}
lq();
</script></body></html>
