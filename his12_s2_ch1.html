<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التاريخ 12 أدبي · الفصل الثاني</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Orbitron:wght@700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00f5ff;--gold:#fbbf24;--purple:#c026d3;--dark:#020617;--dark2:#0f172a;--text:#f1f5f9;--muted:rgba(241,245,249,0.6);--border:rgba(0,245,255,0.15);--ok:#10d18b;--bad:#ff5875;--his:#f59e0b;--his-deep:#b45309}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"Tajawal",sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:rgba(0,245,255,0.3);border-radius:3px}

#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.cw{position:relative;z-index:1}

nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(2,6,23,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:"Orbitron",sans-serif;font-size:14px;color:var(--cyan);letter-spacing:3px;text-shadow:0 0 20px rgba(0,245,255,0.5)}
.nav-back{color:var(--muted);text-decoration:none;font-size:14px;padding:7px 16px;border-radius:8px;transition:all 0.2s;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1)}
.nav-back:hover{color:var(--text);background:rgba(255,255,255,0.08)}

.wrap{max-width:920px;margin:0 auto;padding:96px 24px 72px}

.hero{background:rgba(15,23,42,0.9);border:1.5px solid var(--border);border-radius:22px;padding:28px 32px;margin-bottom:26px;background-image:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(180,83,9,0.1));position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:0;right:0;width:220px;height:220px;background:radial-gradient(circle,rgba(245,158,11,0.2),transparent 70%);pointer-events:none}
.hero-top{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.hero-badge{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--his),var(--his-deep));display:grid;place-items:center;font-size:30px;color:#fff;box-shadow:0 0 30px rgba(245,158,11,0.35)}
.hero h1{font-size:26px;font-weight:900;line-height:1.3;background:linear-gradient(135deg,#fff,#fde68a,var(--his));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:var(--muted);font-size:14px;margin-top:4px}
.hero-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.hero-pill{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--his);font-weight:700}
.hero-pill.gold{background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.25);color:var(--gold)}

.progress-bar{background:rgba(15,23,42,0.9);border:1.5px solid var(--border);border-radius:14px;padding:14px 20px;margin-bottom:22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pb-text{font-size:13px;color:var(--muted);flex-shrink:0}
.pb-text b{color:var(--cyan);font-family:"Orbitron";font-weight:700}
.pb-track{flex:1;min-width:180px;height:8px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;width:0;background:linear-gradient(90deg,var(--his),var(--his-deep),var(--gold));border-radius:99px;transition:width 0.4s ease;box-shadow:0 0 12px rgba(245,158,11,0.4)}
.pb-score{font-family:"Orbitron";font-weight:900;font-size:14px;color:var(--gold)}

.card{background:rgba(15,23,42,0.85);border:1.5px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px;box-shadow:0 10px 40px rgba(0,0,0,0.3);backdrop-filter:blur(12px)}
.qnum{display:inline-block;font-family:"Orbitron";font-weight:900;font-size:11px;letter-spacing:2px;color:var(--gold);background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.2);padding:5px 10px;border-radius:8px;margin-bottom:14px}
.unit-tag{display:inline-block;background:linear-gradient(135deg,var(--his),var(--his-deep));color:#fff;font-size:10px;font-family:"Tajawal";font-weight:700;letter-spacing:0.5px;padding:4px 10px;border-radius:6px;margin-right:8px;vertical-align:middle}
.qtext{font-size:18px;font-weight:500;line-height:1.9;margin-bottom:6px}
.qtext b{color:var(--his)}

.options{display:grid;gap:10px;margin-top:14px}
.opt{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);padding:13px 16px;border-radius:12px;cursor:pointer;font-size:15.5px;transition:all 0.18s;text-align:right;font-family:inherit;color:var(--text);width:100%;line-height:1.7}
.opt:hover{border-color:var(--cyan);background:rgba(0,245,255,0.05);transform:translateX(-3px)}
.opt .letter{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.06);display:grid;place-items:center;font-family:"Orbitron";font-weight:700;color:var(--gold);flex-shrink:0;font-size:13px}
.opt.correct{background:rgba(16,209,139,0.12);border-color:var(--ok)}
.opt.correct .letter{background:var(--ok);color:#04241a}
.opt.wrong{background:rgba(255,88,117,0.12);border-color:var(--bad)}
.opt.wrong .letter{background:var(--bad);color:#2a050c}
.opt:disabled{cursor:not-allowed;opacity:0.88}

.feedback{margin-top:14px;padding:14px 16px;border-radius:12px;font-size:14.5px;line-height:1.85;display:none;border-right:3px solid var(--gold);background:rgba(251,191,36,0.06)}
.feedback.show{display:block;animation:fadeIn 0.35s ease}
.feedback b{color:var(--gold)}
.feedback .his{color:var(--his);font-weight:700}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.nav-btns{display:flex;justify-content:space-between;gap:10px;margin-top:20px}
.btn{font-family:"Tajawal";font-weight:900;font-size:14px;padding:12px 22px;border-radius:12px;border:none;cursor:pointer;transition:all 0.18s}
.btn-primary{background:var(--cyan);color:var(--dark);box-shadow:0 6px 20px rgba(0,245,255,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,245,255,0.4)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid rgba(255,255,255,0.1)}
.btn-ghost:hover{background:rgba(255,255,255,0.08)}

.result{display:none;text-align:center;padding:44px 24px}
.result.show{display:block;animation:fadeIn 0.5s ease}
.result .emoji{font-size:80px;margin-bottom:16px}
.result h2{font-size:36px;margin-bottom:8px;color:#fff;font-weight:900}
.result .score-big{font-family:"Orbitron";font-size:56px;font-weight:900;background:linear-gradient(90deg,var(--his),var(--his-deep),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:16px 0}
.result .tier{color:var(--gold);font-size:20px;margin-bottom:22px;font-weight:700}
.result .msg{color:var(--muted);margin-bottom:28px;font-size:15px;line-height:1.9;max-width:520px;margin-left:auto;margin-right:auto}
.result-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

@media(max-width:640px){nav{padding:0 20px}.wrap{padding:90px 16px 60px}.hero{padding:22px}.hero h1{font-size:20px}.hero-top{flex-wrap:wrap}.card{padding:22px 18px}.qtext{font-size:16px}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<nav>
  <div class="nav-logo">A · A · J</div>
  <a class="nav-back" href="index.html">→ رجوع</a>
</nav>

<div class="cw">
<div class="wrap">
  <div class="hero">
    <div class="hero-top">
      <div class="hero-badge">⚔️</div>
      <div>
        <h1>الحربان العالميتان والنظام الدولي الجديد</h1>
        <div class="hero-sub">التاريخ · الصف الثاني عشر أدبي · الفصل الدراسي الثاني</div>
      </div>
    </div>
    <div class="hero-meta">
      <span class="hero-pill">الحرب العالمية الأولى</span>
      <span class="hero-pill">الحرب العالمية الثانية</span>
      <span class="hero-pill">عصبة الأمم</span>
      <span class="hero-pill gold">الأمم المتحدة</span>
    </div>
  </div>

  <div class="progress-bar">
    <div class="pb-text">السؤال <b id="q-cur">1</b> / <b id="q-total">5</b></div>
    <div class="pb-track"><div class="pb-fill" id="pb-fill"></div></div>
    <div class="pb-score">النتيجة: <span id="score">0</span>/<span id="score-total">5</span></div>
  </div>

  <div id="quiz"></div>

  <div class="result" id="result">
    <div class="emoji" id="result-emoji">🎉</div>
    <h2 id="result-title">أحسنت!</h2>
    <div class="score-big"><span id="final-score">0</span>/<span id="final-total">5</span></div>
    <div class="tier" id="tier">—</div>
    <div class="msg" id="result-msg"></div>
    <div class="result-buttons">
      <button class="btn btn-primary" onclick="location.reload()">🔄 إعادة المحاولة</button>
      <a class="btn btn-ghost" href="index.html" style="text-decoration:none;display:inline-block">→ القائمة الرئيسية</a>
    </div>
  </div>
</div>
</div>

<script>
const QUESTIONS = [
  {
    unit: 'الحرب العالمية الأولى · البداية',
    q: '<b>الحرب العالمية الأولى</b> بدأت عام:',
    options: [
      '1910م',
      '1914م',
      '1920م',
      '1939م'
    ],
    answer: 1,
    explain: 'بدأت <span class="his">الحرب العالمية الأولى في 28 يوليو 1914م</span> واستمرت حتى 11 نوفمبر 1918م. اندلعت شرارتها باغتيال ولي عهد النمسا <b>فرانز فرديناند</b> في سراييفو على يد الطالب الصربي غافريلو برينسيب.'
  },
  {
    unit: 'الحرب العالمية الأولى · الأسباب',
    q: 'من <b>أسباب الحرب العالمية الأولى</b>:',
    options: [
      'ضعف الصناعة',
      'التنافس الاستعماري والتحالفات العسكرية وسباق التسلح',
      'زيادة التعليم',
      'قلة السكان'
    ],
    answer: 1,
    explain: 'أسباب الحرب العالمية الأولى الرئيسية: <span class="his">(1) التنافس الاستعماري</span> بين الدول الأوروبية الكبرى، <span class="his">(2) التحالفات العسكرية</span> (الوفاق الثلاثي vs التحالف الثلاثي)، <span class="his">(3) سباق التسلح</span>، والنزعة القومية، إضافة إلى اغتيال فرانز فرديناند كسبب مباشر.'
  },
  {
    unit: 'عصبة الأمم',
    q: '<b>عصبة الأمم</b> تأسّست بهدف:',
    options: [
      'التجارة',
      'حفظ السلام العالمي ومنع الحروب من خلال التعاون الدولي',
      'التعليم',
      'الصناعة'
    ],
    answer: 1,
    explain: 'تأسّست <span class="his">عصبة الأمم عام 1920م</span> بعد الحرب العالمية الأولى بمبادرة من الرئيس الأمريكي <b>ويلسون</b>، بهدف <b>حفظ السلام العالمي</b> ومنع الحروب عبر التعاون الدولي. فشلت في منع الحرب العالمية الثانية، وحلّت محلها <b>الأمم المتحدة</b> عام 1945م.'
  },
  {
    unit: 'الحرب العالمية الثانية · النهاية',
    q: '<b>الحرب العالمية الثانية</b> انتهت عام:',
    options: [
      '1940م',
      '1945م',
      '1950م',
      '1939م'
    ],
    answer: 1,
    explain: 'انتهت <span class="his">الحرب العالمية الثانية عام 1945م</span> بهزيمة دول المحور (ألمانيا وإيطاليا واليابان). استسلمت ألمانيا في مايو 1945م، واستسلمت اليابان في سبتمبر 1945م بعد إلقاء القنبلتين النوويتين على هيروشيما وناغازاكي. بدأت الحرب عام 1939م واستمرت 6 سنوات.'
  },
  {
    unit: 'نتائج الحرب العالمية الثانية',
    q: 'من <b>نتائج الحرب العالمية الثانية</b>:',
    options: [
      'ضعف التكنولوجيا',
      'ظهور الأمم المتحدة وبروز نظام دولي جديد وانقسام العالم إلى معسكرين',
      'انتهاء الصناعة',
      'اختفاء الدول الكبرى'
    ],
    answer: 1,
    explain: 'أبرز نتائج الحرب العالمية الثانية: <span class="his">(1) تأسيس الأمم المتحدة</span> عام 1945م، <span class="his">(2) بروز نظام دولي جديد</span> بقيادة القوّتين العظميين، <span class="his">(3) انقسام العالم إلى معسكرين</span> (رأسمالي بقيادة الولايات المتحدة × شيوعي بقيادة الاتحاد السوفيتي) فيما عُرف بـ<b>الحرب الباردة</b>، وبداية تفكك الاستعمار.'
  }
];

const letters = ['أ','ب','ج','د'];
let idx = 0, score = 0, locked = false;
const quiz = document.getElementById('quiz');
const pbFill = document.getElementById('pb-fill');
const qCur = document.getElementById('q-cur');
const scoreEl = document.getElementById('score');

document.getElementById('q-total').textContent = QUESTIONS.length;
document.getElementById('score-total').textContent = QUESTIONS.length;
document.getElementById('final-total').textContent = QUESTIONS.length;

function render(){
  if(idx >= QUESTIONS.length){ finish(); return; }
  const q = QUESTIONS[idx];
  pbFill.style.width = (idx / QUESTIONS.length * 100) + '%';
  qCur.textContent = idx + 1;
  quiz.innerHTML = `
    <div class="card">
      <div class="qnum">QUESTION ${String(idx+1).padStart(2,'0')} / ${QUESTIONS.length}</div>
      <span class="unit-tag">${q.unit}</span>
      <div class="qtext">${q.q}</div>
      <div class="options">
        ${q.options.map((o,i) => `<button class="opt" data-i="${i}"><span class="letter">${letters[i]}</span><span>${o}</span></button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <div class="nav-btns">
        <button class="btn btn-ghost" id="skip">تخطّي</button>
        <button class="btn btn-primary" id="next" disabled>التالي ←</button>
      </div>
    </div>
  `;
  locked = false;
  quiz.querySelectorAll('.opt').forEach(b => b.addEventListener('click', () => choose(parseInt(b.dataset.i))));
  document.getElementById('next').addEventListener('click', () => { idx++; render(); });
  document.getElementById('skip').addEventListener('click', () => { idx++; render(); });
}

function choose(i){
  if(locked) return;
  locked = true;
  const q = QUESTIONS[idx];
  const opts = quiz.querySelectorAll('.opt');
  opts.forEach((b, bi) => {
    b.disabled = true;
    if(bi === q.answer) b.classList.add('correct');
    else if(bi === i) b.classList.add('wrong');
  });
  const fb = document.getElementById('fb');
  const correct = i === q.answer;
  if(correct){ score++; scoreEl.textContent = score; }
  fb.innerHTML = `<b>${correct ? '✔ إجابة صحيحة' : '✘ إجابة خاطئة'}</b> — ${q.explain}`;
  fb.classList.add('show');
  document.getElementById('next').disabled = false;
}

function finish(){
  document.getElementById('quiz').style.display = 'none';
  pbFill.style.width = '100%';
  qCur.textContent = QUESTIONS.length;
  const r = document.getElementById('result');
  r.classList.add('show');
  document.getElementById('final-score').textContent = score;
  const pct = score / QUESTIONS.length * 100;
  let emoji, tier, msg, title;
  if(pct >= 90){ emoji='🏆'; title='ممتاز!'; tier='مؤرّخ محترف'; msg='أداء استثنائي! إتقان كامل لأحداث القرن العشرين: الحربان العالميتان والنظام الدولي الجديد.'; }
  else if(pct >= 75){ emoji='🌟'; title='أحسنت!'; tier='طالب متميّز'; msg='نتيجة ممتازة. راجع الأسئلة التي أخطأت فيها للوصول إلى الإتقان الكامل.'; }
  else if(pct >= 60){ emoji='👍'; title='جيد'; tier='على الطريق الصحيح'; msg='أداء جيد. احفظ <b style="color:var(--his)">التواريخ المهمّة</b> (1914، 1918، 1939، 1945) و<b style="color:var(--his)">الأسباب والنتائج</b>.'; }
  else if(pct >= 40){ emoji='📚'; title='يحتاج مراجعة'; tier='استمر في الدراسة'; msg='راجع: أسباب ونتائج الحربين، دور عصبة الأمم والأمم المتحدة، ومفهوم الحرب الباردة.'; }
  else{ emoji='💪'; title='لا تيأس'; tier='حاول مرة أخرى'; msg='التاريخ يحتاج قراءة وتركيز. راجع الكتاب وحاول مرة أخرى.'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('tier').textContent = tier;
  document.getElementById('result-msg').innerHTML = msg;
}

// particle background
const cv = document.getElementById('bg'), cx = cv.getContext('2d');
let ns = [];
function rsz(){ cv.width = innerWidth; cv.height = innerHeight; }
function ini(){ ns = Array.from({length: 50}, () => ({ x: Math.random()*cv.width, y: Math.random()*cv.height, vx: (Math.random()-0.5)*0.45, vy: (Math.random()-0.5)*0.45, r: Math.random()*2.5 + 1.2 })); }
function draw(){
  cx.clearRect(0, 0, cv.width, cv.height);
  ns.forEach(n => { n.x += n.vx; n.y += n.vy; if(n.x<0||n.x>cv.width) n.vx *= -1; if(n.y<0||n.y>cv.height) n.vy *= -1; });
  for(let i=0; i<ns.length; i++) for(let j=i+1; j<ns.length; j++){
    const dx = ns[i].x - ns[j].x, dy = ns[i].y - ns[j].y, d = Math.sqrt(dx*dx + dy*dy);
    if(d < 160){ cx.beginPath(); cx.moveTo(ns[i].x, ns[i].y); cx.lineTo(ns[j].x, ns[j].y); cx.strokeStyle = `rgba(245,158,11,${(1-d/160)*0.1})`; cx.lineWidth = 0.7; cx.stroke(); }
  }
  ns.forEach(n => { cx.beginPath(); cx.arc(n.x, n.y, n.r, 0, Math.PI*2); cx.fillStyle = 'rgba(245,158,11,0.22)'; cx.fill(); });
  requestAnimationFrame(draw);
}
rsz(); ini(); draw();
window.addEventListener('resize', () => { rsz(); ini(); });

render();
</script>
</body>
</html>
