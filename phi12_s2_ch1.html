<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفلسفة 12 أدبي · الفصل الثاني — الوحدات 3-5</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Orbitron:wght@700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00f5ff;--gold:#fbbf24;--purple:#c026d3;--dark:#020617;--dark2:#0f172a;--text:#f1f5f9;--muted:rgba(241,245,249,0.6);--border:rgba(0,245,255,0.15);--ok:#10d18b;--bad:#ff5875;--phi:#c084fc}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"Tajawal",sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:rgba(0,245,255,0.3);border-radius:3px}

#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.cw{position:relative;z-index:1}

nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(2,6,23,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:"Orbitron",sans-serif;font-size:14px;color:var(--cyan);letter-spacing:3px;text-shadow:0 0 20px rgba(0,245,255,0.5)}
.nav-back{color:var(--muted);text-decoration:none;font-size:14px;padding:7px 16px;border-radius:8px;transition:all 0.2s;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1)}
.nav-back:hover{color:var(--text);background:rgba(255,255,255,0.08)}

.wrap{max-width:920px;margin:0 auto;padding:96px 24px 72px}

.hero{background:rgba(15,23,42,0.9);border:1.5px solid var(--border);border-radius:22px;padding:28px 32px;margin-bottom:26px;background-image:linear-gradient(135deg,rgba(192,132,252,0.12),rgba(192,38,211,0.08));position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:0;right:0;width:220px;height:220px;background:radial-gradient(circle,rgba(192,132,252,0.2),transparent 70%);pointer-events:none}
.hero-top{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.hero-badge{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--phi),var(--purple));display:grid;place-items:center;font-size:30px;color:#fff;box-shadow:0 0 30px rgba(192,132,252,0.35)}
.hero h1{font-size:26px;font-weight:900;line-height:1.3;background:linear-gradient(135deg,#fff,#e9d5ff,var(--phi));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:var(--muted);font-size:14px;margin-top:4px}
.hero-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.hero-pill{background:rgba(192,132,252,0.1);border:1px solid rgba(192,132,252,0.3);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--phi);font-weight:700}
.hero-pill.gold{background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.25);color:var(--gold)}

.progress-bar{background:rgba(15,23,42,0.9);border:1.5px solid var(--border);border-radius:14px;padding:14px 20px;margin-bottom:22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pb-text{font-size:13px;color:var(--muted);flex-shrink:0}
.pb-text b{color:var(--cyan);font-family:"Orbitron";font-weight:700}
.pb-track{flex:1;min-width:180px;height:8px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;width:0;background:linear-gradient(90deg,var(--phi),var(--purple),var(--gold));border-radius:99px;transition:width 0.4s ease;box-shadow:0 0 12px rgba(192,132,252,0.4)}
.pb-score{font-family:"Orbitron";font-weight:900;font-size:14px;color:var(--gold)}

.card{background:rgba(15,23,42,0.85);border:1.5px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px;box-shadow:0 10px 40px rgba(0,0,0,0.3);backdrop-filter:blur(12px)}
.qnum{display:inline-block;font-family:"Orbitron";font-weight:900;font-size:11px;letter-spacing:2px;color:var(--gold);background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.2);padding:5px 10px;border-radius:8px;margin-bottom:14px}
.unit-tag{display:inline-block;background:linear-gradient(135deg,var(--phi),var(--purple));color:#fff;font-size:10px;font-family:"Tajawal";font-weight:700;letter-spacing:0.5px;padding:4px 10px;border-radius:6px;margin-right:8px;vertical-align:middle}
.qtext{font-size:18px;font-weight:500;line-height:1.9;margin-bottom:6px}
.qtext b{color:var(--phi)}
.quote{background:rgba(192,132,252,0.08);border-right:3px solid var(--phi);padding:12px 16px;margin:12px 0;border-radius:10px;font-family:"Amiri",serif;font-size:17px;line-height:1.9;color:#e9d5ff}

.options{display:grid;gap:10px;margin-top:14px}
.opt{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);padding:13px 16px;border-radius:12px;cursor:pointer;font-size:15.5px;transition:all 0.18s;text-align:right;font-family:inherit;color:var(--text);width:100%;line-height:1.7}
.opt:hover{border-color:var(--cyan);background:rgba(0,245,255,0.05);transform:translateX(-3px)}
.opt .letter{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.06);display:grid;place-items:center;font-family:"Orbitron";font-weight:700;color:var(--gold);flex-shrink:0;font-size:13px}
.opt.correct{background:rgba(16,209,139,0.12);border-color:var(--ok)}
.opt.correct .letter{background:var(--ok);color:#04241a}
.opt.wrong{background:rgba(255,88,117,0.12);border-color:var(--bad)}
.opt.wrong .letter{background:var(--bad);color:#2a050c}
.opt:disabled{cursor:not-allowed;opacity:0.88}

.feedback{margin-top:14px;padding:14px 16px;border-radius:12px;font-size:14.5px;line-height:1.85;display:none;border-right:3px solid var(--gold);background:rgba(251,191,36,0.06)}
.feedback.show{display:block;animation:fadeIn 0.35s ease}
.feedback b{color:var(--gold)}
.feedback .phi{color:var(--phi);font-weight:700}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.nav-btns{display:flex;justify-content:space-between;gap:10px;margin-top:20px}
.btn{font-family:"Tajawal";font-weight:900;font-size:14px;padding:12px 22px;border-radius:12px;border:none;cursor:pointer;transition:all 0.18s}
.btn-primary{background:var(--cyan);color:var(--dark);box-shadow:0 6px 20px rgba(0,245,255,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,245,255,0.4)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid rgba(255,255,255,0.1)}
.btn-ghost:hover{background:rgba(255,255,255,0.08)}

.result{display:none;text-align:center;padding:44px 24px}
.result.show{display:block;animation:fadeIn 0.5s ease}
.result .emoji{font-size:80px;margin-bottom:16px}
.result h2{font-size:36px;margin-bottom:8px;color:#fff;font-weight:900}
.result .score-big{font-family:"Orbitron";font-size:56px;font-weight:900;background:linear-gradient(90deg,var(--phi),var(--purple),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:16px 0}
.result .tier{color:var(--gold);font-size:20px;margin-bottom:22px;font-weight:700}
.result .msg{color:var(--muted);margin-bottom:28px;font-size:15px;line-height:1.9;max-width:520px;margin-left:auto;margin-right:auto}
.result-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

@media(max-width:640px){nav{padding:0 20px}.wrap{padding:90px 16px 60px}.hero{padding:22px}.hero h1{font-size:20px}.hero-top{flex-wrap:wrap}.card{padding:22px 18px}.qtext{font-size:16px}}
</style>
</head>

  <div class="nav-logo">A · A · J</div>

<div class="wrap">
  <div class="hero">
    <div class="hero-top">
      <div class="hero-badge">⚖️</div>
      <div>
        <h1>الوحدات 3-5: الأخلاق والأخلاق التطبيقية والجمال</h1>
        <div class="hero-sub">الفلسفة · الصف الثاني عشر أدبي · الفصل الدراسي الثاني</div>
      </div>
    </div>
    <div class="hero-meta">
      <span class="hero-pill">فلسفة الأخلاق</span>
      <span class="hero-pill">أرسطو · مسكويه · كانط · بنتام</span>

      <span class="hero-pill gold">فلسفة الجمال</span>

  <div class="progress-bar">
    <div class="pb-text">السؤال <b id="q-cur">1</b> / <b>15</b></div>

  <div id="quiz"></div>

  <div class="result" id="result">
    <div class="emoji" id="result-emoji">🎉</div>

</div>

<script>
const QUESTIONS = [
  // ========= الوحدة 3: فلسفة الأخلاق (6 أسئلة) =========
  {
    unit: 'الوحدة 3 · مفهوم الأخلاق',
    q: 'ما معنى <b>النزعة النسبية</b> في الأخلاق؟',
    options: [
      'الأخلاق ثابتة ومطلقة عند جميع الناس',
      'الأخلاق تتغيّر بتغيّر الزمان والمكان والمجتمعات',
      'الأخلاق مصدرها الدين فقط',
      'الأخلاق لا قيمة لها'
    ],
    answer: 1,
    explain: '<span class="phi">النزعة النسبية</span> ترى أن <b>الأخلاق نسبية تتغيّر</b> بتغيّر الزمان والمكان والعادات والتقاليد، فما يُعدّ فضيلة في مجتمع قد يُعدّ رذيلة في آخر. أما <span class="phi">النزعة المطلقة</span> فترى أن القيم الأخلاقية ثابتة مطلقة لا تتغيّر.'
  },
  {
    unit: 'الوحدة 3 · السعادة عند أرسطو',
    q: 'يميّز <b>أرسطو</b> السعادة عن اللذة والثروة والمجد، ويرى أن السعادة الحقيقية تتحقق بـ:',
    options: [
      'الثروة والمال',
      'الشهرة والمجد',
      'تحقيق الاعتدال والفعل وفق العقل والفضيلة',
      'الانعزال عن الناس'
    ],
    answer: 2,
    explain: 'يرى <span class="phi">أرسطو</span> أن السعادة الحقيقية هي <b>فعل النفس الناطقة وفق الفضيلة</b>، وتتحقق بـ: شروط داخلية (العقل والإرادة)، شروط خارجية (قَدر من الثروة، الصحة الجسدية، حياة عائلية مكتفية)، وشرط معياري: <b>الاعتدال</b> (لا إفراط ولا تفريط) = الوسط الذهبي.'
  },
  {
    unit: 'الوحدة 3 · السعادة عند مسكويه',
    q: 'يميّز الفيلسوف المسلم <b>مسكويه</b> بين نوعين من السعادة. ما هما؟',
    options: [
      'السعادة الفردية والسعادة الجماعية',
      'السعادة النفسية والسعادة القصوى',
      'السعادة المادية والسعادة الروحانية',
      'السعادة الدنيوية والسعادة الأخروية'
    ],
    answer: 1,
    explain: 'ميّز <span class="phi">مسكويه</span> بين: <b>(1) السعادة النفسية</b>: خلقية تمكّن الإنسان من العيش هانئاً حسب أصول الفضيلة. <b>(2) السعادة القصوى</b>: خير مطلق لأنها سعادة الإنسان بما هو كائن عاقل، وهي غاية في ذاتها تتحقق بقوة العقل.'
  },
  {
    unit: 'الوحدة 3 · الواجب عند كانط',
    q: 'ينتقد <b>كانط</b> النظريات الأخلاقية القائمة على السعادة واللذة والمنفعة، ويؤسس أخلاقه على:',
    options: [
      'النتائج العملية للأفعال',
      'الإرادة الخيّرة والواجب لذاته',
      'العادات والتقاليد الاجتماعية',
      'اللذة الحسية'
    ],
    answer: 1,
    explain: 'يرى <span class="phi">كانط</span> أن الأخلاق يجب أن تقوم على <b>الإرادة الخيّرة</b> و<b>الواجب لذاته</b>، لا لغاية خارجية. الإرادة الخيّرة هي التي يكون لها قانون آخر غير قانون الواجب نفسه. فِعل الواجب لمجرد الواجب هو أساس الأخلاق الحقيقية.'
  },
  {
    unit: 'الوحدة 3 · كانط',
    q: 'يميّز <b>كانط</b> بين نوعين من الأوامر الأخلاقية. ما الفرق بينهما؟',
    options: [
      'الأوامر الشرطية المقيّدة (مشروطة بهدف) # الأوامر القطعية المطلقة (مُطلَقة لذاتها)',
      'الأوامر الفردية # الأوامر الجماعية',
      'الأوامر الدينية # الأوامر الدنيوية',
      'الأوامر اللفظية # الأوامر الفعلية'
    ],
    answer: 0,
    explain: 'عند <span class="phi">كانط</span>: <b>(1) الأوامر الشرطية المقيّدة</b> (Hypothetical Imperatives): مشروطة بهدف، مثل "إذا أردت النجاح فذاكِر". <b>(2) الأوامر القطعية المطلقة</b> (Categorical Imperatives): واجبات مطلقة لذاتها دون شرط، مثل "لا تكذب". الأخلاق الحقيقية تقوم على النوع الثاني.'
  },
  {
    unit: 'الوحدة 3 · بنتام والمنفعة',
    q: 'تقوم النظرية الأخلاقية عند <b>بنتام</b> (Jeremy Bentham) على مبدأ:',
    options: [
      'الواجب المطلق دون نظر للنتائج',
      'أعظم سعادة لأكبر عدد (مبدأ المنفعة)',
      'السعادة الأخروية',
      'الاعتدال الأرسطي'
    ],
    answer: 1,
    explain: 'يؤسس <span class="phi">بنتام</span> مذهب <b>النفعية (Utilitarianism)</b> على مبدأ: "<b>أعظم سعادة لأكبر عدد</b>" (Greatest happiness for the greatest number). الفعل الأخلاقي هو الذي يحقق أقصى لذة/منفعة ويقلل الألم لأكبر عدد من الناس.'
  },

  // ========= الوحدة 4: الأخلاق التطبيقية (4 أسئلة) =========
  {
    unit: 'الوحدة 4 · الأخلاق التطبيقية',
    q: 'ما المقصود بـ<b>الأخلاق التطبيقية</b> (Applied Ethics)؟',
    options: [
      'دراسة تاريخ الأخلاق فقط',
      'تطبيق القواعد الأخلاقية على قضايا معاصرة محددة (طبية، بيئية، مهنية...)',
      'الأخلاق التي يطبّقها الأطفال',
      'الأخلاق الدينية فقط'
    ],
    answer: 1,
    explain: '<span class="phi">الأخلاق التطبيقية</span> هي فرع من الفلسفة الأخلاقية يُعنى بـ<b>تطبيق المبادئ الأخلاقية على قضايا معاصرة محددة</b>: الأخلاق الطبية (Bioethics)، البيئية، المهنية، أخلاقيات العلم والتقنية، إلخ.'
  },
  {
    unit: 'الوحدة 4 · الأخلاق الطبية',
    q: 'تثير <b>الهندسة الوراثية</b> (Genetic Engineering) أسئلة أخلاقية جوهرية. أيٌّ من التالي هو تحدٍّ أخلاقي أساسي فيها؟',
    options: [
      'أن تكاليفها مرتفعة فقط',
      'أنها تتدخّل في خلق الإنسان وتثير قضايا الكرامة الإنسانية وحدود التدخل في الطبيعة',
      'أنها تحتاج مختبرات فقط',
      'لا تثير أي إشكاليات أخلاقية'
    ],
    answer: 1,
    explain: '<span class="phi">الهندسة الوراثية</span> من أبرز قضايا الأخلاق الطبية المعاصرة. التحدي الأخلاقي: <b>التدخل في التركيب الجيني للإنسان</b> يطرح أسئلة عن الكرامة الإنسانية، الهوية، حدود العلم، واحتمالية استخدامها في تعزيز الصفات (Designer babies) أو التمييز الوراثي.'
  },
  {
    unit: 'الوحدة 4 · الأخلاق البيئية',
    q: 'يُعرَّف <b>الضمير الإيكولوجي</b> في الأخلاق البيئية بأنه:',
    options: [
      'الشعور بالذنب من استهلاك الطعام',
      'الشعور بضرورة التناغم بين الإنسان والبيئة الطبيعية والحفاظ عليها',
      'الخوف من الحيوانات',
      'رفض التكنولوجيا مطلقاً'
    ],
    answer: 1,
    explain: '<span class="phi">الضمير الإيكولوجي</span> مبدأ أساسي في الأخلاق البيئية، مضمونه التأكيد على <b>ضرورة التناغم والانسجام بين الإنسان والبيئة الطبيعية</b> بهدف تعزيز قاعدة الحفاظ عليها. يواجه تحديات كبرى: التلوث، الاحتباس الحراري، المخلفات النووية.'
  },
  {
    unit: 'الوحدة 4 · أخلاق المهنة',
    q: 'ما أبرز مبادئ <b>أخلاق المهنة</b>؟',
    options: [
      'الأمانة، النزاهة، الإتقان، احترام أسرار العمل',
      'تحقيق أعلى ربح بأي وسيلة',
      'التهرّب من المسؤولية',
      'تجنّب العمل الجماعي'
    ],
    answer: 0,
    explain: 'أبرز مبادئ <span class="phi">أخلاق المهنة</span>: <b>الأمانة، النزاهة، الإتقان (الإحسان في العمل)، احترام أسرار العمل والعملاء، الالتزام بالقوانين والأنظمة، المسؤولية تجاه المجتمع</b>. وهي تختلف من مهنة لأخرى (طب، هندسة، تعليم، محاماة...).'
  },

  // ========= الوحدة 5: فلسفة الجمال (5 أسئلة) =========
  {
    unit: 'الوحدة 5 · مفهوم الجمال',
    q: '<b>الجمال</b> وفقاً لتعريف الكتاب:',
    options: [
      'الصفة الحسية المادية فقط',
      'نوع من الإحساس والتذوق الذي يقوم به الفرد، وهو أوسع من الفن',
      'ما يراه الناس جميلاً فقط',
      'صفة نسبية للنساء فقط'
    ],
    answer: 1,
    explain: '<span class="phi">الجمال</span> هو <b>نوع من الإحساس والتذوق</b> الذي يقوم به الفرد تلقائياً أو مقصوداً، ينتج عنه موقف جمالي للموضوع المدرك. الجمال <b>أوسع من الفن</b> لأنه لا يقتصر على الأعمال الفنية بل يتجاوزها إلى المناظر الطبيعية والمصنوعات.'

const letters = ['أ','ب','ج','د'];
let idx = 0, score = 0, locked = false;
const quiz = document.getElementById('quiz');
const pbFill = document.getElementById('pb-fill');
const qCur = document.getElementById('q-cur');
const scoreEl = document.getElementById('score');

function render(){
  if(idx >= QUESTIONS.length){ finish(); return; }
  const q = QUESTIONS[idx];
  pbFill.style.width = (idx / QUESTIONS.length * 100) + '%';
  qCur.textContent = idx + 1;
  quiz.innerHTML = `
    <div class="card">
      <div class="qnum">QUESTION ${String(idx+1).padStart(2,'0')} / 15</div>
      <span class="unit-tag">${q.unit}</span>
      <div class="qtext">${q.q}</div>
      <div class="options">
        ${q.options.map((o,i) => `<button class="opt" data-i="${i}"><span class="letter">${letters[i]}</span><span>${o}</span></button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <div class="nav-btns">
        <button class="btn btn-ghost" id="skip">تخطّي</button>
        <button class="btn btn-primary" id="next" disabled>التالي ←</button>
      </div>
    </div>
  `;
  locked = false;
  quiz.querySelectorAll('.opt').forEach(b => b.addEventListener('click', () => choose(parseInt(b.dataset.i))));
  document.getElementById('next').addEventListener('click', () => { idx++; render(); });
  document.getElementById('skip').addEventListener('click', () => { idx++; render(); });
}

function choose(i){
  if(locked) return;
  locked = true;
  const q = QUESTIONS[idx];
  const opts = quiz.querySelectorAll('.opt');
  opts.forEach((b, bi) => {
    b.disabled = true;
    if(bi === q.answer) b.classList.add('correct');
    else if(bi === i) b.classList.add('wrong');
  });
  const fb = document.getElementById('fb');
  const correct = i === q.answer;
  if(correct){ score++; scoreEl.textContent = score; }
  fb.innerHTML = `<b>${correct ? '✔ إجابة صحيحة' : '✘ إجابة خاطئة'}</b> — ${q.explain}`;
  fb.classList.add('show');
  document.getElementById('next').disabled = false;
}

function finish(){
  document.getElementById('quiz').style.display = 'none';
  pbFill.style.width = '100%';
  qCur.textContent = '15';
  const r = document.getElementById('result');
  r.classList.add('show');
  document.getElementById('final-score').textContent = score;
  const pct = score / QUESTIONS.length * 100;
  let emoji, tier, msg, title;
  if(pct >= 90){ emoji='🏆'; title='ممتاز!'; tier='فيلسوف أخلاق محترف'; msg='أداء استثنائي! إتقان كامل لنظريات الأخلاق (أرسطو، مسكويه، كانط، بنتام) وفلسفة الجمال.'; }
  else if(pct >= 75){ emoji='🌟'; title='أحسنت!'; tier='مفكّر ناقد'; msg='نتيجة ممتازة. راجع الأسئلة التي أخطأت فيها — خصوصاً تمييز كانط بين الأوامر الشرطية والقطعية.'; }
  else if(pct >= 60){ emoji='👍'; title='جيد'; tier='على الطريق الصحيح'; msg='لديك أساس جيد. ركّز على <b style="color:var(--phi)">النظريات الأخلاقية</b> و<b style="color:var(--phi)">النظريات الجمالية</b> (الموضوعية والانفعالية).'; }
  else if(pct >= 40){ emoji='📚'; title='يحتاج مراجعة'; tier='استمر في الدراسة'; msg='راجع الوحدات الثلاث بعناية: فلسفة الأخلاق، الأخلاق التطبيقية، فلسفة الجمال. ركّز على الفلاسفة الأربعة.'; }
  else{ emoji='💪'; title='لا تيأس'; tier='حاول مرة أخرى'; msg='الفلسفة تحتاج تأمّلاً وصبراً. اقرأ النظريات الأخلاقية بهدوء وحاول مرة أخرى.'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('tier').textContent = tier;
  document.getElementById('result-msg').innerHTML = msg;
}

// particle background - matches index.html
const cv = document.getElementById('bg'), cx = cv.getContext('2d');
let ns = [];
function rsz(){ cv.width = innerWidth; cv.height = innerHeight; }
function ini(){ ns = Array.from({length: 50}, () => ({ x: Math.random()*cv.width, y: Math.random()*cv.height, vx: (Math.random()-0.5)*0.45, vy: (Math.random()-0.5)*0.45, r: Math.random()*2.5 + 1.2 })); }
function draw(){
  cx.clearRect(0, 0, cv.width, cv.height);
  ns.forEach(n => { n.x += n.vx; n.y += n.vy; if(n.x<0||n.x>cv.width) n.vx *= -1; if(n.y<0||n.y>cv.height) n.vy *= -1; });
  for(let i=0; i<ns.length; i++) for(let j=i+1; j<ns.length; j++){
    const dx = ns[i].x - ns[j].x, dy = ns[i].y - ns[j].y, d = Math.sqrt(dx*dx + dy*dy);
    if(d < 160){ cx.beginPath(); cx.moveTo(ns[i].x, ns[i].y); cx.lineTo(ns[j].x, ns[j].y); cx.strokeStyle = `rgba(192,132,252,${(1-d/160)*0.1})`; cx.lineWidth = 0.7; cx.stroke(); }
  }
  ns.forEach(n => { cx.beginPath(); cx.arc(n.x, n.y, n.r, 0, Math.PI*2); cx.fillStyle = 'rgba(192,132,252,0.22)'; cx.fill(); });
  requestAnimationFrame(draw);
}
rsz(); ini(); draw();
window.addEventListener('resize', () => { rsz(); ini(); });

render();
</script>
