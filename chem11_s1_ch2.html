<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>كيمياء — الوحدة الثالثة | الكيمياء الحرارية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--c:#f97316;--c2:#c2410c;--bg:#0a0400;--brd:rgba(249,115,22,.18);--txt:#f1f5f9;--mut:rgba(241,245,249,.62);--red:#ef4444;--grn:#22c55e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal","Arial",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}#bgc,#cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}#bgc{z-index:0}#cfc{z-index:6}#fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:88px;z-index:100;pointer-events:none}#fb.sc{animation:fbs .9s ease forwards}#fb.wr{animation:fbw .9s ease forwards}@keyframes fbs{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}@keyframes fbw{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-65%) scale(.6);opacity:0}}.wrap{position:relative;z-index:10;width:100%;max-width:960px;padding:18px 26px;display:flex;flex-direction:column;gap:13px}.hdr{display:flex;justify-content:space-between;align-items:center}.logo{font-size:13px;font-weight:900;color:var(--c);letter-spacing:1.5px}.sb{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:50px;padding:7px 20px;display:flex;align-items:center;gap:7px}.sl{font-size:13px;color:var(--mut)}.sv{font-size:25px;font-weight:900;color:var(--c);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.sv.pop{transform:scale(1.55)}.ptrack{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c));border-radius:99px;transition:width .5s ease}.plbl{text-align:center;font-size:13px;color:var(--mut);margin-top:2px}.sbar{display:flex;gap:5px;justify-content:center}.sd{width:20px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.sd.on{background:var(--c);box-shadow:0 0 6px var(--c)}.qcard{background:rgba(255,255,255,.03);border:1.5px solid var(--brd);border-radius:20px;padding:28px 32px;backdrop-filter:blur(10px)}.qcard.si{animation:si .4s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes si{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}.qn{font-size:12px;font-weight:700;color:var(--c);margin-bottom:9px;letter-spacing:2px;opacity:.8}.qt{font-size:19px;font-weight:700;line-height:1.8;margin-bottom:18px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-family:"Tajawal","Arial",sans-serif;font-size:14px;font-weight:700;color:#dde;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .17s;line-height:1.6;text-align:right}.opt:hover:not(:disabled){border-color:rgba(255,255,255,.25);transform:translateY(-2px);color:#fff}.ltr{font-size:13px;font-weight:900;color:var(--c);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.opt.correct{background:rgba(34,197,94,.12)!important;border-color:var(--grn)!important;color:#fff!important}.opt.correct .ltr{background:var(--grn);color:#fff;border-color:var(--grn)}.opt.wrong{background:rgba(239,68,68,.1)!important;border-color:var(--red)!important;animation:shk .4s ease}.opt.wrong .ltr{background:var(--red);color:#fff;border-color:var(--red)}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.exp{margin-top:13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-right:3px solid var(--c);border-radius:10px;padding:12px 15px;font-size:14px;line-height:1.85;color:var(--mut);display:none}.exp.show{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.nbtn{margin-top:11px;width:100%;padding:12px;background:linear-gradient(135deg,var(--c2),var(--c));border:none;border-radius:10px;font-family:"Tajawal","Arial",sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:none;transition:all .2s}.nbtn.show{display:block}.final{display:none;flex-direction:column;align-items:center;text-align:center;padding:46px 24px;max-width:620px;margin:0 auto}.final.vis{display:flex}.fstars{font-size:42px;margin-bottom:12px}.ftitle{font-size:28px;font-weight:900;margin-bottom:7px}.fmsg{font-size:16px;color:var(--mut);margin-bottom:22px;line-height:1.7}.fsbox{background:rgba(255,255,255,.04);border:2px solid var(--c);border-radius:16px;padding:22px 48px;margin-bottom:24px}.fslbl{font-size:13px;color:var(--mut);margin-bottom:3px}.fsnum{font-size:56px;font-weight:900;color:var(--c)}.rbtn{background:linear-gradient(135deg,var(--c2),var(--c));color:#fff;border:none;border-radius:12px;padding:13px 40px;font-family:"Tajawal","Arial",sans-serif;font-size:17px;font-weight:900;cursor:pointer;margin-bottom:12px}.bhome{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline}@media(max-width:600px){.wrap{padding:11px 13px}.qt{font-size:16px}.opts{grid-template-columns:1fr}.opt{font-size:13px}}</style></head>
<body>
<canvas id="bgc"></canvas><canvas id="cfc"></canvas><div id="fb"></div>
<div class="wrap" id="qs">
  <div class="hdr"><div class="logo">⚗️ كيمياء — الكيمياء الحرارية</div><div class="sb"><span class="sl">النقاط</span><span class="sv" id="sv">0</span></div></div>
  <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
  <div class="plbl" id="pl"></div>
  <div class="sbar" id="sbar"></div>
  <div class="qcard" id="qc">
    <div class="qn" id="qn"></div>
    <div class="qt" id="qt"></div>
    <div class="opts" id="og"></div>
    <div class="exp" id="ex"></div>
    <button class="nbtn" id="nb" onclick="nxt()">التالي ←</button>
  </div>
</div>
<div class="final" id="fs">
  <div class="fstars" id="fst"></div><div class="ftitle" id="ftl"></div>
  <div class="fmsg" id="fmg"></div>
  <div class="fsbox"><div class="fslbl">مجموع النقاط</div><div class="fsnum" id="fsn">0</div></div>
  <button class="rbtn" onclick="rst()">🔄 إعادة المحاولة</button>
  <span class="bhome" onclick="window.history.back()">← العودة للموقع</span>
</div>
<script>
const QS=[
  {q:"ما المقصود بالتفاعل الطارد للحرارة (Exothermic) وما إشارة ΔH فيه؟",opts:["تفاعل يمتص الحرارة من المحيط — ΔH موجب","تفاعل يطلق الحرارة للمحيط — ΔH سالب","تفاعل لا تتغير فيه الحرارة — ΔH = صفر","تفاعل يحدث عند تبريد المادة فقط"],ans:1,exp:"الطارد للحرارة Exothermic: الطاقة تُطلق للمحيط، ΔH < 0 (سالب). مثال: احتراق الوقود، تكوّن الثلج. الماص للحرارة Endothermic: الطاقة تُمتص من المحيط، ΔH > 0 (موجب). مثال: الطبخ، التحليل الكهربائي. ΔH = H(نواتج) − H(متفاعلات)."},
  {q:"ما قانون هس (Hess's Law) وما أهميته؟",opts:["الحرارة تنتقل من الجسم البارد للساخن","تغيّر المحتوى الحراري لتفاعل يساوي مجموع تغيّرات المحتوى الحراري للخطوات التي يتكوّن منها — يسمح بحساب ΔH لتفاعلات لا يمكن قياسها مباشرة","الطاقة تُفقد دائماً في كل تفاعل","لا يمكن حساب ΔH إلا بالقياس المباشر"],ans:1,exp:"قانون هس: ΔH الكلي = مجموع ΔH للخطوات. مثال: إذا كان A→B ثم B→C، فـ ΔH(A→C) = ΔH(A→B) + ΔH(B→C). الأهمية: يسمح بحساب ΔH لتفاعلات معقدة أو خطيرة أو بطيئة جداً لا يمكن قياسها مباشرةً في المختبر."},
  {q:"ما طاقة تكوّن الرابطة (Bond Energy) وكيف تُستخدم لحساب ΔH؟",opts:["الطاقة اللازمة لتكسير رابطة كيميائية في الحالة الغازية. ΔH = مجموع طاقات كسر روابط المتفاعلات − مجموع طاقات تكوّن روابط النواتج","الطاقة المُطلقة عند إذابة مادة في الماء","الطاقة اللازمة لتسخين مول واحد من المادة","الطاقة المُخزّنة في النواة الذرية"],ans:0,exp:"طاقة الرابطة Bond Energy: الطاقة اللازمة لكسر مول من رابطة معينة في الحالة الغازية. ΔH التفاعل = Σ(طاقات كسر روابط المتفاعلين) − Σ(طاقات تكوّن روابط النواتج). كسر الروابط يمتص طاقة (+). تكوين الروابط يطلق طاقة (−)."},
  {q:"ما حرارة الاحتراق القياسية (Standard Enthalpy of Combustion) ΔH°c؟",opts:["الحرارة الممتصة عند تبريد مول من مادة ما","الحرارة المُطلقة أو الممتصة عند احتراق مول واحد من المادة احتراقاً تاماً في ظروف قياسية","الحرارة عند تكوّن مول من مركّب من عناصره","الحرارة عند إذابة مول في لتر ماء"],ans:1,exp:"حرارة الاحتراق ΔH°c: الطاقة المُطلقة عند احتراق مول واحد من المادة احتراقاً كاملاً في O₂ تحت ظروف قياسية (25°C، 1 atm). قيمتها دائماً سالبة (طاردة للحرارة) للمركبات العضوية. مثال: ΔH°c(CH₄) = −890 kJ/mol."},
  {q:"ما الحرارة النوعية (Specific Heat Capacity) وما وحدتها؟",opts:["الحرارة اللازمة لتبخير غرام واحد — J/g","كمية الحرارة اللازمة لرفع درجة حرارة غرام واحد من المادة بمقدار 1°C — J/(g·°C)","الحرارة المُطلقة عند تجمّد المادة — kJ/mol","الطاقة الكلية المُخزّنة في المادة"],ans:1,exp:"الحرارة النوعية c: J/(g·°C) أو J/(g·K). حرارة الماء = 4.18 J/(g·°C) وهي من أعلى القيم وسبب أهمية الماء في تنظيم المناخ. المعادلة: q = m × c × ΔT. حيث q = الحرارة المكتسبة/المفقودة، m = الكتلة، ΔT = تغيّر درجة الحرارة."},
  {q:"في تجربة المسعر (Calorimeter)، إذا كان m = 100g، c = 4.18 J/(g·°C)، ΔT = 5°C، ما قيمة q؟",opts:["2.09 J","20.9 J","2090 J","209 J"],ans:2,exp:"q = m × c × ΔT = 100 × 4.18 × 5 = 2090 J = 2.09 kJ. المسعر يقيس الحرارة المُطلقة أو الممتصة في تفاعل كيميائي. إذا ارتفعت درجة حرارة الماء فالتفاعل طارد للحرارة (ΔH سالب). إذا انخفضت فالتفاعل ماص (ΔH موجب)."},
  {q:"ما حرارة التكوّن القياسية (Standard Enthalpy of Formation) ΔH°f؟",opts:["الحرارة عند احتراق المادة","الحرارة عند تكوّن مول واحد من مركّب من عناصره في حالاتها القياسية","الحرارة عند ذوبان المادة في الماء","الحرارة عند تبخير المادة"],ans:1,exp:"ΔH°f: الحرارة عند تكوّن مول واحد من مركّب من عناصره المفردة في حالاتها القياسية (25°C، 1 atm). ΔH°f للعناصر في حالتها القياسية = صفر (مثل O₂(g)، Fe(s)، C(graphite)). تُستخدم في قانون هس: ΔH°rxn = Σ ΔH°f(نواتج) − Σ ΔH°f(متفاعلات)."},
  {q:"ما المقصود بالإنتروبيا (Entropy) S وما علاقتها باتجاه التفاعل؟",opts:["طاقة التفاعل الكلية","مقياس درجة الفوضى أو الاضطراب في نظام — التفاعلات التلقائية تميل لزيادة ΔS الكلية للكون","الضغط الداخلي للجزيء","حرارة التفاعل عند درجة حرارة ثابتة"],ans:1,exp:"الإنتروبيا S: مقياس درجة العشوائية/الفوضى. القانون الثاني للديناميكا الحرارية: إنتروبيا الكون تزداد في التفاعلات التلقائية. ΔS > 0 عند: تحوّل صلب→سائل→غاز، زيادة عدد جزيئات الغاز، رفع درجة الحرارة. ΔS < 0 عند العكس."},
  {q:"ما طاقة غيبس الحرة (Gibbs Free Energy) ΔG وكيف تحدد تلقائية التفاعل؟",opts:["ΔG = ΔH + TΔS — إذا كانت موجبة يكون التفاعل تلقائياً","ΔG = ΔH − TΔS — إذا كانت ΔG < 0 التفاعل تلقائي، ΔG > 0 غير تلقائي، ΔG = 0 في حالة الاتزان","ΔG = ΔS / T — كلما ارتفعت T زادت التلقائية دائماً","ΔG = ΔH × ΔS — إذا كانت سالبة يمتص التفاعل الطاقة"],ans:1,exp:"معادلة غيبس: ΔG = ΔH − TΔS. ΔG < 0: تفاعل تلقائي (Spontaneous). ΔG > 0: تفاعل غير تلقائي. ΔG = 0: حالة الاتزان. T = درجة الحرارة بالكلفن. التفاعل الطارد (ΔH−) مع زيادة الإنتروبيا (ΔS+) تلقائي عند أي درجة حرارة."},
  {q:"ما المقصود بحرارة التعادل (Enthalpy of Neutralization)؟",opts:["الحرارة عند تبخير حمض قوي","الحرارة المُطلقة عند تفاعل مول من H⁺ مع مول من OH⁻ لتكوّن مول ماء — تساوي تقريباً −57 kJ/mol للأحماض والقواعد القوية","الحرارة عند ذوبان قاعدة في الماء","الحرارة عند تجمّد محلول حمضي"],ans:1,exp:"حرارة التعادل: الحرارة عند تفاعل حمض مع قاعدة لتكوين ماء وملح. H⁺(aq) + OH⁻(aq) → H₂O(l)، ΔH ≈ −57.1 kJ/mol. ثابتة تقريباً للأحماض والقواعد القوية لأن التفاعل الجوهري هو نفسه. تقل للأحماض/القواعد الضعيفة بسبب طاقة التأيّن."}
];
const L=["أ","ب","ج","د"],FN=[[" 🌟 ممتاز! درجة كاملة!","أجبت على جميع الأسئلة صحيحة!","⭐⭐⭐⭐⭐"],[" 🔥 أداء رائع!","تقريباً مثالي — راجع نقطةً أو اثنتين","⭐⭐⭐⭐"],["👍 أحسنت!","نتيجة جيدة — المراجعة ستُحسّن أداءك","⭐⭐⭐"],["💡 حاول مجدداً!","راجع ملاحظاتك وحاول مرة أخرى","⭐⭐"]];
let cq=0,sc=0,ans=false;
const cc=document.getElementById('cfc'),cx=cc.getContext('2d');cc.width=innerWidth;cc.height=innerHeight;let cf=[];
function lc(x,y){const cl=['#f97316','#fff','#fdba74','#c2410c'];for(let i=0;i<15;i++)cf.push({x,y,vx:(Math.random()-.5)*11,vy:(Math.random()-1)*9,r:Math.random()*4+2,c:cl[Math.floor(Math.random()*cl.length)],l:1,s:Math.random()*4-2,a:Math.random()*360})}
function dcf(){cx.clearRect(0,0,cc.width,cc.height);cf=cf.filter(p=>p.l>0);cf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l-=.022;p.a+=p.s;cx.save();cx.globalAlpha=p.l;cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);cx.restore()});requestAnimationFrame(dcf)}dcf();
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');let ns=[];
function rb(){bc.width=innerWidth;bc.height=innerHeight;ns=Array.from({length:38},()=>({x:Math.random()*bc.width,y:Math.random()*bc.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}))}
function db(){bx.clearRect(0,0,bc.width,bc.height);ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bc.width)n.vx*=-1;if(n.y<0||n.y>bc.height)n.vy*=-1});for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){bx.beginPath();bx.moveTo(ns[i].x,ns[i].y);bx.lineTo(ns[j].x,ns[j].y);bx.strokeStyle=`rgba(249,115,22,${(1-d/130)*.07})`;bx.lineWidth=.5;bx.stroke()}}ns.forEach(n=>{bx.beginPath();bx.arc(n.x,n.y,n.r,0,Math.PI*2);bx.fillStyle='rgba(249,115,22,.15)';bx.fill()});requestAnimationFrame(db)}
rb();db();window.addEventListener('resize',()=>{rb();cc.width=innerWidth;cc.height=innerHeight});
function bsb(){const sb=document.getElementById('sbar');sb.innerHTML='';for(let i=0;i<QS.length;i++){const d=document.createElement('div');d.className='sd'+(i<cq?' on':'');sb.appendChild(d)}}
function lq(){ans=false;document.getElementById('nb').classList.remove('show');const ex=document.getElementById('ex');ex.classList.remove('show');ex.style.display='none';const q=QS[cq];document.getElementById('pf').style.width=((cq/QS.length)*100)+'%';document.getElementById('pl').textContent='السؤال '+(cq+1)+' من '+QS.length;document.getElementById('qn').textContent='QUESTION '+String(cq+1).padStart(2,'0');const qc=document.getElementById('qc');qc.classList.remove('si');void qc.offsetWidth;qc.classList.add('si');document.getElementById('qt').textContent=q.q;const og=document.getElementById('og');og.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="ltr">${L[i]}</span><span>${o}</span>`;b.addEventListener('click',()=>pick(i,b));og.appendChild(b)});bsb()}
function pick(idx,btn){if(ans)return;ans=true;const q=QS[cq];const bs=document.querySelectorAll('.opt');bs.forEach(b=>b.disabled=true);const fb=document.getElementById('fb');fb.classList.remove('sc','wr');if(idx===q.ans){btn.classList.add('correct');sc+=10;const sv=document.getElementById('sv');sv.textContent=sc;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');setTimeout(()=>sv.classList.remove('pop'),400);fb.textContent=['✅','🎯','⭐','🔥'][Math.floor(Math.random()*4)];fb.classList.add('sc');for(let i=0;i<3;i++)setTimeout(()=>lc(innerWidth*(0.2+Math.random()*0.6),innerHeight*.4),i*80);setTimeout(()=>document.getElementById('nb').classList.add('show'),500)}else{btn.classList.add('wrong');bs[q.ans].classList.add('correct');fb.textContent=['❌','😬','💭','🙈'][Math.floor(Math.random()*4)];fb.classList.add('wr');const ex=document.getElementById('ex');ex.textContent='💡 '+q.exp;ex.style.display='block';setTimeout(()=>ex.classList.add('show'),50);setTimeout(()=>document.getElementById('nb').classList.add('show'),350)}bsb()}
function nxt(){cq++;if(cq<QS.length)lq();else sf()}
function sf(){document.getElementById('qs').style.display='none';document.getElementById('fs').classList.add('vis');document.getElementById('fsn').textContent=sc;const p=sc/(QS.length*10),f=p===1?FN[0]:p>=.75?FN[1]:p>=.5?FN[2]:FN[3];document.getElementById('ftl').textContent=f[0];document.getElementById('fmg').textContent=f[1];document.getElementById('fst').textContent=f[2];setTimeout(()=>{for(let i=0;i<8;i++)setTimeout(()=>lc(innerWidth*Math.random(),-20),i*100)},250)}
function rst(){cq=0;sc=0;ans=false;cf=[];document.getElementById('sv').textContent='0';document.getElementById('fs').classList.remove('vis');document.getElementById('qs').style.display='flex';lq()}
lq();
</script></body></html>
