<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 2: Communication — Grade 11 Literary</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00f5ff;--gold:#fbbf24;--green:#22c55e;--red:#ef4444;--purple:#c026d3;--dark:#020617;--dark2:#0f172a;--text:#f1f5f9;--muted:rgba(241,245,249,0.6);--border:rgba(0,245,255,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"Tajawal",sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--dark2)}
::-webkit-scrollbar-thumb{background:rgba(0,245,255,0.3);border-radius:3px}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(2,6,23,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:"Orbitron",sans-serif;font-size:13px;color:var(--cyan);letter-spacing:3px;text-shadow:0 0 20px rgba(0,245,255,0.5)}
.back-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 18px;font-family:"Tajawal",sans-serif;font-size:14px;color:var(--muted);cursor:pointer;text-decoration:none;transition:all 0.2s}
.back-btn:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:96px 24px 60px}
.ghdr{background:linear-gradient(135deg,rgba(0,245,255,0.08),rgba(192,38,211,0.05));border:1.5px solid rgba(0,245,255,0.2);border-radius:22px;padding:32px 28px;margin-bottom:28px;position:relative;overflow:hidden}
.ghdr::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle,rgba(0,245,255,0.1) 1px,transparent 1px);background-size:26px 26px;opacity:0.4;pointer-events:none}
.ghdr-top{display:flex;align-items:center;gap:16px;margin-bottom:14px;position:relative;z-index:1}
.ghdr-emo{font-size:48px}
.ghdr-info h1{font-size:26px;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ghdr-info p{color:var(--muted);font-size:14px}
.ghdr-tags{display:flex;flex-wrap:wrap;gap:6px;position:relative;z-index:1}
.tg{font-size:11px;background:rgba(0,245,255,0.1);border:1px solid rgba(0,245,255,0.25);color:var(--cyan);padding:4px 10px;border-radius:7px;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
.stat{background:rgba(15,23,42,0.85);border:1.5px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 12px;text-align:center;transition:all 0.25s}
.stat-l{font-family:"Orbitron",sans-serif;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:6px}
.stat-v{font-size:22px;font-weight:900;color:var(--cyan);font-family:"Orbitron",sans-serif}
.stat.score .stat-v{color:var(--gold)}
.stat.streak .stat-v{color:var(--green)}
.stat.wrong .stat-v{color:var(--red)}
.prog{background:rgba(15,23,42,0.85);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;height:10px;margin-bottom:28px;overflow:hidden;position:relative}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:12px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);width:0%;box-shadow:0 0 20px rgba(0,245,255,0.5)}
.qcard{background:rgba(15,23,42,0.85);border:1.5px solid var(--border);border-radius:22px;padding:32px 28px;margin-bottom:24px;position:relative;overflow:hidden;backdrop-filter:blur(12px);animation:qin 0.4s ease}
@keyframes qin{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-family:"Orbitron",sans-serif;font-size:11px;color:var(--cyan);letter-spacing:3px;margin-bottom:10px}
.q-text{font-size:20px;font-weight:700;line-height:1.8;margin-bottom:26px;color:var(--text)}
.opts{display:flex;flex-direction:column;gap:12px}
.opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px 20px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:14px;font-family:"Tajawal",sans-serif;font-size:16px;color:var(--text);text-align:right;width:100%;font-weight:500}
.opt:hover:not(.disabled){border-color:var(--cyan);background:rgba(0,245,255,0.05);transform:translateX(-4px)}
.opt.correct{border-color:var(--green);background:rgba(34,197,94,0.1);color:#86efac;animation:pulseG 0.5s ease}
.opt.wrong{border-color:var(--red);background:rgba(239,68,68,0.1);color:#fca5a5;animation:shake 0.4s ease}
.opt.disabled{cursor:default;opacity:0.5}
@keyframes pulseG{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.opt-letter{font-family:"Orbitron",sans-serif;font-size:12px;font-weight:900;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(0,245,255,0.1);border:1px solid rgba(0,245,255,0.25);border-radius:8px;color:var(--cyan);flex-shrink:0}
.opt.correct .opt-letter{background:rgba(34,197,94,0.2);border-color:rgba(34,197,94,0.4);color:#86efac}
.opt.wrong .opt-letter{background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.4);color:#fca5a5}
.expl{margin-top:20px;padding:18px 22px;background:rgba(0,245,255,0.05);border-right:3px solid var(--cyan);border-radius:12px;font-size:15px;line-height:1.9;color:rgba(241,245,249,0.85);display:none}
.expl.show{display:block;animation:qin 0.3s ease}
.expl strong{color:var(--cyan)}
.next-btn{margin-top:22px;width:100%;background:linear-gradient(135deg,var(--cyan),var(--purple));color:var(--dark);border:none;border-radius:14px;padding:15px;font-family:"Tajawal",sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:all 0.25s;display:none;align-items:center;justify-content:center;gap:10px}
.next-btn.show{display:flex;animation:qin 0.3s ease}
.next-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,245,255,0.3)}
.final{background:rgba(15,23,42,0.9);border:1.5px solid var(--border);border-radius:22px;padding:48px 32px;text-align:center;display:none;animation:qin 0.5s ease}
.final.show{display:block}
.final-emo{font-size:80px;margin-bottom:16px;display:block}
.final h2{font-size:32px;font-weight:900;margin-bottom:10px;background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.final-msg{color:var(--muted);font-size:16px;margin-bottom:28px;line-height:1.8}
.final-score{font-family:"Orbitron",sans-serif;font-size:56px;font-weight:900;color:var(--gold);margin-bottom:10px;text-shadow:0 0 30px rgba(251,191,36,0.4)}
.final-sub{font-size:13px;color:var(--muted);letter-spacing:2px;font-family:"Orbitron",sans-serif;margin-bottom:32px}
.final-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.fb{padding:12px 26px;border-radius:12px;font-family:"Tajawal",sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.25s;text-decoration:none;border:none;display:inline-flex;align-items:center;gap:8px}
.fb.primary{background:var(--cyan);color:var(--dark)}
.fb.secondary{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:var(--text)}
.fb:hover{transform:translateY(-3px);filter:brightness(1.1)}
.flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0}
.flash.green{background:radial-gradient(ellipse at center,rgba(34,197,94,0.18),transparent 60%);animation:flashAnim 0.5s ease}
.flash.red{background:radial-gradient(ellipse at center,rgba(239,68,68,0.18),transparent 60%);animation:flashAnim 0.5s ease}
@keyframes flashAnim{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
@media(max-width:640px){nav{padding:0 16px}.nav-logo{font-size:11px;letter-spacing:2px}.back-btn{padding:7px 14px;font-size:13px}.wrap{padding:80px 16px 48px}.ghdr{padding:24px 20px}.ghdr-info h1{font-size:20px}.stats{grid-template-columns:repeat(2,1fr);gap:10px}.qcard{padding:24px 20px}.q-text{font-size:17px}.opt{padding:14px 16px;font-size:14.5px}.final h2{font-size:24px}.final-score{font-size:44px}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<nav>
  <div class="nav-logo">📱 ENG11D · M2</div>
  <a href="index.html" class="back-btn">→ رجوع للصفحة الرئيسية</a>
</nav>
<div class="wrap">
  <div class="ghdr">
    <div class="ghdr-top">
      <span class="ghdr-emo">📱</span>
      <div class="ghdr-info">
        <h1>Module 2: Communication</h1>
        <p>الحادي عشر أدبي · انجليزي · الفصل الدراسي الأول</p>
      </div>
    </div>
    <div class="ghdr-tags">
      <span class="tg">Conjunctions</span>
      <span class="tg">Present Perfect</span>
      <span class="tg">Question Tags</span>
      <span class="tg">Mobile Phones</span>
      <span class="tg">Communication</span>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-l">QUESTION</div><div class="stat-v" id="qCount">0/0</div></div>
    <div class="stat score"><div class="stat-l">SCORE</div><div class="stat-v" id="score">0</div></div>
    <div class="stat streak"><div class="stat-l">STREAK</div><div class="stat-v" id="streak">0</div></div>
    <div class="stat wrong"><div class="stat-l">WRONG</div><div class="stat-v" id="wrong">0</div></div>
  </div>
  <div class="prog"><div class="prog-fill" id="progFill"></div></div>
  <div id="quizArea"></div>
  <div class="final" id="final">
    <span class="final-emo" id="finalEmo">🎉</span>
    <h2 id="finalTitle">أحسنت!</h2>
    <p class="final-msg" id="finalMsg"></p>
    <div class="final-score" id="finalScore">0%</div>
    <div class="final-sub" id="finalSub">RESULT</div>
    <div class="final-btns">
      <button class="fb primary" onclick="restart()">🔄 إعادة اللعبة</button>
      <a href="index.html" class="fb secondary">🏠 الصفحة الرئيسية</a>
    </div>
  </div>
</div>
<div class="flash" id="flash"></div>
<script>
const QUESTIONS = [
  {
    q: "Choose the correct conjunction: 'I studied hard ___ I passed the exam.'",
    opts: ["so", "but", "or", "because"],
    correct: 0,
    expl: "<strong>So</strong> shows a <strong>result</strong> — the second clause is the outcome of the first. 'I studied hard, therefore I passed.'"
  },
  {
    q: "'He is tired ___ he will finish the project.' Choose the best conjunction.",
    opts: ["but", "so", "and", "because"],
    correct: 0,
    expl: "<strong>But</strong> shows <strong>contrast</strong> between two ideas. Despite being tired, he will still finish the project."
  },
  {
    q: "Complete the Present Perfect sentence: 'I ___ never been to London.'",
    opts: ["have", "has", "had", "was"],
    correct: 0,
    expl: "Present Perfect is formed with <strong>have/has + past participle</strong>. Use <strong>have</strong> with I/you/we/they, and <strong>has</strong> with he/she/it."
  },
  {
    q: "Which sentence is in the correct Present Perfect form?",
    opts: [
      "She has lived here for ten years.",
      "She have lived here for ten years.",
      "She has live here for ten years.",
      "She is lived here for ten years."
    ],
    correct: 0,
    expl: "Present Perfect with <strong>for/since</strong> describes an action that started in the past and <strong>continues to the present</strong>."
  },
  {
    q: "Add the correct question tag: 'You speak French, ___?'",
    opts: ["don't you", "do you", "aren't you", "isn't you"],
    correct: 0,
    expl: "Question tags use the <strong>opposite form</strong> of the main verb. Positive statement → negative tag. 'You speak' → 'don't you?'"
  },
  {
    q: "Choose the correct question tag: 'She isn't coming to the party, ___?'",
    opts: ["is she", "isn't she", "does she", "doesn't she"],
    correct: 0,
    expl: "Negative statement → <strong>positive tag</strong>. 'She isn't' → 'is she?' Always use the auxiliary verb from the main sentence."
  },
  {
    q: "Which is an advantage of mobile phones?",
    opts: [
      "They help us communicate anywhere, anytime.",
      "They never need charging.",
      "They are completely free to use.",
      "They work without any network."
    ],
    correct: 0,
    expl: "The main benefit of <strong>mobile phones</strong> is <strong>instant communication</strong> — staying connected with family, friends, and colleagues across distances."
  },
  {
    q: "What does 'SMS' stand for?",
    opts: [
      "Short Message Service",
      "Simple Mobile System",
      "Smart Messaging Service",
      "Secure Message Service"
    ],
    correct: 0,
    expl: "<strong>SMS</strong> = <strong>S</strong>hort <strong>M</strong>essage <strong>S</strong>ervice. It's the protocol used to send text messages between mobile phones."
  },
  {
    q: "Which communication method is fastest for urgent messages?",
    opts: ["phone call", "postal letter", "newspaper", "telegram"],
    correct: 0,
    expl: "A <strong>phone call</strong> is the fastest for urgent matters because it allows <strong>real-time two-way communication</strong> instantly."
  },
  {
    q: "'Have you ever visited Kuwait Tower?' — the correct answer structure is:",
    opts: [
      "Yes, I have. / No, I haven't.",
      "Yes, I did. / No, I didn't.",
      "Yes, I was. / No, I wasn't.",
      "Yes, I do. / No, I don't."
    ],
    correct: 0,
    expl: "Present Perfect questions are answered with <strong>have/has</strong>: 'Have you...?' → 'Yes, I <strong>have</strong>' or 'No, I <strong>haven't</strong>'."
  }
];
let current=0,score=0,streak=0,maxStreak=0,wrong=0,answered=false;
function render(){
  if(current>=QUESTIONS.length){showFinal();return}
  answered=false;
  const q=QUESTIONS[current];
  document.getElementById('qCount').textContent=(current+1)+'/'+QUESTIONS.length;
  document.getElementById('progFill').style.width=((current)/QUESTIONS.length*100)+'%';
  const area=document.getElementById('quizArea');
  area.innerHTML=`
    <div class="qcard">
      <div class="q-num">QUESTION ${String(current+1).padStart(2,'0')}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts">
        ${q.opts.map((opt,i)=>`
          <button class="opt" onclick="answer(${i})">
            <span class="opt-letter">${String.fromCharCode(65+i)}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="expl" id="expl">${q.expl}</div>
      <button class="next-btn" id="nextBtn" onclick="nextQ()">
        ${current+1>=QUESTIONS.length?'🏁 إنهاء اللعبة':'← السؤال التالي'}
      </button>
    </div>`;
}
function answer(idx){
  if(answered)return;
  answered=true;
  const q=QUESTIONS[current];
  document.querySelectorAll('.opt').forEach((el,i)=>{
    el.classList.add('disabled');
    if(i===q.correct)el.classList.add('correct');
    if(i===idx&&i!==q.correct)el.classList.add('wrong');
  });
  if(idx===q.correct){score++;streak++;if(streak>maxStreak)maxStreak=streak;flashScreen('green')}
  else{wrong++;streak=0;flashScreen('red')}
  document.getElementById('score').textContent=score;
  document.getElementById('streak').textContent=streak;
  document.getElementById('wrong').textContent=wrong;
  document.getElementById('expl').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('progFill').style.width=((current+1)/QUESTIONS.length*100)+'%';
}
function nextQ(){current++;render();window.scrollTo({top:0,behavior:'smooth'})}
function flashScreen(color){const f=document.getElementById('flash');f.className='flash '+color;setTimeout(()=>f.className='flash',500)}
function showFinal(){
  document.getElementById('quizArea').style.display='none';
  const percent=Math.round((score/QUESTIONS.length)*100);
  document.getElementById('finalScore').textContent=percent+'%';
  document.getElementById('finalSub').textContent=`${score} / ${QUESTIONS.length} إجابة صحيحة · أعلى سلسلة: ${maxStreak}`;
  let emo='🎉',title='',msg='';
  if(percent===100){emo='🏆';title='ممتاز! علامة كاملة!';msg='أتقنت Module 2 بامتياز. أنت جاهز للاختبار تماماً! 🌟'}
  else if(percent>=80){emo='🌟';title='أداء رائع!';msg='مستواك قوي جداً. راجع الأخطاء البسيطة وستكون مستعداً تماماً.'}
  else if(percent>=60){emo='👍';title='أداء جيد';msg='أنت في الطريق الصحيح. راجع النقاط التي أخطأت فيها وأعد المحاولة.'}
  else if(percent>=40){emo='📚';title='يحتاج مراجعة';msg='الأساسيات واضحة لكن تحتاج تركيز أكثر. اقرأ الشرح جيداً وأعد اللعبة.'}
  else{emo='💪';title='لا تستسلم';msg='البداية دائماً صعبة. راجع الدرس من الكتاب ثم عد لتجرب مرة ثانية.'}
  document.getElementById('finalEmo').textContent=emo;
  document.getElementById('finalTitle').textContent=title;
  document.getElementById('finalMsg').textContent=msg;
  document.getElementById('final').classList.add('show');
}
function restart(){
  current=0;score=0;streak=0;maxStreak=0;wrong=0;
  document.getElementById('score').textContent='0';
  document.getElementById('streak').textContent='0';
  document.getElementById('wrong').textContent='0';
  document.getElementById('final').classList.remove('show');
  document.getElementById('quizArea').style.display='block';
  render();window.scrollTo({top:0,behavior:'smooth'});
}
render();
const cv=document.getElementById('bg'),cx=cv.getContext('2d');let ns=[];
function rsz(){cv.width=innerWidth;cv.height=innerHeight}
function ini(){ns=Array.from({length:40},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+1}))}
function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  ns.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>cv.width)n.vx*=-1;if(n.y<0||n.y>cv.height)n.vy*=-1});
  for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<140){cx.beginPath();cx.moveTo(ns[i].x,ns[i].y);cx.lineTo(ns[j].x,ns[j].y);cx.strokeStyle=`rgba(0,245,255,${(1-d/140)*.08})`;cx.lineWidth=.6;cx.stroke()}}
  ns.forEach(n=>{cx.beginPath();cx.arc(n.x,n.y,n.r,0,Math.PI*2);cx.fillStyle='rgba(0,245,255,0.2)';cx.fill()});
  requestAnimationFrame(draw);
}
rsz();ini();draw();window.addEventListener('resize',()=>{rsz();ini()});
</script>
</body>
</html>
